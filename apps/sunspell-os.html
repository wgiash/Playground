<!doctype html>
<!--
  Sunspell · OS · home (v0.1) — single-screen wireframe.

  Peer of apps/sunpull-flows.html. Reuses tokens.css + canvas.css + chrome.css
  unchanged. One frame: 1440×900, light mode, web. Subject to standing rules
  01–09 (CLAUDE.md / agent-design-guide.html#rules):
    · Tokens only — bone/dark wireframe tokens via .wf wrapper, no new tokens.
    · Don't touch infrastructure — Canvas/Frame/Section helpers mirrored from
      system/app.jsx, not modified.
    · Atomic taxonomy respected — this is a Templates/Flows-zone artifact.
    · No color at the wireframe stage — selection is filled invert; sources
      (Meeting / Manual / Sunpull) are labelled, not coloured.
    · Auth + error not applicable on a single non-flow home frame; will be
      added when the home becomes a flow (Rule 05 only triggers for flows).
    · No OS / device chrome — no status bar, no notch, no home indicator,
      no browser address bar, no scrollbars (Rule 06).
    · Real icons only — currentColor SVGs in Lucide grammar (Rule 08).
    · System fonts only — TWK Lausanne Pan via tokens. No Space Mono (Rule 09).

  To extend: add more home screens (states, doc-open, app-open) as siblings
  inside the Section. Light-only by default.
-->

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

/* ========== Lucide-grammar icons (1.5px stroke, 24px viewBox, currentColor).
   Drawn from the same vocabulary as system/icons.jsx; we reproduce only the
   glyphs this single screen uses (kept minimal, not extending the kit). ====== */
const Ico = ({ size = 18, stroke = 1.5, children, fill = "none" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
       strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
    {children}
  </svg>
);
const I = {
  Search:   (p) => <Ico {...p}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></Ico>,
  Plus:     (p) => <Ico {...p}><path d="M12 5v14M5 12h14"/></Ico>,
  X:        (p) => <Ico {...p}><path d="M18 6 6 18M6 6l12 12"/></Ico>,
  Trash:    (p) => <Ico {...p}><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6"/></Ico>,
  ArrowUR:  (p) => <Ico {...p}><path d="M7 17 17 7M8 7h9v9"/></Ico>,
  Check:    (p) => <Ico {...p}><path d="M20 6 9 17l-5-5"/></Ico>,
  Cal:      (p) => <Ico {...p}><rect x="3" y="5" width="18" height="16" rx="1"/><path d="M16 3v4M8 3v4M3 11h18"/></Ico>,
  Bookmark: (p) => <Ico {...p}><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></Ico>,
  Pen:      (p) => <Ico {...p}><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></Ico>,
  FileText: (p) => <Ico {...p}><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6M9 13h6M9 17h6"/></Ico>,
  Bell:     (p) => <Ico {...p}><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></Ico>,
  Settings: (p) => <Ico {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></Ico>,

  Sundial:  (p) => <Ico {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></Ico>,                            // clock-style — project manager
  Sunpull:  (p) => <Ico {...p}><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></Ico>,                       // bookmark — memory layer
  Sunrun:   (p) => <Ico {...p}><path d="M5 12h14M13 6l6 6-6 6"/></Ico>,                                                  // arrow — task executor
  Sunspoke: (p) => <Ico {...p}><path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Ico>,            // speech — comms / leadership
};

/* ========== Canvas (pan/zoom) — mirrored from system/app.jsx.
   Identical to the version used in apps/sunpull-flows.html.  ============== */
function Canvas({ children, scaleState, panState }) {
  const viewportRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef(null);
  const [scale, setScale] = scaleState;
  const [pan, setPan] = panState;

  const onMouseDown = (e) => {
    if (e.button !== 0) return;
    if (e.target.closest && e.target.closest('.topbar')) return;
    dragStart.current = { x: e.clientX - pan.x, y: e.clientY - pan.y };
    setDragging(true);
  };
  const onMouseMove = (e) => {
    if (!dragging || !dragStart.current) return;
    setPan({ x: e.clientX - dragStart.current.x, y: e.clientY - dragStart.current.y });
  };
  const onMouseUp = () => { setDragging(false); dragStart.current = null; };

  const onWheel = useCallback((e) => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      const rect = viewportRef.current.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      setScale(prev => {
        const next = Math.max(0.08, Math.min(2.5, prev * factor));
        setPan(p => ({
          x: cx - ((cx - p.x) * next / prev),
          y: cy - ((cy - p.y) * next / prev),
        }));
        return next;
      });
    } else {
      setPan(p => ({ x: p.x - e.deltaX, y: p.y - e.deltaY }));
    }
  }, [setScale, setPan]);

  useEffect(() => {
    const el = viewportRef.current;
    if (!el) return;
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, [onWheel]);

  return (
    <div
      ref={viewportRef}
      className="canvas-viewport"
      onMouseDown={onMouseDown}
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
      onMouseLeave={onMouseUp}
      style={{ cursor: dragging ? 'grabbing' : 'grab' }}
    >
      <div className="canvas-stage" style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})` }}>
        {children}
      </div>
    </div>
  );
}

        <span className="s">{subtitle}</span>

}

function Section({ x, y, w, h, num, name, tag, children }) {

      <div className="wf-section-header">

        <span className="name">{name}</span>
        <span className="tag">{tag}</span>
      </div>
      {children}
    </div>

}

function IntroCard({ x, y }) {
  return (
    <div className="intro-card" style={{ left: x, top: y }}>
      <div className="num">Aither · Sunspell · OS · v0.1</div>
      <h1>One screen.<br/>Home for the OS.</h1>
      <p className="body">
        First pass at Sunspell as an OS shell. Editorial greeting, a feed of

      </p>
      <dl className="rules">
        <dt>Apps</dt><dd>Sundial · Sunpull · Sunrun · Sunspoke (per Sunspell PRD §portfolio)</dd>
        <dt>Feed</dt><dd>Tasks carry their origin label — meeting, manual, or pulled from a Sunpull save</dd>
        <dt>Modes</dt><dd>Light only in v0.1. Dark not shipped.</dd>
        <dt>Next</dt><dd>States (empty feed · doc-open · app-launch overlay) · auth gate · error state for failed task source · mobile pair</dd>
        <dt>Navigate</dt><dd>Drag to pan · ⌘/Ctrl + scroll to zoom · scroll to pan · 0 to reset</dd>
      </dl>
    </div>
  );
}

function Topbar({ scale, setScale, resetView }) {

      <a href="../index.html" title="Back to home" aria-label="Back to home" style={{ color: 'var(--canvas-fg)', textDecoration: 'none', fontSize: 12, opacity: 0.7, marginRight: 16 }}>← Home</a>
      <span className="topbar-title">Sunspell · OS · home</span>
      <span className="topbar-meta">v0.1 · 1 frame · light</span>
      <span className="topbar-spacer" />
      <button className="topbar-btn" onClick={() => setScale(Math.max(0.08, scale / 1.2))}>−</button>
      <span className="topbar-zoom">{Math.round(scale * 100)}%</span>
      <button className="topbar-btn" onClick={() => setScale(Math.min(2.5, scale * 1.2))}>+</button>
      <button className="topbar-btn" onClick={resetView}>Reset</button>
    </div>
  );
}

/* ========== Main app ========== */
function App() {
  const [scale, setScale] = useState(0.5);
  const [pan, setPan]   = useState({ x: 240, y: 220 });

  const resetView = () => { setScale(0.5); setPan({ x: 240, y: 220 }); };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "0" && document.activeElement && document.activeElement.tagName !== "INPUT") {
        resetView();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <>
      <Topbar scale={scale} setScale={setScale} resetView={resetView} />
      <Canvas scaleState={[scale, setScale]} panState={[pan, setPan]}>
        <IntroCard x={-120} y={-1100} />
        <Section x={0} y={0} w={1440} h={900} num="01" name="Home" tag="OS shell · feed + dock · light · v0.1">
          <Frame x={0} y={0} w={1440} h={900} mode="light" title="1 · Home" subtitle="Default state · today">
            <SunspellHome />
          </Frame>
        </Section>
      </Canvas>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Stop native Ctrl+wheel zoom from fighting the canvas zoom.
window.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) e.preventDefault();
}, { passive: false, capture: true });
</script>
