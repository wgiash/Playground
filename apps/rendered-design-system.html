  font-size: 14px;
  color: var(--fg-mute);
  margin: 0;
  font-weight: 400;
}
.cbw-stub-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 32px;
}
.cbw-stub-card {
  padding: 24px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--bg);
  opacity: 0.55;
}
.cbw-stub-card .k {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--fg-mute);
  font-weight: var(--w-ui);
}
.cbw-stub-card .v {
  font-size: 32px;
  font-weight: var(--w-title);
  letter-spacing: -0.02em;
}
.cbw-stub-card .lines {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cbw-stub-card .line {
  height: 10px;
  background: var(--placeholder);
  border-radius: var(--r-1);
}
.cbw-stub-card .line.w70 { width: 70%; }
.cbw-stub-card .line.w45 { width: 45%; }
.cbw-stub-card .line.w85 { width: 85%; }

/* Launcher pill at rest */
.cbw-launcher {
  position: absolute;
  right: 32px;
  bottom: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 22px 14px 16px;
  background: var(--fg);
  color: var(--bg);
  border-radius: var(--r-full);
  font-size: 13px;
  font-weight: var(--w-ui);
  letter-spacing: -0.005em;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 0 0 1px var(--fg);
  cursor: pointer;
  z-index: 8;
  display: none; /* hidden — the open widget is shown */
}
.cbw-launcher .ic {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg);
  color: var(--fg);
  display: grid;
  place-items: center;
}

/* Open chatbot widget */
.cbw-widget {
  position: absolute;
  right: 32px;
  bottom: 32px;
  width: 400px;
  height: 620px;
  background: var(--panel);
  border: 1px solid var(--hair-2);
  border-radius: var(--r-2);
  display: flex;
  flex-direction: column;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px var(--hair);
  overflow: hidden;
  z-index: 10;
}
.wf:not([data-mode="dark"]) .cbw-widget {
  box-shadow: 0 30px 80px rgba(18,13,11,0.18), 0 0 0 1px var(--hair);
}

.cbw-w-head {
  padding: 16px 18px;
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 12px;
  align-items: center;
  border-bottom: 1px solid var(--hair);
  flex: 0 0 auto;
}
.cbw-w-head .av {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--fg);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: var(--w-title);
  letter-spacing: 0.04em;
  position: relative;
}
.cbw-w-head .av::after {
  content: "";
  position: absolute;
  bottom: -2px; right: -2px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--fg);
  border: 2px solid var(--panel);
}
.cbw-w-head .tx .t {
  font-size: 14px;
  font-weight: var(--w-title);
  letter-spacing: -0.01em;
}
.cbw-w-head .tx .s {
  font-size: 11px;
  color: var(--fg-mute);
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cbw-w-head .tx .s .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--fg);
}
.cbw-w-head .acts {
  display: flex;
  gap: 4px;
  color: var(--fg-mute);
}
.cbw-w-head .acts button {
  width: 28px; height: 28px;
  display: grid;
  place-items: center;
  border-radius: var(--r-full);
}

/* Stream */
.cbw-w-stream {
  flex: 1;
  min-height: 0;
  padding: 18px 18px 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
}
.cbw-day {
  align-self: center;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--fg-mute);
  padding: 4px 0 8px;
}
.cbw-msg {
  display: flex;
  max-width: 85%;
}
.cbw-msg.me { align-self: flex-end; }
.cbw-msg .bubble {
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.45;
  border-radius: var(--r-2);
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--hair);
  letter-spacing: -0.005em;
  font-weight: 400;
}
.cbw-msg.me .bubble {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
  border-bottom-right-radius: 0;
}
.cbw-msg:not(.me) .bubble {
  border-bottom-left-radius: 0;
}

/* Suggested actions as chips */
.cbw-suggests {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 6px 0 4px 0;
}
.cbw-suggest {
  padding: 7px 12px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  font-size: 12px;
  color: var(--fg);
  background: var(--bg);
  cursor: pointer;
  white-space: nowrap;
}

/* Rich card inside a bot message */
.cbw-card {
  padding: 12px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  background: var(--bg);
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 12px;
  align-items: center;
  margin-top: 4px;
  max-width: 300px;
}
.cbw-card .img {
  width: 52px; height: 52px;
  font-size: 7px;
}
.cbw-card .t {
  font-size: 13px;
  font-weight: var(--w-title);
  letter-spacing: -0.01em;
}
.cbw-card .s {
  font-size: 11px;
  color: var(--fg-mute);
  margin-top: 2px;
}
.cbw-card .s .wf-dot { margin: 0 4px; }

/* Typing indicator */
.cbw-typing {
  padding: 10px 14px;
  border: 1px solid var(--hair);
  border-radius: var(--r-2);
  border-bottom-left-radius: 0;
  background: var(--bg);
  display: inline-flex;
  gap: 4px;
}
.cbw-typing .d {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--fg-mute);
}

/* Compose */
.cbw-w-compose {
  padding: 12px 14px 14px;
  border-top: 1px solid var(--hair);
  display: grid;
  grid-template-columns: 32px 1fr 32px 32px;
  gap: 8px;
  align-items: center;
  flex: 0 0 auto;
  background: var(--panel);
}
.cbw-w-compose .wf-input {
  padding: 9px 12px;
  font-size: 13px;
  background: var(--bg);
}
.cbw-w-compose button {
  width: 32px; height: 32px;
  border: 0;
  border-radius: var(--r-full);
  display: grid;
  place-items: center;
  color: var(--fg-soft);
}
.cbw-w-compose button[data-primary] {
  background: var(--fg);
  color: var(--bg);
}
.cbw-w-foot {
  padding: 8px 18px 10px;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  text-align: center;
  border-top: 1px solid var(--hair);
}

/* ============ MOBILE (full-sheet overlay variant) ============ */
.cbm {
  background: var(--bg);
}
.cbm-stub {
  position: absolute;
  inset: 0;
  padding: 60px 20px 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
  opacity: 0.35;
  pointer-events: none;
}
.cbm-stub .line {
  height: 12px;
  background: var(--placeholder);
  border-radius: var(--r-1);
}
.cbm-stub .line.w60 { width: 60%; }
.cbm-stub .line.w90 { width: 90%; }
.cbm-stub .line.w40 { width: 40%; }
.cbm-stub .card {
  height: 140px;
  background: var(--placeholder);
  border-radius: var(--r-1);
  margin-top: 10px;
}

/* Sheet — lifted from bottom */
.cbm-sheet {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  top: 140px;
  background: var(--panel);
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;
  border: 1px solid var(--hair);
  border-bottom: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 -20px 60px rgba(0,0,0,0.4);
  z-index: 10;
}
.cbm-handle {
  align-self: center;
  width: 40px;
  height: 4px;
  border-radius: var(--r-full);
  background: var(--fg-mute);
  margin: 10px 0 6px;
  opacity: 0.5;
}
.cbm-head {
  padding: 10px 20px 14px;
  display: grid;
  grid-template-columns: 40px 1fr auto;
  gap: 12px;
  align-items: center;
  border-bottom: 1px solid var(--hair);
}
.cbm-head .av {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--fg);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: var(--w-title);
  letter-spacing: 0.04em;
}
.cbm-head .tx .t {
  font-size: 15px;
  font-weight: var(--w-title);
  letter-spacing: -0.01em;
}
.cbm-head .tx .s {
  font-size: 11px;
  color: var(--fg-mute);
  margin-top: 2px;
}
.cbm-head .close {
  width: 32px; height: 32px;
  display: grid;
  place-items: center;
  color: var(--fg-soft);
}
.cbm-stream {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  padding: 18px 20px 8px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.cbm-msg { display: flex; max-width: 80%; }
.cbm-msg.me { align-self: flex-end; }
.cbm-msg .bubble {
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.45;
  border-radius: var(--r-2);
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--hair);
  font-weight: 400;
  letter-spacing: -0.005em;
}
.cbm-msg.me .bubble {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
  border-bottom-right-radius: 0;
}
.cbm-msg:not(.me) .bubble { border-bottom-left-radius: 0; }
.cbm-suggests {
  display: flex;
  gap: 6px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.cbm-suggest {
  padding: 8px 12px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  font-size: 12px;
}
.cbm-compose {
  padding: 12px 16px 22px;
  border-top: 1px solid var(--hair);
  display: grid;
  grid-template-columns: 32px 1fr 32px 32px;
  gap: 8px;
  align-items: center;
}
.cbm-compose .wf-input { padding: 10px 12px; font-size: 13px; background: var(--bg); }
.cbm-compose button {
  width: 32px; height: 32px;
  display: grid;
  place-items: center;
  border-radius: var(--r-full);
  color: var(--fg-soft);
}
.cbm-compose button[data-primary] { background: var(--fg); color: var(--bg); }


/* ========== flow-search.css ========== */
/* =========================================================
   Flow · Search — end-to-end
   Sits in the Flows zone (x = 28000+). Uses only wf-* / ki-*
   primitives + tokens. No new color, weight, or radius tokens.
   ========================================================= */

/* ---- Flow intro card — small, sibling of .intro-card ---- */
.flow-intro {
  position: absolute;
  width: 560px;
  padding: 40px 48px;
  background: var(--canvas-panel);
  border: 1px solid var(--canvas-hair);
  border-radius: var(--r-1);
  color: var(--canvas-fg);
}
.flow-intro .num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--bone-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.flow-intro h1 {
  font-size: 36px;
  font-weight: var(--w-ui);
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin: 0 0 20px;
  text-wrap: balance;
}
.flow-intro .body {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.55;
  color: var(--bone-soft);
  letter-spacing: -0.01em;
  max-width: 480px;
  text-wrap: pretty;
}
.flow-intro .rules {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 10px 20px;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--bone-hairline);
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.55;
}
.flow-intro .rules dt { color: var(--bone-muted); text-transform: uppercase; }
.flow-intro .rules dd { margin: 0; color: var(--bone-soft); }

/* ---- Shared search bits used by web + mobile ---- */
.sf-field {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--input);
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  color: var(--fg);
  font-size: 13px;
  width: 100%;
}
.sf-field .glyph { color: var(--fg-soft); display: inline-flex; }
.sf-field .q { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sf-field .q.placeholder { color: var(--fg-mute); }
.sf-field .trail { display: inline-flex; gap: 6px; align-items: center; color: var(--fg-soft); font-family: var(--font-mono); font-size: 10px; }
.sf-field .kbd {
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  padding: 2px 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-soft);
}
.sf-field .clear {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--hair-2);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-size: 10px;
  font-family: var(--font-mono);
}
.sf-field[data-state="focus"]  { border-color: var(--hair-2); box-shadow: 0 0 0 2px var(--hair); }
.sf-field[data-state="error"]  { border-color: var(--fg); }
.sf-field[data-state="loading"] .glyph { opacity: 0.4; }
.sf-field[data-state="disabled"] { opacity: 0.45; }

/* shimmer — non-animated placeholder bars so zoomed-out reads clean */
.sf-skel { background: var(--placeholder); border-radius: var(--r-1); display: block; }
.sf-skel.h10 { height: 10px; }
.sf-skel.h12 { height: 12px; }
.sf-skel.h14 { height: 14px; }
.sf-skel.h16 { height: 16px; }
.sf-skel.h22 { height: 22px; }
.sf-skel.h44 { height: 44px; }

/* ============================================================
   WEB · .sfw — 1440×var(h)
   ============================================================ */
.sfw {
  width: 1440px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  position: relative;
  min-height: 900px;
}
.sfw-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 24px;
  padding: 32px 64px 96px;
}

/* Sub-nav tabs for the results shell */
.sfw-subnav {
  display: flex;
  align-items: center;
  gap: 32px;
  border-bottom: 1px solid var(--hair);
  padding: 0 64px;
  margin-top: 0;
}
.sfw-subnav a {
  padding: 14px 0;
  font-size: 12px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--fg-soft);
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
}
.sfw-subnav a[aria-current="page"] {
  color: var(--fg);
  border-bottom-color: var(--fg);
}
.sfw-subnav .count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-mute);
  padding: 14px 0;
}

/* Filter bar: pills + active chips */
.sfw-filterbar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.sfw-filterbar .group {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-mute);
  margin-right: 8px;
}

/* Query header block */
.sfw-qhead {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding-bottom: 8px;
}
.sfw-qhead h1 {
  margin: 0;
  font-size: 32px;
  font-weight: var(--w-ui);
  letter-spacing: -0.02em;
}
.sfw-qhead .hint {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-mute);
}

/* Grouped results */
.sfw-group { display: flex; flex-direction: column; gap: 12px; }
.sfw-group-head {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--hair);
}
.sfw-group-head .t { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg); }
.sfw-group-head .c { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); }
.sfw-group-head .all {
  margin-left: auto;
  font-size: 11px;
  color: var(--fg-soft);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.sfw-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.sfw-row {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 14px 16px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  background: var(--bg);
}
.sfw-row[data-state="hover"]    { border-color: var(--hair-2); }
.sfw-row[data-state="selected"] { border-color: var(--fg); }
.sfw-row[data-state="pressed"]  { background: var(--panel); }
.sfw-row[data-state="disabled"] { opacity: 0.4; }
.sfw-row .ic {
  width: 44px; height: 44px;
  border-radius: var(--r-1);
  background: var(--placeholder);
  display: grid;
  place-items: center;
  color: var(--fg-mute);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.sfw-row .t { font-size: 14px; color: var(--fg); letter-spacing: -0.005em; }
.sfw-row .s { font-size: 11px; color: var(--fg-mute); margin-top: 2px; font-family: var(--font-mono); }
.sfw-row .m { font-family: var(--font-mono); font-size: 11px; color: var(--fg-soft); }
.sfw-row mark { background: none; color: var(--fg); font-weight: var(--w-title); }

/* Autocomplete overlay */
.sfw-overlay {
  position: absolute; inset: 0;
  background: var(--scrim);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 120px;
}
.sfw-overlay-card {
  width: 720px;
  background: var(--bg);
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  box-shadow: var(--float);
  overflow: hidden;
}
.sfw-overlay-input {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 20px;
  border-bottom: 1px solid var(--hair);
  font-size: 18px;
  color: var(--fg);
}
.sfw-overlay-input .q { flex: 1; font-size: 18px; font-weight: var(--w-ui); }
.sfw-overlay-input .q.placeholder { color: var(--fg-mute); }
.sfw-overlay-input .trail {
  display: inline-flex; gap: 6px; align-items: center;
  font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute);
}
.sfw-sgrp { padding: 8px 12px 10px; }
.sfw-sgrp + .sfw-sgrp { border-top: 1px solid var(--hair); }
.sfw-sgrp-head {
  padding: 8px 8px 6px;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  display: flex; align-items: center; gap: 10px;
}
.sfw-sugg {
  display: grid;
  grid-template-columns: 24px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 8px 8px;
  border-radius: var(--r-1);
  font-size: 13px;
}
.sfw-sugg .ic { color: var(--fg-mute); display: inline-flex; }
.sfw-sugg .t { color: var(--fg); letter-spacing: -0.005em; }
.sfw-sugg .m { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); }
.sfw-sugg .k {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-soft);
  border: 1px solid var(--hair-2);
  padding: 1px 5px;
  border-radius: var(--r-1);
}
.sfw-sugg[data-state="hover"]   { background: var(--panel); }
.sfw-sugg[data-state="focus"]   { background: var(--panel); box-shadow: inset 2px 0 0 var(--fg); }

/* Overlay footer — keybind legend */
.sfw-overlay-foot {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 16px;
  border-top: 1px solid var(--hair);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
}
.sfw-overlay-foot .spacer { flex: 1; }

/* Empty / error centered cards */
.sfw-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 40px 24px;
  text-align: center;
  gap: 12px;
  max-width: 640px;
  margin: 0 auto;
}
.sfw-center .glyph {
  width: 72px; height: 72px;
  display: grid; place-items: center;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  color: var(--fg-soft);
  margin-bottom: 8px;
}
.sfw-center h1 {
  font-size: 40px;
  font-weight: var(--w-ui);
  letter-spacing: -0.03em;
  margin: 0;
  text-wrap: balance;
}
.sfw-center p {
  font-size: 14px;
  color: var(--fg-soft);
  line-height: 1.55;
  max-width: 460px;
  margin: 0;
}
.sfw-center .acts { display: flex; gap: 10px; margin-top: 12px; }
.sfw-hints {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 32px;
  width: 100%;
}
.sfw-hint {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 14px 16px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  text-align: left;
}
.sfw-hint .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); }
.sfw-hint .t { font-size: 13px; color: var(--fg); }
.sfw-hint .s { font-size: 11px; color: var(--fg-mute); font-family: var(--font-mono); margin-top: 2px; }

/* Auth-gate card */
.sfw-gate {
  margin: 40px auto 0;
  width: 560px;
  padding: 32px 40px 36px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  background: var(--panel);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.sfw-gate .lock {
  width: 48px; height: 48px;
  display: grid; place-items: center;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  color: var(--fg-soft);
}
.sfw-gate h2 { margin: 4px 0 0; font-size: 24px; font-weight: var(--w-ui); letter-spacing: -0.02em; }
.sfw-gate p  { margin: 0; font-size: 13px; color: var(--fg-soft); line-height: 1.55; }
.sfw-gate .socials { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.sfw-gate .foot { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); margin-top: 4px; }

/* Page-behind dimmer for overlay frame */
.sfw-behind {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  pointer-events: none;
}
.sfw-behind-list { flex: 1; padding: 24px 64px; display: grid; gap: 10px; }

/* ============================================================
   MOBILE · .sfm — 390×844
   ============================================================ */
.sfm {
  width: 390px;
  height: 844px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.sfm-top {
  padding: 0 16px 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.sfm-field-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 8px 16px;
}
.sfm-field-row .cancel {
  font-size: 13px;
  color: var(--fg-soft);
  letter-spacing: -0.005em;
}
.sfm-body {
  flex: 1;
  overflow: hidden;
  padding: 8px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.sfm-group { display: flex; flex-direction: column; gap: 6px; }
.sfm-group-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 6px 2px 4px;
  border-bottom: 1px solid var(--hair);
}
.sfm-group-head .t { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); }
.sfm-group-head .c { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); }
.sfm-group-head .all { margin-left: auto; font-size: 10px; color: var(--fg-soft); letter-spacing: 0.06em; text-transform: uppercase; }

.sfm-row {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 10px 4px;
  border-bottom: 1px solid var(--hair);
}
.sfm-row:last-child { border-bottom: 0; }
.sfm-row[data-state="pressed"]  { background: var(--panel); }
.sfm-row[data-state="selected"] { background: var(--panel); box-shadow: inset 2px 0 0 var(--fg); }
.sfm-row .ic {
  width: 36px; height: 36px;
  border-radius: var(--r-1);
  background: var(--placeholder);
  display: grid;
  place-items: center;
  color: var(--fg-mute);
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.sfm-row .t { font-size: 13px; color: var(--fg); letter-spacing: -0.005em; }
.sfm-row .s { font-size: 11px; color: var(--fg-mute); margin-top: 2px; font-family: var(--font-mono); }
.sfm-row .m { font-family: var(--font-mono); font-size: 10px; color: var(--fg-soft); }
.sfm-row mark { background: none; color: var(--fg); font-weight: var(--w-title); }

/* Trending / recent compact rows */
.sfm-qrow {
  display: grid;
  grid-template-columns: 16px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 2px;
  border-bottom: 1px solid var(--hair);
  font-size: 13px;
}
.sfm-qrow:last-child { border-bottom: 0; }
.sfm-qrow .ic { color: var(--fg-mute); display: inline-flex; }
.sfm-qrow .m { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); }

/* Category chip grid */
.sfm-chips {
  display: flex; gap: 6px; flex-wrap: wrap;
}

/* Filter sheet overlay */
.sfm-sheet {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  background: var(--bg);
  border-top: 1px solid var(--hair-2);
  border-top-left-radius: 12px;
  border-top-right-radius: 12px;
  padding: 12px 16px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-height: 78%;
}
.sfm-sheet-grab {
  width: 40px; height: 4px;
  background: var(--hair-2);
  border-radius: var(--r-full);
  margin: 0 auto 4px;
}
.sfm-sheet-head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  font-size: 13px;
}
.sfm-sheet-head .title { text-align: center; font-weight: var(--w-title); letter-spacing: -0.01em; font-size: 14px; }
.sfm-sheet-head .cancel { color: var(--fg-soft); }
.sfm-sheet-head .apply  { color: var(--fg); font-weight: var(--w-title); }
.sfm-sheet-row { display: flex; flex-direction: column; gap: 8px; }
.sfm-sheet-row .lbl { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-mute); }
.sfm-sheet-row .chips { display: flex; gap: 6px; flex-wrap: wrap; }

/* Scrim for mobile overlay frame */
.sfm-scrim { position: absolute; inset: 0; background: var(--scrim); }

/* Empty / error centered */
.sfm-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 20px 24px;
  text-align: center;
  gap: 10px;
}
.sfm-center .glyph {
  width: 56px; height: 56px;
  display: grid; place-items: center;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  color: var(--fg-soft);
  margin-bottom: 4px;
}
.sfm-center h1 {
  font-size: 22px; font-weight: var(--w-ui);
  letter-spacing: -0.02em;
  margin: 0;
  text-wrap: balance;
}
.sfm-center p { font-size: 12px; color: var(--fg-soft); line-height: 1.5; margin: 0; max-width: 280px; }
.sfm-center .acts { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
.sfm-hints { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 16px; }
.sfm-hint {
  display: grid;
  grid-template-columns: 26px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  text-align: left;
}
.sfm-hint .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); }
.sfm-hint .t { font-size: 12px; color: var(--fg); }
.sfm-hint .s { font-size: 10px; color: var(--fg-mute); font-family: var(--font-mono); margin-top: 2px; }

/* Auth gate on mobile */
.sfm-gate {
  margin: 24px 8px;
  padding: 20px 20px 24px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  background: var(--panel);
  display: flex; flex-direction: column; gap: 10px;
}
.sfm-gate .lock {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  color: var(--fg-soft);
}
.sfm-gate h2 { margin: 2px 0 0; font-size: 18px; font-weight: var(--w-ui); letter-spacing: -0.02em; }
.sfm-gate p  { margin: 0; font-size: 12px; color: var(--fg-soft); line-height: 1.5; }
.sfm-gate .socials { display: grid; gap: 6px; margin-top: 4px; }
.sfm-gate .foot { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); margin-top: 2px; }

/* ============================================================
   STATES SPECIMEN · .sfs — interaction-state grid
   ============================================================ */
.sfs {
  width: 1800px;
  height: 900px;
  background: var(--bg);
  color: var(--fg);
  padding: 40px 48px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
}
.sfs-head { display: flex; align-items: baseline; gap: 16px; }
.sfs-head .k { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-mute); }
.sfs-head h2 { margin: 0; font-size: 28px; font-weight: var(--w-ui); letter-spacing: -0.02em; }
.sfs-head .s { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); }

.sfs-cols {
  display: grid;
  grid-template-columns: 1.2fr 1.1fr 0.9fr 0.9fr 0.9fr;
  gap: 24px;
  flex: 1;
  min-height: 0;
}
.sfs-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: 16px;
  min-height: 0;
  overflow: hidden;
}
.sfs-col .col-t { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); }
.sfs-col .col-s { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); margin-bottom: 4px; }
.sfs-row {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 12px;
  align-items: center;
  padding: 8px 0;
  border-top: 1px dashed var(--hair);
}
.sfs-row:first-of-type { border-top: 0; }
.sfs-row .state {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* ========== flow-onboarding.css ========== */
/* =========================================================
   Flow · Onboarding — end-to-end (F · Onboarding)
   Column-0 placement (matches Search / Chatbot convention):
     x = 0, y = 14000 (directly below Chatbot at y=10000).
   Reuses .flow-intro shared card + all .wf-* / .ki-* primitives.
   No new color, weight, or radius tokens. onb-* prefix owned
   by this flow; no other flow may edit this block.
   ========================================================= */

.onb { padding: 0; background: var(--bg); }  /* top breathing room now lives on shared .ki-mobile */
.onb-head {
  flex: 0 0 auto;
  height: 48px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.onb-back, .onb-skip {
  height: 32px;
  min-width: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 10px;
  font-size: 12px;
  font-weight: var(--w-ui);
  color: var(--fg-soft);
  border-radius: var(--r-full);
  background: transparent;
  cursor: pointer;
}
.onb-back:hover, .onb-skip:hover { color: var(--fg); }
.onb-head-sp { display: inline-block; width: 32px; }
.onb-dots { display: flex; gap: 6px; align-items: center; }
.onb-dot { width: 18px; height: 3px; border-radius: var(--r-full); background: var(--hair-2); }
.onb-dot[data-state="done"] { background: var(--fg-soft); }
.onb-dot[data-state="current"] { background: var(--fg); width: 28px; }

.onb-body {
  flex: 1;
  min-height: 0;
  padding: 12px 24px 0;
  display: flex;
  flex-direction: column;
  gap: 18px;
  overflow: hidden;
}
.onb-foot { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 10px; }
.onb-foot .wf-btn { width: 100%; justify-content: center; }

.onb-kicker { font-size: 10px; font-weight: var(--w-ui); letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-mute); }
.onb-title { font-size: 26px; font-weight: var(--w-title); letter-spacing: -0.03em; line-height: 1.08; margin: 0; text-wrap: balance; }
.onb-sub { font-size: 13px; color: var(--fg-soft); font-weight: 400; line-height: 1.5; text-wrap: pretty; margin: 0; }
.onb-micro { font-size: 11px; color: var(--fg-soft); text-align: center; }
.onb-micro a, .onb-foot a { color: var(--fg); font-weight: var(--w-title); cursor: pointer; }
.onb-head-block { display: flex; flex-direction: column; gap: 8px; }

/* Welcome hero — full-bleed poster stub */
.onb-welcome-hero {
  flex: 1;
  margin: -10px -24px 0;
  background: var(--placeholder);
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 32px 28px 28px;
}
.onb-welcome-hero .tag { position: absolute; top: 24px; left: 28px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-mute); }
.onb-welcome-hero .mark { position: absolute; top: 22px; right: 28px; color: var(--bone); font-size: 13px; font-weight: var(--w-title); letter-spacing: -0.02em; }
.onb-welcome-hero .wash { position: absolute; inset: 0; background: var(--wash); pointer-events: none; }
.onb-welcome-hero .cap { position: relative; z-index: 1; color: var(--bone); display: flex; flex-direction: column; gap: 10px; }
.onb-welcome-hero .cap h1 { font-size: 30px; font-weight: var(--w-title); letter-spacing: -0.03em; line-height: 1.04; margin: 0; text-wrap: balance; }
.onb-welcome-hero .cap p { font-size: 13px; color: var(--bone-soft); font-weight: var(--w-meta); line-height: 1.5; margin: 0; }

/* Auth chooser */
.onb-socials { display: flex; flex-direction: column; gap: 8px; }
.onb-divider { display: flex; align-items: center; gap: 10px; color: var(--fg-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; }
.onb-divider .l { flex: 1; height: 1px; background: var(--hair); }

/* Form fields */
.onb-fieldset { display: flex; flex-direction: column; gap: 12px; }
.onb-field { display: flex; flex-direction: column; gap: 6px; }
.onb-field[data-state="focus"] .wf-input { border-color: var(--fg); box-shadow: 0 0 0 2px var(--bone-raised); }
.onb-field[data-state="error"] .wf-input { border-color: var(--fg); box-shadow: inset 0 0 0 1px var(--fg); }
.onb-field[data-state="disabled"] .wf-input { opacity: 0.5; }
.onb-field[data-state="filled"] .wf-input input { color: var(--fg); }
.onb-help { font-size: 11px; color: var(--fg-mute); letter-spacing: 0; }
.onb-help.error { color: var(--fg); font-weight: var(--w-ui); }
.onb-help.error::before { content: "!  "; font-family: var(--font-mono); font-weight: var(--w-bold); }
.onb-inline-hint { font-size: 11px; color: var(--fg-soft); display: flex; justify-content: space-between; font-family: var(--font-mono); }

/* OTP 6-digit */
.onb-otp { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.onb-otp-box {
  aspect-ratio: 1 / 1.15;
  display: grid;
  place-items: center;
  background: var(--input);
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  font-size: 22px;
  font-weight: var(--w-title);
  letter-spacing: -0.02em;
  color: var(--fg);
  position: relative;
}
.onb-otp-box[data-state="filled"] { border-color: var(--hair-2); }
.onb-otp-box[data-state="current"] {
  border-color: var(--fg);
  box-shadow: 0 0 0 2px var(--bone-raised);
  color: transparent;
}
.onb-otp-box[data-state="current"]::after {
  content: ""; width: 1px; height: 22px; background: var(--fg);
  animation: onb-caret 1s steps(2) infinite;
}
.onb-otp-box[data-state="error"] { border-color: var(--fg); box-shadow: inset 0 0 0 1px var(--fg); color: var(--fg); }
@keyframes onb-caret { 50% { opacity: 0; } }

/* Avatar upload */
.onb-avatar-up {
  width: 116px; height: 116px;
  border-radius: 50%;
  border: 1px dashed var(--hair-2);
  display: grid; place-items: center;
  align-self: center;
  color: var(--fg-mute);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin: 8px 0 4px;
  position: relative;
}
.onb-avatar-up::after {
  content: "+"; position: absolute; bottom: -4px; right: -4px;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--fg); color: var(--bg);
  display: grid; place-items: center;
  font-size: 18px; font-weight: var(--w-ui);
  line-height: 1;
}

/* Role chooser */
.onb-roles { display: flex; flex-direction: column; gap: 10px; }
.onb-role {
  padding: 16px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  display: flex;
  flex-direction: column;
  gap: 4px;
  text-align: left;
  color: var(--fg);
  background: transparent;
  position: relative;
  cursor: pointer;
}
.onb-role:hover { border-color: var(--fg); }
.onb-role[aria-pressed="true"] { border-color: var(--fg); background: var(--bone-raised); }
.onb-role[aria-pressed="true"]::after {
  content: "✓"; position: absolute; top: 14px; right: 14px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--fg); color: var(--bg);
  display: grid; place-items: center;
  font-size: 11px; font-weight: var(--w-bold);
}
.onb-role .t { font-size: 15px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.onb-role .s { font-size: 12px; color: var(--fg-soft); font-weight: 400; line-height: 1.45; }

/* Chips (interests) — reuse .wf-pill, add data-state variants */
.onb-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.onb-chips .wf-pill { cursor: pointer; font-size: 11px; padding: 6px 12px; }

/* Neighborhoods */
.onb-neigh { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.onb-neigh button {
  padding: 11px 12px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  font-size: 12px;
  font-weight: var(--w-ui);
  color: var(--fg);
  text-align: left;
  background: transparent;
  cursor: pointer;
  letter-spacing: -0.005em;
}
.onb-neigh button:hover { border-color: var(--fg); }
.onb-neigh button[aria-pressed="true"] { background: var(--fg); color: var(--bg); border-color: var(--fg); }

/* Follow suggestions */
.onb-follow-list { display: flex; flex-direction: column; }
.onb-follow-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--hair);
}
.onb-follow-row:last-child { border-bottom: 0; }
.onb-follow-row .av {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--placeholder);
  display: grid; place-items: center;
  font-size: 11px; font-weight: var(--w-title); letter-spacing: -0.01em;
  color: var(--fg-mute);
  flex-shrink: 0;
}
.onb-follow-row .tx { flex: 1; min-width: 0; }
.onb-follow-row .tx .n { font-size: 13px; font-weight: var(--w-ui); letter-spacing: -0.005em; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.onb-follow-row .tx .m { font-size: 11px; color: var(--fg-soft); font-family: var(--font-mono); margin-top: 2px; }
.onb-follow-row .wf-btn { padding: 5px 12px; font-size: 10px; letter-spacing: 0.06em; }

/* Notification toggles */
.onb-toggles { display: flex; flex-direction: column; }
.onb-toggle-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--hair);
}
.onb-toggle-row:last-child { border-bottom: 0; }
.onb-toggle-row .tx { flex: 1; }
.onb-toggle-row .tx .n { font-size: 13px; font-weight: var(--w-ui); letter-spacing: -0.005em; color: var(--fg); }
.onb-toggle-row .tx .m { font-size: 11px; color: var(--fg-soft); margin-top: 2px; font-weight: 400; line-height: 1.4; }
/* .onb-sw styling is provided by the canonical .wf-switch primitive (DS). */

/* Done */
.onb-done { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px 0 0; }
.onb-done-tick {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 1px solid var(--fg);
  display: grid; place-items: center;
  color: var(--fg);
}
.onb-done-feed { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; text-align: left; width: 100%; }
.onb-done-feed .lab { font-size: 10px; color: var(--fg-mute); letter-spacing: 0.12em; text-transform: uppercase; }
.onb-done-card {
  display: flex; gap: 12px; align-items: center;
  padding: 10px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
}
.onb-done-card .thumb { width: 44px; height: 44px; background: var(--placeholder); border-radius: var(--r-1); flex-shrink: 0; }
.onb-done-card .t { font-size: 13px; font-weight: var(--w-ui); letter-spacing: -0.005em; }
.onb-done-card .m { font-size: 11px; color: var(--fg-soft); font-family: var(--font-mono); margin-top: 2px; }

/* Inline alert — error states */
.onb-alert {
  padding: 10px 12px;
  border: 1px solid var(--hair-2);
  border-left: 2px solid var(--fg);
  border-radius: var(--r-1);
  background: var(--bone-raised);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.onb-alert .t { font-size: 12px; font-weight: var(--w-title); letter-spacing: -0.005em; }
.onb-alert .m { font-size: 11px; color: var(--fg-soft); line-height: 1.45; font-weight: 400; }
.onb-alert .m a { color: var(--fg); font-weight: var(--w-title); cursor: pointer; }

/* Loading stub */
.onb-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; flex: 1; color: var(--fg-soft); font-size: 12px; }
.onb-spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--hair-2);
  border-top-color: var(--fg);
  border-radius: 50%;
  animation: onb-spin 1s linear infinite;
}
@keyframes onb-spin { to { transform: rotate(360deg); } }

/* Illustration circle (inbox / bell / etc.) */
.onb-ill {
  width: 72px; height: 72px;
  margin: 12px auto 4px;
  border-radius: 50%;
  border: 1px solid var(--hair-2);
  display: grid; place-items: center;
  color: var(--fg-soft);
}

/* Suggestion chips under "handle taken" */
.onb-suggest-row { display: flex; flex-wrap: wrap; gap: 6px; }
.onb-suggest-row .wf-pill { cursor: pointer; font-size: 11px; }

/* Resend timer caption */
.onb-resend { font-size: 11px; color: var(--fg-soft); text-align: center; font-family: var(--font-mono); }
.onb-resend a { color: var(--fg); font-weight: var(--w-title); }
.onb-resend .muted { color: var(--fg-mute); }

/* Web desktop variant — split panel */
.onb-w {
  width: 100%; height: 100%;
  display: grid;
  grid-template-columns: 5fr 7fr;
  background: var(--bg);
}
.onb-w-aside {
  background: var(--panel);
  padding: 40px 40px 36px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-right: 1px solid var(--hair);
  gap: 24px;
}
.onb-w-aside .brand { font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.02em; }
.onb-w-progress { display: flex; flex-direction: column; gap: 8px; }
.onb-w-progress .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-mute); margin-bottom: 6px; }
.onb-w-step { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--fg-mute); font-weight: var(--w-ui); letter-spacing: -0.005em; }
.onb-w-step .n { font-family: var(--font-mono); font-size: 11px; width: 16px; color: var(--fg-mute); }
.onb-w-step[data-state="done"] { color: var(--fg-soft); }
.onb-w-step[data-state="done"] .n { color: var(--fg-soft); }
.onb-w-step[data-state="current"] { color: var(--fg); }
.onb-w-step[data-state="current"] .n { color: var(--fg); font-weight: var(--w-title); }
.onb-w-quote { font-size: 20px; font-weight: var(--w-title); letter-spacing: -0.02em; line-height: 1.25; text-wrap: balance; }
.onb-w-quote-meta { font-size: 11px; color: var(--fg-soft); font-family: var(--font-mono); margin-top: 10px; letter-spacing: 0; }

.onb-w-pane { padding: 56px 72px; display: flex; flex-direction: column; justify-content: center; gap: 16px; max-width: 640px; }
.onb-w-pane h1 { font-size: 36px; font-weight: var(--w-title); letter-spacing: -0.03em; line-height: 1.05; margin: 0; text-wrap: balance; }
.onb-w-pane .sub { font-size: 14px; color: var(--fg-soft); font-weight: 400; line-height: 1.5; margin: 0 0 8px; }
.onb-w-pane .onb-socials .wf-btn { justify-content: flex-start; padding: 12px 16px; }
.onb-w-pane .mfw-field { display: flex; flex-direction: column; gap: 6px; }
.onb-w-pane .mfw-field .wf-label { margin: 0; }
.onb-w-legal { font-size: 11px; color: var(--fg-mute); margin-top: 6px; line-height: 1.5; }

.onb-w-done {
  display: grid;
  place-items: center;
  width: 100%; height: 100%;
  background: var(--bg);
  padding: 64px;
}
.onb-w-done .card { max-width: 560px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; }
.onb-w-done .onb-done-tick { width: 72px; height: 72px; }
.onb-w-done h1 { font-size: 36px; font-weight: var(--w-title); letter-spacing: -0.03em; line-height: 1.05; margin: 0; }
.onb-w-done p { font-size: 14px; color: var(--fg-soft); line-height: 1.5; margin: 0; max-width: 440px; }
.onb-w-done .row { display: flex; gap: 10px; margin-top: 6px; }

/* Interaction-states specimen frame */
.onb-specimen { padding: 40px 48px; height: 100%; display: flex; flex-direction: column; gap: 22px; overflow: hidden; background: var(--bg); }
.onb-specimen .head { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--hair); padding-bottom: 14px; }
.onb-specimen .head h2 { font-size: 22px; font-weight: var(--w-title); letter-spacing: -0.02em; margin: 0; }
.onb-specimen .head .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-mute); }
.onb-specimen-grid { display: grid; grid-template-columns: 150px 1fr; gap: 18px 32px; align-items: start; }
.onb-specimen-grid .lab { font-size: 11px; color: var(--fg-mute); letter-spacing: 0.08em; text-transform: uppercase; padding-top: 12px; }
.onb-specimen-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; }
.onb-specimen-cell { display: flex; flex-direction: column; align-items: stretch; gap: 4px; }
.onb-specimen-cell .cap { font-size: 10px; color: var(--fg-mute); font-family: var(--font-mono); text-align: center; letter-spacing: 0; white-space: nowrap; }
.onb-specimen-cell .wf-btn[data-state="hover"] { border-color: var(--fg); color: var(--fg); }
.onb-specimen-cell .wf-btn[data-state="focus"] { border-color: var(--fg); box-shadow: 0 0 0 2px var(--bone-raised); }
.onb-specimen-cell .wf-btn[data-state="active"] { background: var(--fg); color: var(--bg); border-color: var(--fg); transform: translateY(1px); }
.onb-specimen-cell .wf-btn[data-state="disabled"] { opacity: 0.4; cursor: not-allowed; }
.onb-specimen-cell .wf-btn[data-state="loading"] { color: transparent; position: relative; }
.onb-specimen-cell .wf-btn[data-state="loading"]::after {
  content: ""; position: absolute;
  top: 50%; left: 50%;
  margin: -6px 0 0 -6px;
  width: 12px; height: 12px;
  border: 2px solid var(--fg); border-top-color: transparent;
  border-radius: 50%; animation: onb-spin 1s linear infinite;
}
.onb-specimen-cell .wf-input { min-width: 180px; font-size: 12px; padding: 10px 12px; }
.onb-specimen-cell .wf-input[data-state="focus"] { border-color: var(--fg); box-shadow: 0 0 0 2px var(--bone-raised); }
.onb-specimen-cell .wf-input[data-state="error"] { border-color: var(--fg); box-shadow: inset 0 0 0 1px var(--fg); }
.onb-specimen-cell .wf-input[data-state="disabled"] { opacity: 0.5; }
.onb-specimen-cell .wf-pill[data-state="hover"] { border-color: var(--fg); }
.onb-specimen-cell .wf-pill[data-state="focus"] { box-shadow: 0 0 0 2px var(--bone-raised); }
.onb-specimen-cell .wf-pill[data-state="disabled"] { opacity: 0.4; }
.onb-specimen .sw-demo { display: inline-flex; align-items: center; gap: 10px; font-size: 11px; color: var(--fg-soft); padding: 6px 0; }


/* ========== flow-notifications.css ========== */
/* =========================================================
   Flow · Notifications — end-to-end
   Sits in the Flows zone, mid-column (x = 36000). Inbox,
   popover, tray, settings, push preview + every auth /
   error / empty / loading / interaction state.
   Uses only tokens + wf-* / ki-* / .flow-intro shared.
   nfw-* = web · nfm-* = mobile · nf-* = shared row anatomy.
   ========================================================= */

/* ---- Shared row anatomy (web + mobile scale it) ---- */
.nf-row {
  display: grid;
  grid-template-columns: 10px 40px 1fr auto;
  gap: 14px;
  align-items: flex-start;
  padding: 14px 4px;
  border-bottom: 1px solid var(--hair);
  position: relative;
}
.nf-row .dot-col { align-self: center; display: grid; place-items: center; }
.nf-row .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--fg);
  display: inline-block;
}
.nf-row[data-read="true"] .dot { opacity: 0; }
.nf-row .av {
  width: 40px; height: 40px;
  border-radius: var(--r-full);
  background: var(--placeholder);
  display: grid; place-items: center;
  font-size: 11px; font-weight: var(--w-ui);
  color: var(--fg-soft);
  border: 1px solid var(--hair);
  flex: 0 0 auto;
  letter-spacing: 0;
}
.nf-row .av[data-shape="square"] { border-radius: var(--r-1); }
.nf-row .tx { min-width: 0; }
.nf-row .tx .t {
  font-size: 14px;
  letter-spacing: -0.01em;
  color: var(--fg);
  line-height: 1.35;
}
.nf-row[data-read="true"] .tx .t { color: var(--fg-soft); }
.nf-row .tx .t b { font-weight: var(--w-title); }
.nf-row .tx .m {
  margin-top: 4px;
  font-size: 11px;
  color: var(--fg-mute);
  font-weight: 400;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  letter-spacing: 0;
}
.nf-row .tx .m .mono { font-family: var(--font-mono); }
.nf-row .tx .inline-actions {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}
.nf-row .tx .inline-actions .wf-btn { padding: 6px 12px; font-size: 10px; }
.nf-row .trail {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  white-space: nowrap;
  align-self: flex-start;
  padding-top: 2px;
  letter-spacing: 0;
}

.nf-row[data-state="hover"]  { background: var(--panel); }
.nf-row[data-state="focus"]  { outline: 1.5px solid var(--fg); outline-offset: -1px; }
.nf-row[data-state="active"] { background: var(--panel); }
.nf-row[data-state="selected"] {
  background: var(--fg); color: var(--bg);
}
.nf-row[data-state="selected"] .tx .t,
.nf-row[data-state="selected"] .tx .m,
.nf-row[data-state="selected"] .trail { color: var(--bg); }
.nf-row[data-state="selected"] .dot { background: var(--bg); }
.nf-row[data-state="selected"] .av { border-color: var(--bg); color: var(--bg); background: var(--bone-dim); }
.nf-row[data-state="selected"] .wf-btn { color: var(--bg); border-color: var(--bg); }

.nf-row[data-state="loading"] { pointer-events: none; }
.nf-row[data-state="loading"] .av { background: var(--hair); border-color: transparent; color: transparent; }
.nf-row[data-state="loading"] .tx .t { color: transparent; background: var(--hair); height: 10px; border-radius: 2px; width: 72%; }
.nf-row[data-state="loading"] .tx .m { background: var(--hair); height: 8px; border-radius: 2px; width: 38%; color: transparent; display: block; }
.nf-row[data-state="loading"] .trail { color: transparent; background: var(--hair); height: 8px; border-radius: 2px; width: 28px; }
.nf-row[data-state="loading"] .dot { opacity: 0; }
.nf-row[data-state="disabled"] { opacity: 0.4; }

/* Swipe-to-dismiss reveal (mobile, static).
   Static post-swipe state: row keeps its text visible (no left-clip),
   actions occupy the right edge. */
.nf-row[data-swipe="true"] {
  padding-right: 138px;
  grid-template-columns: 8px 32px 1fr;
}
.nf-row[data-swipe="true"] .trail { display: none; }
.nf-row-swipe-actions {
  position: absolute;
  top: 0; bottom: 0; right: 0;
  width: 128px;
  display: none;
  align-items: stretch;
  pointer-events: none;
}
.nf-row[data-swipe="true"] .nf-row-swipe-actions {
  display: flex;
  pointer-events: auto;
}
.nf-row-swipe-actions button {
  flex: 1;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: var(--w-ui);
  color: var(--bg);
  background: var(--fg);
}
.nf-row-swipe-actions button:first-child {
  background: var(--fg-soft);
  border-right: 1px solid var(--bg);
}

.nf-group-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 18px 4px 10px;
}
.nf-group-head .t {
  font-size: 10px;
  font-weight: var(--w-ui);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-mute);
}
.nf-group-head .cnt {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0;
}

/* ============ WEB FLOW ============ */
.nfw {
  width: 1440px;
  min-height: 800px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.nfw-nav {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 14px 32px;
  border-bottom: 1px solid var(--hair);
  flex: 0 0 auto;
  position: relative;
  z-index: 5;
}
.nfw-nav .brand {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--fg);
}
.nfw-nav .tabs {
  display: flex;
  gap: 22px;
  font-size: 12px;
  font-weight: var(--w-ui);
  color: var(--fg-mute);
}
.nfw-nav .tabs a[aria-current="page"] { color: var(--fg); }
.nfw-nav .spacer { flex: 1; }
.nfw-nav .search {
  width: 260px;
  padding: 7px 10px;
  background: var(--input);
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--fg-mute);
}
.nfw-nav .notif-anchor {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  border: 1px solid var(--hair);
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: var(--w-ui);
  color: var(--fg);
}
.nfw-nav .notif-anchor[data-active="true"] {
  background: var(--fg); color: var(--bg); border-color: var(--fg);
}
.nfw-nav .notif-anchor .cnt {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: var(--r-full);
  background: var(--fg);
  color: var(--bg);
  line-height: 1;
  min-width: 16px;
  text-align: center;
  letter-spacing: 0;
}
.nfw-nav .notif-anchor[data-active="true"] .cnt { background: var(--bg); color: var(--fg); }
.nfw-nav .notif-anchor .cnt[data-zero="true"] {
  background: transparent; color: var(--fg-mute); border: 1px solid var(--hair-2); padding: 1px 5px;
}
.nfw-nav .avatar {
  width: 30px; height: 30px; border-radius: var(--r-full);
  background: var(--panel);
  border: 1px solid var(--hair);
  display: grid; place-items: center;
  font-size: 10px; font-weight: var(--w-ui);
  color: var(--fg-soft);
  letter-spacing: 0;
}

.nfw-sub {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 14px 32px;
  border-bottom: 1px solid var(--hair);
  flex: 0 0 auto;
}
.nfw-sub .tabs { display: flex; gap: 22px; }
.nfw-sub .tabs a {
  font-size: 12px;
  color: var(--fg-mute);
  padding: 6px 0;
  border-bottom: 1px solid transparent;
  display: inline-flex;
  gap: 6px;
  align-items: baseline;
}
.nfw-sub .tabs a[aria-current="page"] {
  color: var(--fg);
  border-bottom-color: var(--fg);
}
.nfw-sub .tabs a .c {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0;
}
.nfw-sub .tabs a[aria-current="page"] .c { color: var(--fg-soft); }
.nfw-sub .spacer { flex: 1; }
.nfw-sub .actions {
  display: flex;
  gap: 18px;
  color: var(--fg-soft);
  font-size: 11px;
  align-items: center;
}
.nfw-sub .actions .wf-btn { padding: 6px 12px; font-size: 10px; }
.nfw-sub .actions .link { color: var(--fg-soft); }

.nfw-body {
  padding: 28px 64px 40px;
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 56px;
}

.nfw-title {
  font-size: 32px;
  font-weight: var(--w-title);
  letter-spacing: -0.03em;
  margin: 0 0 4px;
  line-height: 1.05;
}
.nfw-title-sub {
  font-size: 12px;
  color: var(--fg-mute);
  font-family: var(--font-mono);
  letter-spacing: 0;
  margin-bottom: 8px;
}

.nfw-side { border-left: 1px solid var(--hair); padding-left: 28px; }
.nfw-side .block { margin-bottom: 28px; }
.nfw-side .block-head {
  font-size: 10px;
  font-weight: var(--w-ui);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-mute);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--hair);
  margin-bottom: 6px;
}
.nfw-side-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 0;
  font-size: 12px;
  color: var(--fg-soft);
  border-bottom: 1px dashed var(--hair);
}
.nfw-side-item[aria-current="page"] { color: var(--fg); font-weight: var(--w-ui); }
.nfw-side-item .c { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); letter-spacing: 0; }
.nfw-side-quiet {
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: 12px 14px;
  font-size: 11px;
  color: var(--fg-soft);
}
.nfw-side-quiet .k { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 4px; }
.nfw-side-quiet .t { color: var(--fg); font-weight: var(--w-ui); }
.nfw-side-quiet .s { color: var(--fg-mute); margin-top: 6px; line-height: 1.5; display: block; font-size: 11px; }

/* Popover (drops from nav anchor) */
.nfw-pop {
  position: absolute;
  top: 58px;
  right: 80px;
  width: 420px;
  max-height: 560px;
  background: var(--bg);
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  box-shadow: 0 24px 60px rgba(0,0,0,0.28), 0 0 0 1px var(--hair);
  z-index: 6;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.nfw-pop-arrow {
  position: absolute;
  top: -6px; right: 40px;
  width: 10px; height: 10px;
  background: var(--bg);
  border-top: 1px solid var(--hair-2);
  border-left: 1px solid var(--hair-2);
  transform: rotate(45deg);
}
.nfw-pop-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--hair);
}
.nfw-pop-head .t { font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.nfw-pop-head .a { font-size: 11px; color: var(--fg-soft); }
.nfw-pop-tabs {
  display: flex;
  gap: 16px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--hair);
}
.nfw-pop-tabs a {
  font-size: 11px;
  color: var(--fg-mute);
  border-bottom: 1px solid transparent;
  padding: 2px 0;
  display: inline-flex;
  gap: 5px;
  align-items: baseline;
}
.nfw-pop-tabs a[aria-current="page"] { color: var(--fg); border-bottom-color: var(--fg); }
.nfw-pop-tabs a .c { font-family: var(--font-mono); font-size: 9px; color: var(--fg-mute); letter-spacing: 0; }
.nfw-pop-scroll {
  overflow: hidden;
  padding: 4px 16px 12px;
  flex: 1;
}
.nfw-pop-scroll .nf-row {
  grid-template-columns: 8px 32px 1fr auto;
  padding: 10px 0;
  gap: 10px;
}
.nfw-pop-scroll .nf-row .av { width: 32px; height: 32px; font-size: 10px; }
.nfw-pop-scroll .nf-row .tx .t { font-size: 12px; }
.nfw-pop-scroll .nf-row .tx .m { font-size: 10px; margin-top: 2px; }
.nfw-pop-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-top: 1px solid var(--hair);
  font-size: 11px;
  color: var(--fg-soft);
}
.nfw-pop-foot .mono { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); letter-spacing: 0; }

.nfw-dim {
  position: absolute;
  inset: 54px 0 0 0;
  background: var(--placeholder);
  pointer-events: none;
  z-index: 4;
}

/* State cards */
.nfw-state {
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: 40px 36px;
  max-width: 560px;
  margin: 32px auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.nfw-state .wf-kicker { margin-bottom: 4px; }
.nfw-state h2 {
  font-size: 28px;
  font-weight: var(--w-title);
  letter-spacing: -0.03em;
  margin: 0;
  line-height: 1.05;
}
.nfw-state p {
  font-size: 13px;
  color: var(--fg-soft);
  margin: 4px 0 10px;
  line-height: 1.55;
  font-weight: 400;
  letter-spacing: -0.005em;
}
.nfw-state .row-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.nfw-state-hints {
  margin-top: 8px;
  border-top: 1px solid var(--hair);
  padding-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.nfw-state-hint {
  display: grid;
  grid-template-columns: 28px 1fr 16px;
  gap: 14px;
  align-items: center;
  font-size: 12px;
}
.nfw-state-hint .n {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0;
}
.nfw-state-hint .s { color: var(--fg-mute); font-size: 11px; }
.nfw-state-hint .chev { color: var(--fg-mute); }

/* Inline banner (re-auth / offline / failed) */
.nfw-inline-banner {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  margin-bottom: 18px;
  background: var(--panel);
}
.nfw-inline-banner .ic {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  color: var(--fg);
  flex: 0 0 auto;
}
.nfw-inline-banner .tx { flex: 1; font-size: 12px; }
.nfw-inline-banner .tx .t { font-weight: var(--w-title); }
.nfw-inline-banner .tx .s { color: var(--fg-soft); font-size: 11px; margin-top: 2px; }
.nfw-inline-banner .acts { display: flex; gap: 10px; align-items: center; }
.nfw-inline-banner .acts .link { font-size: 11px; color: var(--fg); font-weight: var(--w-ui); }

.nfw-foot {
  padding: 16px 32px;
  border-top: 1px solid var(--hair);
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--fg-mute);
  font-family: var(--font-mono);
  letter-spacing: 0;
}

/* Settings — channel matrix + quiet hours */
.nfw-channel-matrix {
  margin-top: 12px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  overflow: hidden;
}
.nfw-channel-matrix .row {
  display: grid;
  grid-template-columns: 1fr 88px 88px 88px;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid var(--hair);
}
.nfw-channel-matrix .row:last-child { border-bottom: 0; }
.nfw-channel-matrix .row.head {
  background: var(--panel);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-mute);
  font-weight: var(--w-ui);
  padding: 10px 18px;
}
.nfw-channel-matrix .row .n { font-size: 13px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.nfw-channel-matrix .row .n .s {
  display: block;
  font-size: 11px;
  color: var(--fg-mute);
  font-weight: 400;
  margin-top: 2px;
  letter-spacing: 0;
}
.nfw-channel-matrix .row .cell { text-align: center; }
.nfw-quiet-card {
  margin-top: 18px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: 18px;
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 24px;
  align-items: start;
}
.nfw-quiet-card .k { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-mute); font-weight: var(--w-ui); margin-bottom: 6px; }
.nfw-quiet-card h3 { font-size: 15px; font-weight: var(--w-title); letter-spacing: -0.01em; margin: 0 0 4px; }
.nfw-quiet-card p { font-size: 12px; color: var(--fg-soft); margin: 0; line-height: 1.5; }
.nfw-quiet-card .timing {
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0;
  color: var(--fg);
  display: grid;
  gap: 6px;
}
.nfw-quiet-card .timing .row { display: flex; justify-content: space-between; padding: 0; border-bottom: 0; }
.nfw-quiet-card .timing .row .k2 { color: var(--fg-mute); text-transform: uppercase; font-size: 9px; letter-spacing: 0.1em; }

/* Mobile counterpart of .nfw-quiet-card .timing — same monospace key/value list, full-width. */
.nfm-quiet-card {
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: var(--s-5) var(--s-4);
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--fg);
  display: grid;
  gap: var(--s-2);
}
.nfm-quiet-card .row { display: flex; justify-content: space-between; }
.nfm-quiet-card .row .k2 { color: var(--fg-mute); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
.nfm-quiet-note { font-size: 11px; color: var(--fg-soft); line-height: 1.5; margin-top: var(--s-3); }
.nfm-quiet-acts { display: flex; gap: var(--s-2); margin-top: var(--s-4); }
.nfm-quiet-acts .wf-btn { flex: 1; }

/* Interaction states swatch frame */
.nfw-states-wrap {
  width: 1440px;
  min-height: 800px;
  background: var(--bg);
  color: var(--fg);
  padding: 40px 64px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.nfw-states-wrap .head h1 {
  font-size: 28px;
  font-weight: var(--w-title);
  letter-spacing: -0.03em;
  margin: 0 0 4px;
}
.nfw-states-wrap .head .kl { font-size: 12px; color: var(--fg-mute); font-family: var(--font-mono); letter-spacing: 0; }
.nfw-states-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 32px;
  margin-top: 8px;
}
.nfw-states-cell .lab {
  font-size: 10px;
  font-weight: var(--w-ui);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-mute);
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
.nfw-states-cell .lab .sp {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0;
  color: var(--fg-mute);
  text-transform: none;
}
.nfw-states-cell .box {
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: 4px 14px;
  background: var(--bg);
}

/* ============ MOBILE FLOW ============ */
.nfm {
  width: 390px;
  height: 844px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.nfm-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 12px 20px 8px;
  flex: 0 0 auto;
}
.nfm-header h1 {
  font-size: 28px;
  font-weight: var(--w-title);
  letter-spacing: -0.03em;
  margin: 0;
  line-height: 1.05;
}
.nfm-header .meta {
  font-size: 11px;
  color: var(--fg-mute);
  font-family: var(--font-mono);
  letter-spacing: 0;
  margin-top: 6px;
}
.nfm-header .acts { display: flex; gap: 8px; align-items: center; }
.nfm-header .acts button {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: var(--r-full);
  border: 1px solid var(--hair);
  color: var(--fg-soft);
}
.nfm-header .acts button[data-primary] { background: var(--fg); color: var(--bg); border-color: var(--fg); }

.nfm-filter {
  padding: 8px 20px 10px;
  display: flex;
  gap: 6px;
  overflow: hidden;
  flex: 0 0 auto;
}
.nfm-filter .wf-pill { padding: 5px 11px; font-size: 11px; }

.nfm-scroll {
  flex: 1;
  overflow: hidden;
  padding: 0 20px;
  position: relative;
}
.nfm-scroll .nf-row {
  grid-template-columns: 8px 36px 1fr auto;
  padding: 12px 0;
  gap: 12px;
}
.nfm-scroll .nf-row .av { width: 36px; height: 36px; font-size: 10px; }
.nfm-scroll .nf-row .tx .t { font-size: 13px; }
.nfm-scroll .nf-row .tx .m { font-size: 10px; }
.nfm-scroll .nf-row .tx .inline-actions .wf-btn { font-size: 9px; padding: 5px 10px; }

.nfm-bottom {
  flex: 0 0 auto;
  border-top: 1px solid var(--hair);
  padding: 10px 20px;
  display: flex;
  justify-content: space-around;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.nfm-bottom span[aria-current="page"] { color: var(--fg); font-weight: var(--w-ui); }

.nfm-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px 28px 60px;
  gap: 12px;
}
.nfm-state .wf-kicker { letter-spacing: 0.14em; }
.nfm-state h1 {
  font-size: 24px;
  font-weight: var(--w-title);
  letter-spacing: -0.03em;
  margin: 0;
  line-height: 1.1;
}
.nfm-state p {
  font-size: 12px;
  color: var(--fg-soft);
  line-height: 1.5;
  margin: 0;
}
.nfm-state .row-actions {
  margin-top: 8px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.nfm-state .row-actions .wf-btn { font-size: 10px; padding: 8px 14px; }
.nfm-state .hints {
  margin-top: 14px;
  border-top: 1px solid var(--hair);
  padding-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.nfm-state .hints .hint {
  display: grid;
  grid-template-columns: 22px 1fr 12px;
  gap: 12px;
  align-items: center;
}
.nfm-state .hints .hint .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); letter-spacing: 0; }
.nfm-state .hints .hint .t { font-size: 12px; color: var(--fg); }
.nfm-state .hints .hint .s { color: var(--fg-mute); font-size: 10px; font-family: var(--font-mono); margin-top: 2px; letter-spacing: 0; display: block; }

/* Push preview — lock-screen + banner inside the frame */
.nfm-push {
  flex: 1;
  background: var(--bg);
  position: relative;
  padding: 72px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.nfm-push::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, var(--panel) 0%, transparent 55%);
  pointer-events: none;
}
.nfm-push-time {
  text-align: center;
  font-size: 64px;
  font-weight: 300;
  letter-spacing: -0.05em;
  line-height: 1;
  color: var(--fg);
  position: relative;
}
.nfm-push-date {
  text-align: center;
  font-size: 12px;
  color: var(--fg-soft);
  font-family: var(--font-mono);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 20px;
  position: relative;
}
.nfm-push-card {
  background: var(--panel);
  border: 1px solid var(--hair);
  border-radius: 14px;
  padding: 14px;
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 12px;
  align-items: flex-start;
  position: relative;
}
.nfm-push-card .ic {
  width: 32px; height: 32px;
  border-radius: var(--r-2);
  background: var(--fg);
  color: var(--bg);
  display: grid; place-items: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.nfm-push-card .tx { min-width: 0; }
.nfm-push-card .tx .t { font-size: 13px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.nfm-push-card .tx .s { font-size: 12px; color: var(--fg-soft); margin-top: 3px; line-height: 1.4; letter-spacing: -0.005em; }
.nfm-push-card .when {
  font-size: 10px;
  color: var(--fg-mute);
  font-family: var(--font-mono);
  letter-spacing: 0;
  white-space: nowrap;
}
.nfm-push-stack {
  position: relative;
  margin-top: 2px;
  padding-top: 6px;
  border-top: 1px dashed var(--hair);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0;
  color: var(--fg-mute);
  text-align: center;
}
.nfm-push-hint {
  margin-top: auto;
  padding: 10px 14px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  font-size: 10px;
  color: var(--fg-mute);
  font-family: var(--font-mono);
  letter-spacing: 0;
  line-height: 1.5;
}

/* Callout for entry-point annotation */
.nf-callout-tag {
  position: absolute;
  font-family: var(--font-note);
  font-size: 15px;
  color: var(--fg);
  background: var(--bg);
  padding: 2px 10px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
}
.nf-callout-dash {
  position: absolute;
  border-top: 1px dashed var(--fg-mute);
  pointer-events: none;
}


/* ========== flow-filter.css ========== */
/* =========================================================
   Flow · Filter — end-to-end.
   Column-0 placement (matches Search / Chatbot / Onboarding
   convention): x = 0, y = 14000 — directly below Chatbot at
   (x=0, y=10000, h≈2020). Pushes Onboarding to y=18000.
   .flf-* is layout only. All color / weight / radius / type /
   spacing pulls from existing tokens and wf-* / ki-* / chrome
   primitives — no new tokens.
   ========================================================= */

.flf-m { display: flex; flex-direction: column; height: 100%; }
/* .flf-m-head sits flush under the shared .ki-mobile 10px top breathing.
   8px internal pad → 18px from frame edge, matching sfm/cbm header rhythm. */
.flf-m-head {
  padding: 8px 20px 12px;
  display: flex; align-items: baseline; justify-content: space-between;
  flex: 0 0 auto;
}
.flf-m-head h1 { margin: 0; font-size: 26px; font-weight: var(--w-title); letter-spacing: -0.02em; }
.flf-m-head .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); letter-spacing: 0.04em; }
.flf-m-topbar {
  padding: 0 20px 10px;
  display: flex; gap: 8px; align-items: center;
  flex: 0 0 auto;
}
.flf-m-topbar .sp { flex: 1; }
.flf-m-topbar .wf-pill { font-size: 11px; padding: 5px 12px; }
.flf-m-topbar .wf-pill.ic { gap: 6px; }
.flf-m-scroll { flex: 1; overflow: hidden; padding: 0 20px 24px; }

.flf-sheet-scrim { position: absolute; inset: 0; background: var(--scrim); }
.flf-sheet {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  border-top: 1px solid var(--hair-2);
  border-top-left-radius: var(--r-2);
  border-top-right-radius: var(--r-2);
  display: flex; flex-direction: column;
  max-height: 86%;
}
.flf-sheet .handle {
  width: 40px; height: 4px;
  background: var(--hair-2);
  border-radius: var(--r-full);
  margin: 10px auto 2px;
}
.flf-sheet-head {
  padding: 8px 20px 14px;
  display: flex; align-items: baseline; justify-content: space-between;
  border-bottom: 1px solid var(--hair);
  flex: 0 0 auto;
}
.flf-sheet-head .t { font-size: 17px; font-weight: var(--w-title); letter-spacing: -0.02em; }
.flf-sheet-head .reset { font-size: 11px; color: var(--fg-soft); text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--font-mono); }
.flf-sheet-body { flex: 1; overflow: hidden; padding: 4px 20px; }
.flf-sheet-foot {
  border-top: 1px solid var(--hair);
  padding: 12px 20px 22px;
  display: grid; grid-template-columns: 1fr auto;
  gap: 10px; align-items: center;
  flex: 0 0 auto;
}
.flf-sheet-foot .count { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); letter-spacing: 0.04em; text-transform: uppercase; }
.flf-sheet-foot .wf-btn[data-primary="true"] { padding: 12px 22px; font-size: 11px; }

.flf-sec { padding: 12px 0; border-bottom: 1px solid var(--hair); }
.flf-sec.last { border-bottom: 0; }
.flf-sec-head { display: flex; align-items: center; justify-content: space-between; padding: 2px 0; }
.flf-sec-head .n { font-size: 13px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.flf-sec-head .r { display: flex; align-items: center; gap: 10px; color: var(--fg-mute); }
.flf-sec-head .r .v { font-size: 12px; color: var(--fg-soft); }
.flf-sec-body { padding-top: 10px; }
.flf-sec-body.chips { display: flex; flex-wrap: wrap; gap: 6px; }

.flf-range { padding: 14px 4px 4px; }
.flf-range-track { position: relative; height: 2px; background: var(--hair); border-radius: var(--r-full); }
.flf-range-fill { position: absolute; top: 0; bottom: 0; background: var(--fg); border-radius: var(--r-full); }
.flf-range-thumb {
  position: absolute; top: 50%;
  transform: translate(-50%, -50%);
  width: 14px; height: 14px;
  border-radius: var(--r-full);
  background: var(--bg);
  border: 2px solid var(--fg);
}
.flf-range-labels {
  margin-top: 12px;
  display: flex; justify-content: space-between;
  font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute);
}

/* .flf-switch styling is provided by the canonical .wf-switch primitive (DS). */
.flf-row-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--hair);
}
.flf-row-toggle.last { border-bottom: 0; }
.flf-row-toggle .tx { max-width: 260px; }
.flf-row-toggle .tx .t { font-size: 13px; font-weight: var(--w-title); }
.flf-row-toggle .tx .s { font-size: 12px; color: var(--fg-mute); margin-top: 2px; }

.flf-check { display: flex; align-items: center; padding: 8px 0; font-size: 13px; }
.flf-check .box {
  width: 16px; height: 16px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  display: grid; place-items: center;
  flex: 0 0 auto;
  color: var(--bg);
}
.flf-check[data-on="true"] .box { background: var(--fg); border-color: var(--fg); }
.flf-check .tx { flex: 1; padding-left: 12px; color: var(--fg); display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.flf-check .tx .c { color: var(--fg-mute); font-family: var(--font-mono); font-size: 11px; flex: 0 0 auto; }

.flf-daterange {
  display: grid; grid-template-columns: 1fr 14px 1fr;
  gap: 8px; align-items: center;
  margin-top: 10px;
}
.flf-daterange .sep { text-align: center; color: var(--fg-mute); }
.flf-datebox {
  padding: 9px 12px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  background: var(--input);
}
.flf-datebox .k { font-size: 9px; color: var(--fg-mute); letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-mono); }
.flf-datebox .v { font-size: 13px; font-weight: var(--w-title); margin-top: 2px; }

.flf-cal {
  margin-top: 12px;
  padding: 12px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  background: var(--bg);
}
.flf-cal-head { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: var(--w-title); margin-bottom: 8px; }
.flf-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-soft); text-align: center; }
.flf-cal-grid .dh { color: var(--fg-mute); padding-bottom: 4px; font-size: 9px; letter-spacing: 0.04em; }
.flf-cal-grid .d { padding: 4px 0; border-radius: var(--r-1); }
.flf-cal-grid .d.mute { color: var(--fg-mute); opacity: 0.55; }
.flf-cal-grid .d.range { background: var(--placeholder); color: var(--fg); }
.flf-cal-grid .d.start, .flf-cal-grid .d.end { background: var(--fg); color: var(--bg); }

.flf-chipbar {

.flf-hint { font-size: 11px; color: var(--fg-mute); font-family: var(--font-mono); letter-spacing: 0.04em; }

/* ---- Flow row labels (kicker above each row of frames inside the band) ---- */

/* ---- State tiles (interaction-state studies) ---- */

  padding: 24px 22px 22px;

  gap: 12px; height: 100%;
}
.flf-state-head {

/* ---- Legend / anatomy panels ---- */
.flf-legend { padding: 28px 32px 26px; height: 100%; display: flex; flex-direction: column; gap: 12px; }

}

}
.flf-legend-stage .stage-row {

  font-size: 12px; color: var(--fg-soft);
  padding: 8px 10px; border: 1px solid var(--hair); border-radius: var(--r-1);

.flf-legend-callouts { display: flex; flex-direction: column; gap: 0; overflow: hidden; }

}

}
.flf-callout .tx .t { font-size: 13px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.flf-callout .tx .s { font-size: 11px; color: var(--fg-soft); margin-top: 3px; line-height: 1.5; }

.flf-taxo { overflow: hidden; display: flex; flex-direction: column; }
.flf-taxo-row {
  display: grid; grid-template-columns: 150px 1fr 100px;
  gap: 16px; padding: 12px 0;
  border-bottom: 1px solid var(--hair); align-items: baseline;
}
.flf-taxo-row:last-child { border-bottom: 0; }
.flf-taxo-row .n { font-size: 13px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.flf-taxo-row .d { font-size: 12px; color: var(--fg-soft); line-height: 1.5; }
.flf-taxo-row .k {
  font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute);
  letter-spacing: 0.08em; text-align: right; text-transform: uppercase;
}

/* ---- Skeleton card (web grid loading state) ---- */
.flf-skel-card { display: flex; flex-direction: column; gap: 8px; }
.flf-skel-card .img { aspect-ratio: 4/5; background: var(--placeholder); border-radius: var(--r-1); }
.flf-skel-card .l { height: 8px; background: var(--placeholder); border-radius: var(--r-1); }

.flf-skel-card .l.w70 { width: 70%; }
.flf-skel-card .l.w50 { width: 50%; }

.flf-loading-strip {

  border-bottom: 1px solid var(--hair);

  color: var(--fg-soft); letter-spacing: 0.04em;

/* ---- Preset bar (above the rail, shows saved filter presets) ---- */

  border-bottom: 1px solid var(--hair);

}
.flf-presetbar .k {
