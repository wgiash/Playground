/* ========== tokens.css ========== */
/* =========================================================
   Aither Rendered Design System — tokens
   Subset of the full Aither DS — wireframes use bone/light
   + TWK Lausanne Pan (300 licensed locally) as the primary
   the only body and heading face inside wireframes (300 / 550 / 700).
   No Apercu (display-only).
   ========================================================= */

@font-face {
  font-family: "TWK Lausanne Pan";
  src: url("../fonts/TWKLausannePan-300.otf") format("opentype");
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "TWK Lausanne Pan";
  src: url("../fonts/TWKLausannePan-550.ttf") format("truetype");
  font-weight: 550;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "TWK Lausanne Pan";
  src: url("../fonts/TWKLausannePan-700.ttf") format("truetype");
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&display=swap');

:root {
  /* Neutrals */
  --bone:            #EAE4E2;
  --bone-soft:       rgba(234, 228, 226, 0.70);
  --bone-muted:      rgba(234, 228, 226, 0.40);
  --bone-dim:        rgba(234, 228, 226, 0.20);
  --bone-hairline:   rgba(234, 228, 226, 0.10);
  --bone-raised:     rgba(234, 228, 226, 0.06);

  --dark:            #120D0B;
  --dark-2:          #1E1816;
  --dark-3:          #271E1E;
  --dark-raised:     rgba(0, 0, 0, 0.4);
  --dark-hairline:   rgba(18, 13, 11, 0.10);
  --dark-soft:       rgba(18, 13, 11, 0.70);
  --dark-muted:      rgba(18, 13, 11, 0.40);

  --warm-100:        #F8E5D9;
  --warm-200:        #E0D5CE;
  --warm-primary:    #AEA08F;
  --warm-secondary:  #6E615B;
  --cool-primary:    #796958;
  --stone:           #777777;

  /* Canvas used BY the wireframes — full token values for both modes; light is the default. */
  --wf-dark-bg:      #120D0B;
  --wf-dark-fg:      #EAE4E2;
  --wf-dark-panel:   #1E1816;         /* raised surface on dark */
  --wf-dark-input:   #15110F;         /* input well */
  --wf-dark-hair:    rgba(234,228,226,0.12);
  --wf-dark-hair-2:  rgba(234,228,226,0.22);

  --wf-light-bg:     #EAE4E2;
  --wf-light-fg:     #120D0B;
  --wf-light-panel:  #E0D5CE;         /* raised surface on light */
  --wf-light-input:  #F3EEEC;         /* input well */
  --wf-light-hair:   rgba(18,13,11,0.14);
  --wf-light-hair-2: rgba(18,13,11,0.28);

  /* Canvas background (the gallery behind the frames — warm dark, subtle) */
  --canvas-bg:       #0B0807;
  --canvas-fg:       #EAE4E2;
  --canvas-hair:     rgba(234,228,226,0.08);
  --canvas-label:    rgba(234,228,226,0.45);
  --canvas-panel:    #15100E;

  /* Type — TWK Lausanne Pan is the only face inside wireframes (300 / 550 / 700).
     Apercu is display-only on the home tile; Inter is not in the system.
     Space Mono is removed; --font-mono is kept as an alias of --font-ui so legacy
     callers keep resolving to Lausanne. Do not reintroduce Space Mono. */
  --font-ui:         "TWK Lausanne Pan", system-ui, -apple-system, sans-serif;
  --font-mono:       "TWK Lausanne Pan", system-ui, -apple-system, sans-serif;
  --font-note:       "Caveat", "Bradley Hand", cursive;  /* for canvas labels only */

  /* Weights — three Lausanne weights resolve directly: 300 body, 550 medium, 700 bold */
  --w-body:          300;   /* Lausanne 300 — body, lede */
  --w-meta:          300;   /* Lausanne 300 — meta, captions */
  --w-ui:            550;   /* Lausanne 550 — UI, labels */
  --w-medium:        550;   /* Lausanne 550 — alias of --w-ui */
  --w-title:         550;   /* Lausanne 550 — H2 / H3 titles */
  --w-bold:          700;   /* Lausanne 700 — Display, H1, strong */

  /* Spacing (4px base) */
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 20px;
  --s-6: 24px; --s-8: 32px; --s-10: 40px; --s-12: 48px; --s-16: 64px;
  --s-20: 80px; --s-24: 96px;

  /* Radii — 0 / 2 structural, pill for chips */
  --r-0: 0;
  --r-1: 2px;
  --r-2: 4px;
  --r-full: 9999px;

  /* Motion */
  --ease: cubic-bezier(0.32, 0.72, 0, 1);
  --dur:  280ms;
}

/* ---------- Reset ---------- */
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-ui); font-weight: 300; letter-spacing: -0.01em; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; letter-spacing: -0.01em; }
input, textarea, select { font: inherit; color: inherit; letter-spacing: -0.01em; }
img { display: block; max-width: 100%; }

/* ---------- Wireframe frame base ---------- */
/* A single mixin mode: .wf is the outer frame, with data-mode="dark|light" controlling palette. */

.wf {
  /* Defaults are light; .wf[data-mode="dark"] overrides. */
  --bg:       var(--wf-light-bg);
  --fg:       var(--wf-light-fg);
  --fg-soft:  rgba(18,13,11,0.70);
  --fg-mute:  rgba(18,13,11,0.48);
  --panel:    var(--wf-light-panel);
  --input:    var(--wf-light-input);
  --hair:     var(--wf-light-hair);
  --hair-2:   var(--wf-light-hair-2);
  --placeholder: rgba(18,13,11,0.15);
  /* Scrim / wash / float — overlays dim/fade underlying content.
     --scrim is neutral-black in both modes (dim the layer below).
     --wash fades to the bg color (used on hero imagery to drop captions). */
  --scrim:    rgba(0,0,0,0.55);
  /* Light-mode wash fades to bone (page bg) so hero captions drop into the page. */
  --wash:     linear-gradient(180deg, rgba(234,228,226,0) 40%, rgba(234,228,226,0.95) 100%);
  --float:    0 40px 120px rgba(18,13,11,0.18);

  background: var(--bg);
  color: var(--fg);
  position: relative;
  overflow: hidden;
}

.wf[data-mode="dark"] {
  --bg:       var(--wf-dark-bg);
  --fg:       var(--wf-dark-fg);
  --fg-soft:  rgba(234,228,226,0.65);
  --fg-mute:  rgba(234,228,226,0.42);
  --panel:    var(--wf-dark-panel);
  --input:    var(--wf-dark-input);
  --hair:     var(--wf-dark-hair);
  --hair-2:   var(--wf-dark-hair-2);
  --placeholder: rgba(234,228,226,0.18);
  --wash:     linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.75) 100%);
  --float:    0 40px 120px rgba(0,0,0,0.5);
}

/* ---------- Shared wireframe primitives ---------- */
.wf-kicker {
  font-size: 10px;
  font-weight: var(--w-ui);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
}

.wf-meta {
  font-size: 12px;
  color: var(--fg-soft);
  font-weight: var(--w-meta);
}

.wf-placeholder {
  background: var(--placeholder);
  display: grid;
  place-items: center;
  color: var(--fg-mute);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-radius: var(--r-1);
}

.wf-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: var(--w-ui);
  white-space: nowrap;
  color: var(--fg);
}
.wf-pill[data-active="true"] { background: var(--fg); color: var(--bg); border-color: var(--fg); }

.wf-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 18px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: var(--w-ui);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--fg);
  cursor: pointer;
}
.wf-btn[data-primary="true"] { background: var(--fg); color: var(--bg); border-color: var(--fg); }

.wf-input {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--input);
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: 12px 14px;
  font-size: 14px;
  color: var(--fg);
  width: 100%;
}
.wf-input input, .wf-input textarea {
  background: transparent;
  border: 0;
  outline: 0;
  width: 100%;
  font: inherit;
  color: inherit;
}
.wf-input input::placeholder, .wf-input textarea::placeholder { color: var(--fg-mute); }

.wf-label {
  font-size: 10px;
  font-weight: var(--w-ui);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-soft);
  margin-bottom: 6px;
  display: block;
}

.wf-hair { height: 1px; background: var(--hair); width: 100%; }

/* Dots (for "more" / status) */
.wf-dot {
  width: 4px; height: 4px; border-radius: 50%; background: currentColor;
  display: inline-block;
}

/* Keyboard chip — shortcut legend / result keybind.
   Canonicalised from .sf-field .kbd + .sfw-sugg .k. */
.wf-kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  padding: 2px 6px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-soft);
}

/* Switch — binary toggle. Canonical primitive.
   `.flf-switch` and `.onb-sw` are legacy aliases and render identically.
   Usage: <button class="wf-switch" data-on="true|false" /> */
.wf-switch, .flf-switch, .onb-sw {
  position: relative;
  width: 36px;
  height: 20px;
  border-radius: var(--r-full);
  background: var(--hair);
  border: 1px solid var(--hair-2);
  flex: 0 0 auto;
  cursor: pointer;
  transition: background var(--dur) var(--ease);
  display: inline-block;
}
.wf-switch::after, .flf-switch::after, .onb-sw::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--fg-soft);
  transition: left var(--dur) var(--ease), background var(--dur) var(--ease);
}
.wf-switch[data-on="true"],
.flf-switch[data-on="true"],
.onb-sw[data-on="true"]                             { background: var(--fg); border-color: var(--fg); }
.wf-switch[data-on="true"]::after,
.flf-switch[data-on="true"]::after,
.onb-sw[data-on="true"]::after                      { left: 18px; background: var(--bg); }
.wf-switch[data-state="disabled"],
.flf-switch[data-state="disabled"],
.onb-sw[data-state="disabled"]                      { opacity: 0.5; cursor: not-allowed; }

/* Scrim — modal/sheet underlay. Canonicalised from .flf-sheet-scrim + .sfw-overlay. */
.wf-scrim {
  position: absolute;
  inset: 0;
  background: var(--scrim);
}


/* ========== canvas.css ========== */
/* =========================================================
   Canvas — the infinite pan/zoom gallery that holds all frames
   ========================================================= */

html, body {
  background: var(--canvas-bg);
  color: var(--canvas-fg);
  height: 100%;
  overflow: hidden;
  font-family: var(--font-ui);
}

#root { height: 100vh; width: 100vw; }

/* ---------- Top bar (fixed) ---------- */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 32px;
  padding: 18px 28px;
  background: linear-gradient(180deg, var(--canvas-bg) 0%, rgba(11,8,7,0.6) 80%, rgba(11,8,7,0) 100%);
  pointer-events: none;
}
.topbar > * { pointer-events: auto; }

.topbar-wordmark {
  font-style: italic;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: var(--canvas-fg);
}

.topbar-title {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.topbar-title .k {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(234,228,226,0.55);
}
.topbar-title .t {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--canvas-fg);
}

.topbar-spacer { flex: 1; }

.topbar-controls {
  display: flex;
  align-items: center;
  gap: 18px;
  font-size: 12px;
  color: rgba(234,228,226,0.7);
}

/* Zoom controls */
.zoom-controls {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 3px;
  border: 1px solid rgba(234,228,226,0.2);
  border-radius: var(--r-full);
  font-family: var(--font-mono);
}
.zoom-controls button {
  width: 28px; height: 24px;
  display: grid; place-items: center;
  font-size: 14px;
  color: rgba(234,228,226,0.7);
  border-radius: var(--r-full);
}
.zoom-controls button:hover { color: var(--canvas-fg); }
.zoom-controls .zoom-val {
  padding: 0 10px;
  font-size: 10px;
  color: rgba(234,228,226,0.6);
  min-width: 48px;
  text-align: center;
  letter-spacing: 0;
}

.topbar-help {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(234,228,226,0.35);
  letter-spacing: 0;
}
.topbar-help kbd {
  display: inline-block;
  padding: 1px 6px;
  border: 1px solid rgba(234,228,226,0.2);
  border-radius: 2px;
  font-family: inherit;
  font-size: 10px;
  color: rgba(234,228,226,0.65);
  margin: 0 2px;
}

/* ---------- Topbar: responsive collapse on narrow viewports ---------- */
@media (max-width: 1024px) {
  .topbar {
    gap: 16px;
    padding-top: 14px;
    padding-bottom: 14px;
    padding-right: 20px;
    flex-wrap: wrap;
    row-gap: 10px;
  }
  .topbar-help { display: none; }
}
@media (max-width: 640px) {
  .topbar {
    gap: 10px;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-right: 14px;
    padding-left: 80px !important; /* overrides inline paddingLeft:120 set in app.jsx to clear the Home chip */
  }
  .topbar-title { display: none; }
  .mode-toggle button { padding: 5px 10px; font-size: 10px; letter-spacing: 0.04em; }
  .zoom-controls button { width: 26px; height: 22px; }
  .zoom-controls .zoom-val { padding: 0 6px; min-width: 36px; }
}

/* ---------- Canvas (pan/zoom viewport) ---------- */
.canvas-viewport {
  position: fixed;
  inset: 0;
  cursor: grab;
  user-select: none;
  background-image:
    radial-gradient(circle, rgba(234,228,226,0.05) 1px, transparent 1px);
  background-size: 48px 48px;
  background-position: 0 0;
}
.canvas-viewport.dragging { cursor: grabbing; }
.canvas-viewport, .canvas-surface { user-select: none; -webkit-user-select: none; }

.canvas-surface {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
  will-change: transform;
}

/* ---------- Section (groups frames by template) ---------- */
.wf-section {
  position: absolute;
}

.wf-section-header {
  position: absolute;
  top: -180px;
  left: 0;
  display: flex;
  align-items: baseline;
  gap: 32px;
  white-space: nowrap;
}
.wf-section-header .num {
  font-family: var(--font-mono);
  font-size: 22px;
  color: rgba(234,228,226,0.4);
  letter-spacing: 0;
}
.wf-section-header .name {
  font-size: 96px;
  font-weight: 500;
  letter-spacing: -0.03em;
  color: var(--canvas-fg);
  line-height: 1;
}
.wf-section-header .tag {
  font-family: var(--font-mono);
  font-size: 16px;
  text-transform: uppercase;
  color: rgba(234,228,226,0.45);
  letter-spacing: 0.08em;
  border: 1px solid rgba(234,228,226,0.15);
  padding: 4px 14px;
  border-radius: var(--r-full);
}

/* ---------- Frame wrapper (one panel inside a section) ---------- */
.wf-frame {
  position: absolute;
  box-shadow: 0 20px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(234,228,226,0.06);
  /* Skip rendering frames outside the viewport — huge win with 50+ frames. */
  content-visibility: auto;
}

.wf-frame-label {
  position: absolute;
  bottom: -56px;
  left: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 11px;
  color: rgba(234,228,226,0.55);
  letter-spacing: -0.005em;
}
.wf-frame-label .n {
  font-weight: 500;
  color: rgba(234,228,226,0.85);
  font-size: 13px;
  letter-spacing: -0.01em;
}
.wf-frame-label .s {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(234,228,226,0.4);
  letter-spacing: 0;
}

/* Intro card on the canvas */
.intro-card {
  position: absolute;
  width: 720px;
  padding: 56px 64px;
  background: var(--canvas-panel);
  border: 1px solid rgba(234,228,226,0.08);
  border-radius: 2px;
  color: var(--canvas-fg);
}
.intro-card .num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(234,228,226,0.4);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.intro-card h1 {
  font-size: 48px;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin: 0 0 24px;
  text-wrap: balance;
}
.intro-card .body {
  font-size: 15px;
  font-weight: 300;
  line-height: 1.55;
  color: rgba(234,228,226,0.75);
  letter-spacing: -0.01em;
  max-width: 560px;
  text-wrap: pretty;
}
.intro-card .rules {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 12px 24px;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid rgba(234,228,226,0.12);
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.6;
  letter-spacing: 0;
}
.intro-card .rules dt {
  color: rgba(234,228,226,0.4);
  text-transform: uppercase;
}
.intro-card .rules dd {
  margin: 0;
  color: rgba(234,228,226,0.85);
}

/* ========== ds-atomic.css ========== */
/* =========================================================
   Atomic Design System — showcase canvas for the wireframe
   component library. Tiles render the existing wf-* / ki-*
   primitives; this layer only adds layout chrome + labels.
   Paired with the templates row to its right.
   ========================================================= */

/* DS intro card — sibling of .intro-card, sits at the head of the DS column */
.ds-intro-card {
  position: absolute;
  width: 720px;
  padding: 56px 64px;
  background: var(--canvas-panel);
  border: 1px solid rgba(234,228,226,0.08);
  border-radius: 2px;
  color: var(--canvas-fg);
}
.ds-intro-card .num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(234,228,226,0.4);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.ds-intro-card h1 {
  font-size: 48px;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin: 0 0 24px;
  text-wrap: balance;
}
.ds-intro-card .body {
  font-size: 15px;
  font-weight: 300;
  line-height: 1.55;
  color: rgba(234,228,226,0.75);
  letter-spacing: -0.01em;
  max-width: 560px;
  text-wrap: pretty;
}
.ds-intro-card .rules {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 12px 24px;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid rgba(234,228,226,0.12);
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.6;
  letter-spacing: 0;
}
.ds-intro-card .rules dt { color: rgba(234,228,226,0.4); text-transform: uppercase; }
.ds-intro-card .rules dd { margin: 0; color: rgba(234,228,226,0.85); }

/* DS frame — a dark canvas panel holding a grid of light specimen tiles
   (matches the SaaS-Account states specimen pattern: dark outer, bone tiles). */
.ds-frame {
  position: absolute;
  background: var(--canvas-panel);
  color: var(--canvas-fg);
  box-shadow: 0 20px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(234,228,226,0.06);
  padding: 56px 56px 64px;
  overflow: visible;
}

.ds-frame-head { margin-bottom: 40px; }
.ds-frame-head .k {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(234,228,226,0.45);
  margin-bottom: 12px;
  display: block;
}
.ds-frame-head h2 {
  font-size: 36px;
  font-weight: 500;
  letter-spacing: -0.03em;
  margin: 0 0 14px;
  line-height: 1;
}
.ds-frame-head p {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.55;
  color: rgba(234,228,226,0.65);
  letter-spacing: -0.01em;
  max-width: 640px;
  margin: 0;
}

/* DS frame label (like wf-frame-label but positioned for DS) */
.ds-frame-label {
  position: absolute;
  bottom: -56px;
  left: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 11px;
  color: rgba(234,228,226,0.55);
  letter-spacing: -0.005em;
}
.ds-frame-label .n { font-weight: 500; color: rgba(234,228,226,0.85); font-size: 13px; letter-spacing: -0.01em; }
.ds-frame-label .s { font-family: var(--font-mono); font-size: 10px; color: rgba(234,228,226,0.4); letter-spacing: 0; }

/* Subgroup within a frame (e.g., "Buttons", "Pills") */
.ds-group { margin-bottom: 40px; }
.ds-group:last-child { margin-bottom: 0; }
.ds-group-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  padding-bottom: 12px;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(234,228,226,0.10);
  color: var(--canvas-fg);
}
.ds-group-head .t { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; color: var(--canvas-fg); }
.ds-group-head .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(234,228,226,0.45);
}

/* Grid of component tiles */
.ds-grid { display: grid; gap: 20px; }
.ds-grid.c2 { grid-template-columns: repeat(2, 1fr); }
.ds-grid.c3 { grid-template-columns: repeat(3, 1fr); }
.ds-grid.c4 { grid-template-columns: repeat(4, 1fr); }
.ds-grid.c6 { grid-template-columns: repeat(6, 1fr); }
.ds-grid.auto { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
.ds-grid.autowide { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
.ds-grid.stack { grid-template-columns: 1fr; }

/* One specimen tile: caption + stage + footer.
   Light bone tile reads against the dark .ds-frame canvas
   (mirrors the SaaS-Account states specimen). */
.ds-tile {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 20px 20px 18px;
  background: var(--wf-light-bg);
  color: var(--wf-light-fg);
  border: 1px solid rgba(234,228,226,0.08);
  border-radius: 2px;
  min-height: 120px;
}
.ds-tile-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.ds-tile-head .t { font-size: 12px; font-weight: 500; letter-spacing: -0.005em; color: var(--wf-light-fg); }
.ds-tile-head .tag {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(18,13,11,0.4);
}
.ds-tile-body {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.ds-tile-body.center { justify-content: center; align-items: center; }
.ds-tile-body.stack  { flex-direction: column; align-items: stretch; gap: 12px; }
.ds-tile-foot {
  font-family: var(--font-mono);
  font-size: 9px;
  color: rgba(18,13,11,0.4);
  margin-top: 4px;
  letter-spacing: 0;
}

/* ---- Foundations specimens ---- */
.ds-swatch-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 10px; width: 100%; }
.ds-swatch { display: flex; flex-direction: column; gap: 6px; }
.ds-swatch .chip {
  height: 64px;
  border-radius: 2px;
  border: 1px solid rgba(234,228,226,0.12);
}
.ds-swatch .n { font-family: var(--font-mono); font-size: 10px; color: rgba(234,228,226,0.75); letter-spacing: 0; }
.ds-swatch .h { font-family: var(--font-mono); font-size: 9px; color: rgba(234,228,226,0.45); letter-spacing: 0; }

.ds-type-row {
  display: flex;
  align-items: baseline;
  gap: 20px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(18,13,11,0.08);
}
.ds-type-row:last-child { border-bottom: 0; }
.ds-type-row .lab {
  font-family: var(--font-mono);
  font-size: 9px;
  color: rgba(18,13,11,0.45);
  width: 88px; flex-shrink: 0;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.ds-type-row .spec { color: var(--wf-light-fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.ds-space-row { display: flex; align-items: center; gap: 14px; padding: 6px 0; font-family: var(--font-mono); font-size: 10px; color: rgba(18,13,11,0.55); }
.ds-space-row .n   { width: 40px; }
.ds-space-row .bar { height: 10px; background: rgba(18,13,11,0.28); border-radius: 1px; flex-shrink: 0; }
.ds-space-row .v   { width: 36px; text-align: right; font-size: 9px; color: rgba(18,13,11,0.4); }

.ds-radius-row { display: flex; gap: 20px; align-items: flex-end; }
.ds-radius-row .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.ds-radius-row .s { width: 56px; height: 56px; background: rgba(18,13,11,0.12); border: 1px solid rgba(18,13,11,0.14); }
.ds-radius-row .s.r0 { border-radius: 0; }
.ds-radius-row .s.r1 { border-radius: 2px; }
.ds-radius-row .s.r2 { border-radius: 4px; }
.ds-radius-row .s.rf { border-radius: 9999px; }
.ds-radius-row .lab { font-family: var(--font-mono); font-size: 9px; color: rgba(18,13,11,0.5); }

.ds-weight-row { display: flex; gap: 22px; align-items: baseline; flex-wrap: wrap; }
.ds-weight-row .w { display: flex; flex-direction: column; gap: 4px; }
.ds-weight-row .w .spec { font-size: 20px; letter-spacing: -0.01em; color: var(--wf-light-fg); }
.ds-weight-row .w .lab { font-family: var(--font-mono); font-size: 9px; color: rgba(18,13,11,0.45); letter-spacing: 0; }

/* ---- Atoms: icon grid ---- */
.ds-icon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  width: 100%;
}
.ds-icon-cell {
  height: 88px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  padding: 6px;
  border: 1px solid rgba(18,13,11,0.08);
  border-radius: 2px;
  color: rgba(18,13,11,0.85);
  background: var(--wf-light-bg);
}
.ds-icon-cell .name { font-family: var(--font-mono); font-size: 8px; color: rgba(18,13,11,0.4); letter-spacing: 0; text-align: center; }

/* Atoms: avatar specimen, initials circle lifted from chw/mfw */
.ds-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(18,13,11,0.85); color: var(--wf-light-bg);
  display: grid; place-items: center;
  font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
}

/* Atoms: badge (for thread unread count) */
.ds-badge {
  display: inline-grid; place-items: center;
  min-width: 20px; height: 20px; padding: 0 6px;
  border-radius: 9999px;
  background: var(--wf-light-fg); color: var(--wf-light-bg);
  font-size: 11px; font-weight: 500;
}

/* Atoms: toggle preview (mirrors .lsw-toggle) */
.ds-toggle {
  width: 34px; height: 20px;
  background: rgba(18,13,11,0.15);
  border-radius: 9999px;
  position: relative;
  cursor: pointer;
}
.ds-toggle::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: var(--wf-light-bg);
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(18,13,11,0.2);
  transition: left 180ms ease;
}
.ds-toggle[data-on]::after { left: 16px; }
.ds-toggle[data-on] { background: rgba(18,13,11,0.85); }

/* Atoms: dot separator, hairline specimens need visible context */
.ds-sep-row { display: flex; align-items: center; gap: 10px; color: var(--wf-light-fg); font-size: 12px; }
.ds-hair-box { height: 1px; background: rgba(18,13,11,0.14); width: 100%; }

/* Molecules / Organisms wrap in a bleed box so real-size specimens render on the light panel */
.ds-specimen {
  background: var(--wf-light-bg);
  border: 1px solid rgba(18,13,11,0.08);
  border-radius: 2px;
  padding: 16px;
  width: 100%;
}
.ds-specimen.bleed { padding: 0; overflow: hidden; }

/* A 1440×auto preview frame for desktop organisms */
.ds-preview-desktop { width: 1440px; max-width: 100%; background: var(--wf-light-bg); }
/* A 390×auto preview frame for mobile organisms */
.ds-preview-mobile  { width: 390px; background: var(--wf-light-bg); }

/* ---- State-row helper (Patterns · state set) ----
   LEFT: monospace state label in a fixed column.
   RIGHT: the specimen at its live size.
   Reads like the flow states specimens (.sfs / .fcs). */
.ds-state-row {
  display: grid;
  grid-template-columns: 92px 1fr;
  gap: 14px;
  align-items: center;
  padding: 10px 0;
  border-top: 1px dashed rgba(18,13,11,0.14);
}
.ds-state-row:first-child { border-top: 0; }
.ds-state-row .state {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(18,13,11,0.5);
}
.ds-state-row .spec { min-width: 0; }

/* ---- Journey strip (Patterns · how a flow reads) ----
   Dotted line through a row of mini-frames, each tagged with
   a step number + state; mirrors the flows-zone layout convention. */
.ds-journey {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  overflow: hidden;
}
.ds-journey-step {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.ds-journey-step .frame {
  width: 80px;
  aspect-ratio: 390/844;
  background: var(--wf-light-panel);
  border: 1px solid rgba(18,13,11,0.14);
  border-radius: 2px;
}
.ds-journey-step .frame.wide { width: 130px; aspect-ratio: 1440/900; }
.ds-journey-step .lab {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(18,13,11,0.45);
}
.ds-journey-link {
  flex: 0 0 20px;
  height: 1px;
  border-top: 1px dashed rgba(18,13,11,0.22);
}

/* ---- Auth-gate interrupt wrap (Patterns)
   Bleed-box that shows a dimmed page behind a centered gate card,
   so the "interrupt" pattern reads at a glance. */
.ds-interrupt {
  position: relative;
  padding: 20px;
  background: var(--wf-light-panel);
  border: 1px solid rgba(18,13,11,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.ds-interrupt .behind {
  position: absolute;
  inset: 0;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0.35;
  pointer-events: none;
}
.ds-interrupt .behind .bar {
  height: 10px;
  background: rgba(18,13,11,0.18);
  border-radius: var(--r-1);
}
.ds-interrupt .behind .bar.w70 { width: 70%; }
.ds-interrupt .behind .bar.w40 { width: 40%; }
.ds-interrupt .behind .bar.w90 { width: 90%; }
.ds-interrupt .over {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
}

/* ========== chrome.css ========== */
/* =========================================================
   Chrome — reusable bits of the Aither Desktop + Mobile kits
   (horizontal nav, vertical nav, footer, mobile status bar,
   mobile bottom nav, back-title-action header)
   ========================================================= */

/* ===== DESKTOP ===== */

/* Horizontal nav — Company · tabs · search · SIGN OUT · avatar */
.ki-hnav {
  display: flex;
  align-items: center;
  gap: 40px;
  padding: 22px 32px;
  border-bottom: 1px solid var(--hair);
  background: var(--bg);
}
.ki-hnav .brand {
  font-size: 14px;
  font-weight: var(--w-title);
  letter-spacing: -0.01em;
}
.ki-hnav .tabs {
  display: flex;
  align-items: center;
  gap: 36px;
  font-size: 20px;
  font-weight: var(--w-ui);
  letter-spacing: -0.01em;
}
.ki-hnav .tabs a { color: var(--fg-soft); cursor: pointer; }
.ki-hnav .tabs a[aria-current="page"] { color: var(--fg); font-weight: var(--w-title); }
.ki-hnav .spacer { flex: 1; }
.ki-hnav .search {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  min-width: 220px;
  color: var(--fg-soft);
  font-size: 13px;
}
.ki-hnav .btn-ghost {
  padding: 8px 16px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: var(--w-ui);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg);
}
.ki-hnav .avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--panel);
  border: 1px solid var(--hair);
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: var(--w-title);
  letter-spacing: 0.02em;
  position: relative;
}
.ki-hnav .avatar::after {
  content: "";
  position: absolute;
  bottom: 0; right: 0;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--fg);
}

/* Footer — triple-footer Aither signature */
.ki-footer {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  padding: 24px 32px 20px;
  border-top: 1px solid var(--hair);
  color: var(--fg-soft);
  font-size: 13px;
  letter-spacing: -0.01em;
}
.ki-footer .l {
  font-size: 15px;
  font-weight: var(--w-title);
  color: var(--fg);
  letter-spacing: -0.01em;
}
.ki-footer .links {
  display: flex;
  align-items: center;
  gap: 28px;
}
.ki-footer .meta {
  grid-column: 1 / -1;
  display: flex;
  gap: 12px;
  font-size: 11px;
  letter-spacing: 0.02em;
  color: var(--fg-mute);
  border-top: 1px solid var(--hair);
  padding-top: 12px;
  margin-top: 4px;
}

/* ===== MOBILE ===== */

/* Mobile frame container — 390×844 iPhone-ish */
.ki-mobile {
  width: 390px;
  height: 844px;
  padding-top: 10px;          /* uniform top breathing room across all mobile frames (post iOS-chrome removal) */
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

/* iOS-style status bar */
.ki-statusbar {
  height: 54px;
  padding: 18px 32px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  font-size: 15px;
  font-weight: var(--w-title);
  letter-spacing: -0.02em;
  flex: 0 0 54px;
}
.ki-statusbar .icons {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 14px;
}
.ki-statusbar svg { display: block; }

/* Home indicator */
.ki-homebar {
  position: absolute;
  left: 50%;
  bottom: 6px;
  transform: translateX(-50%);
  width: 140px;
  height: 4px;
  background: var(--fg);
  opacity: 0.6;
  border-radius: var(--r-full);
  z-index: 20;
  pointer-events: none;
}

/* Back · Title · Action header */
.ki-header {
  padding: 14px 20px;
  display: grid;
  grid-template-columns: 32px 1fr 32px;
  align-items: center;
  gap: 12px;
  flex: 0 0 auto;
}
.ki-header .back, .ki-header .action {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  color: var(--fg);
}
.ki-header .title {
  text-align: center;
  font-size: 17px;
  font-weight: var(--w-title);
  letter-spacing: -0.02em;
}

/* Bottom tab bar — Home / Profile / Messages */
.ki-bottomnav {
  position: absolute;
  left: 16px; right: 16px; bottom: 14px;
  height: 54px;
  background: var(--panel);
  border: 1px solid var(--hair);
  border-radius: var(--r-full);
  display: flex;
  align-items: center;
  padding: 4px;
  gap: 4px;
  z-index: 10;
}
.ki-bottomnav button {
  flex: 1;
  height: 100%;
  display: grid;
  place-items: center;
  font-size: 12px;
  color: var(--fg-soft);
  border-radius: var(--r-full);
  font-weight: var(--w-ui);
}
.ki-bottomnav button[aria-current="page"] {
  background: var(--input);
  color: var(--fg);
  font-weight: var(--w-title);
}

/* Scroll body (between header + bottom nav) */
.ki-scroll {
  flex: 1;
  min-height: 0;
  overflow: hidden;   /* wireframe — content clips at frame edge, that's fine */
  position: relative;
}

/* A thin separator hairline */
.ki-sep { height: 1px; background: var(--hair); width: 100%; }

/* ===== DESKTOP · nav alternatives ===== */

/* MinimalNav — logo · tabs · avatar. Authenticated shell, no global search. */
.ki-hnav-min {
  display: flex; align-items: center; gap: 40px;
  padding: 18px 32px;
  border-bottom: 1px solid var(--hair);
  background: var(--bg);
}
.ki-hnav-min .brand { font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.ki-hnav-min .tabs { display: flex; align-items: center; gap: 28px; font-size: 14px; font-weight: var(--w-ui); letter-spacing: -0.01em; }
.ki-hnav-min .tabs a { color: var(--fg-soft); cursor: pointer; }
.ki-hnav-min .tabs a[aria-current="page"] { color: var(--fg); font-weight: var(--w-title); }
.ki-hnav-min .spacer { flex: 1; }
.ki-hnav-min .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--panel); border: 1px solid var(--hair);
  display: grid; place-items: center;
  font-size: 11px; font-weight: var(--w-title);
}

/* MarketingNav — logo · tabs · sign in · primary CTA. Pre-auth / public. */
.ki-hnav-mkt {
  display: flex; align-items: center; gap: 40px;
  padding: 20px 32px;
  border-bottom: 1px solid var(--hair);
  background: var(--bg);
}
.ki-hnav-mkt .brand { font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.ki-hnav-mkt .tabs { display: flex; align-items: center; gap: 28px; font-size: 14px; font-weight: var(--w-ui); letter-spacing: -0.01em; }
.ki-hnav-mkt .tabs a { color: var(--fg-soft); cursor: pointer; }
.ki-hnav-mkt .tabs a[aria-current="page"] { color: var(--fg); font-weight: var(--w-title); }
.ki-hnav-mkt .spacer { flex: 1; }
.ki-hnav-mkt .signin {
  font-size: 13px; color: var(--fg-soft);
  padding: 8px 4px; cursor: pointer;
  letter-spacing: -0.01em;
}

/* WorkspaceNav — brand · breadcrumbs · status + actions + avatar. */
.ki-hnav-ws {
  display: flex; align-items: center; gap: 24px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--hair);
  background: var(--bg);
}
.ki-hnav-ws .brand {
  font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.01em;
  padding-right: 20px; border-right: 1px solid var(--hair);
}
.ki-hnav-ws .crumbs {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--fg-soft);
  flex: 1; min-width: 0;
  letter-spacing: -0.01em;
}
.ki-hnav-ws .crumbs .sep { color: var(--fg-mute); }
.ki-hnav-ws .crumbs .current { color: var(--fg); font-weight: var(--w-title); }
.ki-hnav-ws .actions { display: flex; align-items: center; gap: 12px; }
.ki-hnav-ws .status {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--fg-mute);
  padding: 6px 10px;
  border: 1px solid var(--hair);
  border-radius: var(--r-full);
}
.ki-hnav-ws .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--panel); border: 1px solid var(--hair);
  display: grid; place-items: center;
  font-size: 11px; font-weight: var(--w-title);
}

/* StepperNav — logo · numbered steps · save & exit. Multi-step flows. */
.ki-hnav-step {
  display: flex; align-items: center; gap: 32px;
  padding: 18px 32px;
  border-bottom: 1px solid var(--hair);
  background: var(--bg);
}
.ki-hnav-step .brand { font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.ki-hnav-step .steps {
  display: flex; align-items: center; gap: 14px;
  flex: 1; justify-content: center;
}
.ki-hnav-step .step {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--fg-mute);
  letter-spacing: -0.01em;
}
.ki-hnav-step .step .num {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid var(--hair-2);
  display: grid; place-items: center;
  font-size: 10px; font-weight: var(--w-title);
  font-family: var(--font-mono);
  color: var(--fg-mute);
}
.ki-hnav-step .step[data-state="current"] { color: var(--fg); font-weight: var(--w-title); }
.ki-hnav-step .step[data-state="current"] .num { border-color: var(--fg); color: var(--fg); }
.ki-hnav-step .step[data-state="done"] { color: var(--fg-soft); }
.ki-hnav-step .step[data-state="done"] .num { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.ki-hnav-step .step-sep { width: 36px; height: 1px; background: var(--hair-2); }
.ki-hnav-step .exit {
  font-size: 11px; font-weight: var(--w-ui);
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--fg-soft);
  cursor: pointer;
}

/* SideNav — 240-wide vertical rail. Dashboard-shaped products. */
.ki-snav {
  width: 240px;
  padding: 22px 16px 16px;
  border-right: 1px solid var(--hair);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 0 0 240px;
}
.ki-snav .brand {
  font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.01em;
  padding: 4px 12px 20px;
}
.ki-snav .item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px;
  font-size: 14px;
  color: var(--fg-soft);
  font-weight: var(--w-ui);
  letter-spacing: -0.01em;
  border-radius: var(--r-1);
  cursor: pointer;
}
.ki-snav .item[aria-current="page"] {
  color: var(--fg);
  font-weight: var(--w-title);
  background: var(--panel);
}
.ki-snav .item .ic { width: 18px; display: grid; place-items: center; flex-shrink: 0; }
.ki-snav .label {

  padding: 14px 12px 6px;
}
.ki-snav .spacer { flex: 1; }
.ki-snav .user {

  padding: 12px;
  border-top: 1px solid var(--hair);
  margin-top: 8px;
}
.ki-snav .user .avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--panel); border: 1px solid var(--hair);
  display: grid; place-items: center;
  font-size: 10px; font-weight: var(--w-title);
  flex-shrink: 0;
}
.ki-snav .user .who {

}
.ki-snav .user .who .n { font-size: 12px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.ki-snav .user .who .m { font-size: 10px; color: var(--fg-mute); letter-spacing: -0.005em; }

/* SubNav — secondary tab strip under a primary nav. Section navigation. */
.ki-subnav {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 0 32px;
  height: 44px;
  border-bottom: 1px solid var(--hair);
  background: var(--bg);
}
.ki-subnav .section {
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--fg-mute);
  padding-right: 24px;
  border-right: 1px solid var(--hair);
  height: 100%;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.ki-subnav .tabs {
  display: flex;
  align-items: center;
  gap: 24px;
  height: 100%;
}
.ki-subnav .tabs a {
  position: relative;
  font-size: 13px;
  color: var(--fg-soft);
  font-weight: var(--w-ui);
  letter-spacing: -0.01em;
  height: 100%;
  display: flex;
  align-items: center;
  cursor: pointer;
}
.ki-subnav .tabs a[aria-current="page"] {
  color: var(--fg);
  font-weight: var(--w-title);
}
.ki-subnav .tabs a[aria-current="page"]::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 1px;
  background: var(--fg);
}
.ki-subnav .spacer { flex: 1; }
.ki-subnav .trailing {
  font-size: 12px;
  color: var(--fg-soft);
  letter-spacing: -0.01em;
}

/* ===== MOBILE · header alternatives ===== */

/* LargeTitleHeader — title + meta stacked, single trailing action. */
.ki-header-lg {
  padding: 16px 24px 12px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  flex: 0 0 auto;
}
.ki-header-lg .title {
  font-size: 28px; font-weight: var(--w-title);
  letter-spacing: -0.03em; line-height: 1;
}
.ki-header-lg .meta {
  font-size: 12px; color: var(--fg-soft);
  margin-top: 6px; letter-spacing: -0.01em;
}
.ki-header-lg .action {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  color: var(--fg);
}

/* SearchHeader — search input spans, avatar trailing. */
.ki-header-search {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  flex: 0 0 auto;
}
.ki-header-search .field {
  flex: 1;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--input);
  border: 1px solid var(--hair);
  border-radius: var(--r-full);
  color: var(--fg-mute);
  font-size: 13px;
}
.ki-header-search .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--panel); border: 1px solid var(--hair);
  display: grid; place-items: center;
  font-size: 11px; font-weight: var(--w-title); color: var(--fg);
  flex-shrink: 0;
}

/* ModalHeader — Cancel · Title · Done, for sheets and forms. */
.ki-header-modal {
  padding: 14px 20px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
  flex: 0 0 auto;
}
.ki-header-modal .cancel {
  justify-self: start; font-size: 14px;
  color: var(--fg-soft);
  letter-spacing: -0.01em;
}
.ki-header-modal .title {
  text-align: center;
  font-size: 17px; font-weight: var(--w-title);
  letter-spacing: -0.02em;
}
.ki-header-modal .done {
  justify-self: end; font-size: 14px;
  font-weight: var(--w-title); color: var(--fg);
  letter-spacing: -0.01em;
}

/* ===== MOBILE · bottom-nav alternatives ===== */

/* BottomNavFive — 5 icon + label tabs. Full-width native bar. */
.ki-bottomnav-5 {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 72px;
  padding-bottom: 16px;
  background: var(--bg);
  border-top: 1px solid var(--hair);
  display: flex;
  align-items: center;
  z-index: 10;
}
.ki-bottomnav-5 button {
  flex: 1;
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
  font-size: 10px;
  color: var(--fg-mute);
  font-weight: var(--w-ui);
  letter-spacing: 0.01em;
}
.ki-bottomnav-5 button[aria-current="page"] {
  color: var(--fg);
  font-weight: var(--w-title);
}

/* BottomNavFab — 2 tabs · centered create · 2 tabs. Creation-forward. */
.ki-bottomnav-fab {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 72px;
  padding: 0 12px 16px;
  background: var(--bg);
  border-top: 1px solid var(--hair);
  display: flex;
  align-items: center;
  gap: 4px;
  z-index: 10;
}
.ki-bottomnav-fab button {
  flex: 1;
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
  font-size: 10px;
  color: var(--fg-mute);
  font-weight: var(--w-ui);
}
.ki-bottomnav-fab button[aria-current="page"] {
  color: var(--fg);
  font-weight: var(--w-title);
}
.ki-bottomnav-fab .fab {
  flex: 0 0 52px;
  height: 44px;
  margin: 0 6px;
  background: var(--fg);
  color: var(--bg);
  border-radius: var(--r-full);
  display: grid;
  place-items: center;
}

.mfm-kicker {
