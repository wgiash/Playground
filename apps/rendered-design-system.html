/* ---- Relax-filters suggestion block (inside zero-results) ---- */
.flf-relax {
  display: flex; flex-direction: column; gap: 6px;
  margin-top: 14px; padding: 12px 14px;
  border: 1px solid var(--hair); border-radius: var(--r-1);
  background: var(--panel);
  text-align: left;
  width: 100%;
}
.flf-relax .k {
  font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 4px;
}
.flf-relax .line {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  font-size: 12px; color: var(--fg-soft);
  padding: 4px 0;
}
.flf-relax .line .act {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--fg); padding: 2px 8px;
  border: 1px solid var(--hair-2); border-radius: var(--r-full);
}

/* ========== flow-chatbot.css ========== */
/* =========================================================
   Flow · Chatbot — end-to-end (F · Chatbot)
   Sits in the Flows zone at (x = 0, y ≈ 9500) — under the
   Search flow, in the natural scroll path. (Spec'd band was
   y = 66000; relocated for discoverability after the search
   agent established the x=0 column precedent.)
   Extends template-chatbot (.cbw / .cbm) with flow-only states:
   entry · auth gate · greeting · composing · loading · response
   · error · expanded. Reuses .flow-intro shared card + tokens.
   fcw-* = web additions · fcm-* = mobile additions · fcs-* = states strip.
   ========================================================= */

/* Launcher pill at rest — override .cbw-launcher hidden default. */
.cbw-launcher[data-show="true"] { display: inline-flex; }

/* Widget auth gate (shown in place of greeting when signed-out). */
.fcw-gate {
  flex: 1; min-height: 0;
  padding: 24px 22px 18px;
  display: flex; flex-direction: column; gap: 14px;
  overflow: hidden;
}
.fcw-gate .lock {
  width: 40px; height: 40px;
  border-radius: var(--r-full);
  border: 1px solid var(--hair-2);
  color: var(--fg-soft);
  display: grid; place-items: center;
}
.fcw-gate h3 { margin: 4px 0 0; font-size: 18px; font-weight: var(--w-ui); letter-spacing: -0.02em; }
.fcw-gate p  { margin: 0; font-size: 12px; color: var(--fg-soft); line-height: 1.5; }
.fcw-gate .socials { display: grid; gap: 6px; margin-top: 6px; }
.fcw-gate .wf-btn  { justify-content: flex-start; padding: 10px 14px; }
.fcw-gate .foot {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0.04em;
  margin-top: auto;
}

/* Error banner above stream. */
.fcw-err {
  padding: 10px 14px;
  display: grid;
  grid-template-columns: 20px 1fr auto;
  gap: 10px;
  align-items: center;
  background: var(--bg);
  border-bottom: 1px solid var(--hair-2);
  font-size: 12px;
  color: var(--fg);
}
.fcw-err .glyph { color: var(--fg-soft); display: grid; place-items: center; }
.fcw-err .tx .t { font-size: 12px; color: var(--fg); letter-spacing: -0.005em; }
.fcw-err .tx .s { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); margin-top: 2px; }
.fcw-err .retry {
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  color: var(--fg);
}

/* Pending / error marker on a .cbw-msg bubble. */
.cbw-msg[data-state="pending"] .bubble { opacity: 0.55; }
.cbw-msg[data-state="error"]   .bubble { border-style: dashed; color: var(--fg-soft); }
.cbw-msg[data-state="pending"] .tag,
.cbw-msg[data-state="error"]   .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-top: 4px;
  display: block;
}

/* Compose-input state variants. */
.cbw-w-compose[data-state="focus"] .wf-input {
  border-color: var(--hair-2);
  box-shadow: 0 0 0 2px var(--hair);
}
.cbw-w-compose[data-state="disabled"] { opacity: 0.55; pointer-events: none; }

/* Expanded full-screen shell — takes over the page. */
.fcw-expanded {
  width: 1440px;
  min-height: 900px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
}
.fcw-exp-body {
  flex: 1;
  display: grid;
  grid-template-columns: 260px 1fr 300px;
  min-height: 0;
}
.fcw-exp-rail {
  border-right: 1px solid var(--hair);
  padding: 20px 14px;
  display: flex; flex-direction: column;
  gap: 6px;
  overflow: hidden;
}
.fcw-exp-rail-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 0 4px 10px;
  border-bottom: 1px solid var(--hair);
}
.fcw-exp-rail-head .k {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
}
.fcw-exp-rail-head .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); }
.fcw-exp-new {
  margin: 10px 0 12px;
  padding: 10px 12px;
  border: 1px dashed var(--hair-2);
  border-radius: var(--r-1);
  font-size: 12px;
  letter-spacing: -0.005em;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--fg-soft);
}
.fcw-history-item {
  padding: 10px 10px;
  border-radius: var(--r-1);
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: pointer;
}
.fcw-history-item[data-state="current"] { background: var(--panel); box-shadow: inset 2px 0 0 var(--fg); }
.fcw-history-item[data-state="hover"]   { background: var(--panel); }
.fcw-history-item .t {
  font-size: 13px;
  color: var(--fg);
  letter-spacing: -0.005em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fcw-history-item .s {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
}
.fcw-exp-empty {
  margin-top: 24px;
  padding: 20px 12px;
  text-align: center;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
}
.fcw-exp-empty .k {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  display: block;
  margin-bottom: 6px;
}
.fcw-exp-empty .t { font-size: 12px; color: var(--fg-soft); line-height: 1.5; }

.fcw-exp-main {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.fcw-exp-head {
  padding: 16px 32px;
  display: grid;
  grid-template-columns: 40px 1fr auto;
  gap: 14px;
  align-items: center;
  border-bottom: 1px solid var(--hair);
}
.fcw-exp-head .av {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--fg);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: var(--w-title);
  letter-spacing: 0.04em;
}
.fcw-exp-head .tx .t { font-size: 15px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.fcw-exp-head .tx .s {
  font-size: 11px;
  color: var(--fg-mute);
  margin-top: 2px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.fcw-exp-head .tx .s .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--fg);
}
.fcw-exp-head .acts { display: flex; gap: 6px; color: var(--fg-soft); }
.fcw-exp-head .acts button {
  width: 32px; height: 32px;
  border-radius: var(--r-full);
  display: grid; place-items: center;
  border: 1px solid var(--hair);
}
.fcw-exp-stream {
  flex: 1;
  min-height: 0;
  padding: 24px 32px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow: hidden;
}
.fcw-exp-stream .cbw-msg { max-width: 680px; }
.fcw-exp-stream .cbw-msg .bubble { font-size: 14px; padding: 12px 16px; }
.fcw-exp-compose {
  padding: 14px 32px 22px;
  border-top: 1px solid var(--hair);
  display: grid;
  grid-template-columns: 32px 1fr 32px 32px 32px;
  gap: 10px;
  align-items: center;
}
.fcw-exp-compose .wf-input {
  padding: 12px 14px;
  background: var(--panel);
}
.fcw-exp-compose button {
  width: 32px; height: 32px;
  border-radius: var(--r-full);
  display: grid; place-items: center;
  color: var(--fg-soft);
}
.fcw-exp-compose button[data-primary] { background: var(--fg); color: var(--bg); }

.fcw-ctx {
  border-left: 1px solid var(--hair);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow: hidden;
}
.fcw-ctx .k { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-mute); }
.fcw-ctx .h { font-size: 15px; font-weight: var(--w-title); letter-spacing: -0.01em; margin-top: 2px; }
.fcw-ctx-meta {
  display: flex; flex-direction: column;
  gap: 0;
  border-top: 1px solid var(--hair);
  padding-top: 4px;
}
.fcw-ctx-row {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--hair);
  font-size: 12px;
}
.fcw-ctx-row:last-child { border-bottom: 0; }
.fcw-ctx-row .lab { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-mute); }
.fcw-ctx-row .val { color: var(--fg); letter-spacing: -0.005em; }

/* ---------- MOBILE flow additions (sit on top of .cbm) ---------- */

.fcm-gate-body {
  padding: 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;

.fcm-gate-body .lock {

}
.fcm-gate-body h3 { margin: 0; font-size: 18px; font-weight: var(--w-ui); letter-spacing: -0.02em; }

.fcm-gate-body .socials { display: grid; gap: 6px; margin-top: 6px; }
.fcm-gate-body .wf-btn  { justify-content: flex-start; padding: 10px 14px; width: 100%; }
.fcm-gate-body .foot {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);

  margin-top: auto;
}

.fcm-err {
  padding: 10px 16px;
  display: grid;
  grid-template-columns: 20px 1fr auto;

  font-size: 12px;
  color: var(--fg);
  background: var(--bg);
}
.fcm-err .glyph { color: var(--fg-soft); display: grid; place-items: center; }
.fcm-err .tx .t { font-size: 12px; color: var(--fg); }
.fcm-err .tx .s { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); }
.fcm-err .retry {
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  color: var(--fg);
}

.cbm-msg[data-state="pending"] .bubble { opacity: 0.55; }
.cbm-msg[data-state="error"]   .bubble { border-style: dashed; color: var(--fg-soft); }
.cbm-msg[data-state="pending"] .tag,
.cbm-msg[data-state="error"]   .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--fg-mute);

  display: block;
}

/* Mobile launcher FAB at rest (over a feed page). */
.fcm-fab {
  position: absolute;
  right: 18px;
  bottom: 92px;
  padding: 12px 18px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--fg);
  color: var(--bg);
  border-radius: var(--r-full);
  font-size: 13px;
  font-weight: var(--w-ui);
  letter-spacing: -0.005em;
  z-index: 8;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
}
.fcm-fab .ic {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--bg);
  color: var(--fg);
  display: grid; place-items: center;
  font-size: 9px;
  font-weight: var(--w-title);
  letter-spacing: 0.04em;
}

/* Mobile feed stub under the launcher. */
.fcm-feed {
  position: absolute;
  inset: 0;
  padding: 52px 20px 80px;
  display: flex;
  flex-direction: column;
  gap: 0;
  opacity: 0.6;
  pointer-events: none;
}
.fcm-feed .row {
  display: grid;
  grid-template-columns: 40px 1fr;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid var(--hair);
  align-items: center;
}
.fcm-feed .row .ic {
  width: 40px; height: 40px;
  background: var(--placeholder);
  border-radius: var(--r-1);
}
.fcm-feed .row .l {
  height: 9px;
  background: var(--placeholder);
  border-radius: var(--r-1);
}
.fcm-feed .row .l.a { width: 72%; }
.fcm-feed .row .l.b { width: 42%; margin-top: 6px; }

/* Mobile expanded (full-screen chat). */
.fcm-exp {
  width: 390px;
  height: 844px;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.fcm-exp-head {
  padding: 52px 12px 12px;
  display: grid;
  grid-template-columns: 32px 1fr 32px;
  gap: 10px;
  align-items: center;
  border-bottom: 1px solid var(--hair);
}
.fcm-exp-head .back, .fcm-exp-head .more {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  color: var(--fg-soft);
}
.fcm-exp-head .tx { text-align: center; }
.fcm-exp-head .tx .t { font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.fcm-exp-head .tx .s { font-size: 10px; color: var(--fg-mute); margin-top: 2px; }
.fcm-exp-stream {
  flex: 1;
  min-height: 0;
  padding: 16px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
}
.fcm-exp-compose {
  padding: 12px 16px 22px;
  border-top: 1px solid var(--hair);
  display: grid;
  grid-template-columns: 32px 1fr 32px 32px;
  gap: 8px;
  align-items: center;
}
.fcm-exp-compose .wf-input { padding: 10px 12px; font-size: 13px; background: var(--panel); }
.fcm-exp-compose button {
  width: 32px; height: 32px;
  border-radius: var(--r-full);
  display: grid; place-items: center;
  color: var(--fg-soft);
}
.fcm-exp-compose button[data-primary] { background: var(--fg); color: var(--bg); }

/* Mobile history drawer (peek for expanded view). */
.fcm-drawer {
  position: absolute;
  left: 0; top: 92px; bottom: 0;
  width: 74%;
  background: var(--panel);
  border-right: 1px solid var(--hair-2);
  padding: 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  box-shadow: 6px 0 30px rgba(0,0,0,0.25);
  z-index: 12;
}
.fcm-drawer .k {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  padding: 0 8px 6px;
  border-bottom: 1px solid var(--hair);
}
.fcm-drawer .item {
  padding: 10px 10px;
  border-radius: var(--r-1);
}
.fcm-drawer .item[data-state="current"] { background: var(--bg); box-shadow: inset 2px 0 0 var(--fg); }
.fcm-drawer .item .t { font-size: 13px; letter-spacing: -0.005em; }
.fcm-drawer .item .s { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); }
.fcm-scrim {
  position: absolute;
  left: 74%; right: 0;
  top: 92px; bottom: 0;
  background: var(--scrim);
  z-index: 11;
}

/* ---------- STATES specimen (sibling of .sfs) ---------- */
.fcs {
  width: 1800px;
  min-height: 820px;
  background: var(--bg);
  color: var(--fg);
  padding: 36px 40px 40px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: relative;
}
.fcs-head { display: flex; align-items: baseline; gap: 14px; }
.fcs-head .k { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-mute); }
.fcs-head h2 { margin: 0; font-size: 26px; font-weight: var(--w-ui); letter-spacing: -0.02em; }
.fcs-head .s { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); }

.fcs-cols {
  display: grid;
  grid-template-columns: 1fr 1fr 1.1fr 1fr;
  gap: 18px;
  flex: 1;
  min-height: 0;
}
.fcs-col {
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}
.fcs-col .col-t { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); }
.fcs-col .col-s { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); margin-bottom: 4px; }
.fcs-row {
  display: grid;
  grid-template-columns: 88px 1fr;
  gap: 12px;
  align-items: center;
  padding: 6px 0;
  border-top: 1px dashed var(--hair);
}
.fcs-row:first-of-type { border-top: 0; }
.fcs-row .state {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.fcs-send {
  width: 32px; height: 32px;
  border-radius: var(--r-full);
  display: grid; place-items: center;
  color: var(--fg-soft);
  background: var(--bg);
  border: 1px solid var(--hair-2);
}
.fcs-send[data-primary] { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.fcs-send[data-state="hover"]    { box-shadow: 0 0 0 2px var(--hair); }
.fcs-send[data-state="pressed"]  { opacity: 0.85; }
.fcs-send[data-state="disabled"] { opacity: 0.35; }
.fcs-send[data-state="loading"]  { color: var(--fg-mute); }
.fcs-chip {
  padding: 7px 12px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  font-size: 12px;
  background: var(--bg);
  color: var(--fg);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.fcs-chip[data-state="hover"]    { background: var(--panel); }
.fcs-chip[data-state="pressed"]  { background: var(--panel); opacity: 0.85; }
.fcs-chip[data-state="selected"] { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.fcs-chip[data-state="disabled"] { opacity: 0.35; }
.fcs-field {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--input);
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  color: var(--fg);
  font-size: 13px;
}
.fcs-field[data-state="focus"]    { border-color: var(--hair-2); box-shadow: 0 0 0 2px var(--hair); }
.fcs-field[data-state="filled"]   { color: var(--fg); border-color: var(--hair-2); }
.fcs-field[data-state="disabled"] { opacity: 0.45; }
.fcs-field .ph { color: var(--fg-mute); flex: 1; }
.fcs-field .tx { color: var(--fg); flex: 1; }
.fcs-bubble {
  padding: 9px 13px;
  border-radius: var(--r-2);
  border: 1px solid var(--hair);
  font-size: 12px;
  max-width: 240px;
  letter-spacing: -0.005em;
}
.fcs-bubble[data-kind="in"] { border-bottom-left-radius: 0; background: var(--bg); }
.fcs-bubble[data-kind="me"] { background: var(--fg); color: var(--bg); border-color: var(--fg); border-bottom-right-radius: 0; margin-left: auto; }
.fcs-bubble[data-state="pending"] { opacity: 0.55; }
.fcs-bubble[data-state="error"]   { border-style: dashed; color: var(--fg-soft); }

/* ---------- Sub-headers inside the chatbot flow section (above each row, on canvas). ---------- */
.fcw-row-head {
  position: absolute;
  display: flex;
  align-items: baseline;
  gap: 16px;
  color: var(--canvas-fg);
}
.fcw-row-head .k {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--canvas-label);
}
.fcw-row-head .n {
  font-size: 16px;
  font-weight: var(--w-ui);
  letter-spacing: -0.01em;
  color: var(--canvas-fg);
}
.fcw-row-head .t {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--canvas-label);
}

/* ========== flow-consumer-account.css ========== */
/* =========================================================
   Flow · Consumer Account — end-to-end (F · Consumer Account)
   Sits in the Flows zone, far-right gutter past the slides bar
   (x = 70000+). Uses only wf-* / ki-* primitives + tokens.
   No new color, weight, or radius tokens.
   ========================================================= */

/* ---- per-row sub-header inside the section (smaller than wf-section-header) ---- */
.caf-row { position: relative; }
.caf-row-head {
  position: absolute;
  top: -56px;
  left: 0;
  display: flex;
  align-items: baseline;
  gap: 16px;
  white-space: nowrap;
}
.caf-row-head .num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--bone-muted);
}
.caf-row-head .name {
  font-size: 18px;
  font-weight: var(--w-ui);
  letter-spacing: -0.01em;
  color: var(--canvas-fg);
}
.caf-row-head .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--canvas-label);
  letter-spacing: 0.08em;
  border: 1px solid var(--bone-dim);
  padding: 2px 8px;
  border-radius: var(--r-full);
}

/* ============================================================
   AUTH · web shell (caw-au) — split sign-in / create / verify
   ============================================================ */
.caw-au {
  width: 1440px;
  background: var(--bg);
  color: var(--fg);
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 900px;
  position: relative;
}
.caw-au-aside {
  padding: 48px;
  background: var(--placeholder);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
}
.caw-au-aside::after {
  content: "FULL-BLEED POSTER";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--fg-mute);
  font-size: 12px;
  letter-spacing: 0.2em;
  pointer-events: none;
}
.caw-au-aside .brand,
.caw-au-aside .quote { position: relative; z-index: 2; }
.caw-au-aside .brand { font-size: 18px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.caw-au-aside .quote .q { font-size: 22px; font-weight: var(--w-title); letter-spacing: -0.02em; line-height: 1.2; max-width: 400px; margin: 0 0 14px; text-wrap: balance; }
.caw-au-aside .quote .meta { font-size: 12px; color: var(--fg-soft); font-weight: 400; }

.caw-au-pane {
  padding: 80px 96px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.caw-au-pane .head { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
.caw-au-pane h1 { font-size: 40px; font-weight: var(--w-title); letter-spacing: -0.03em; margin: 8px 0 6px; line-height: 1.02; }
.caw-au-pane .sub { font-size: 14px; color: var(--fg-soft); font-weight: 400; }
.caw-au-form { display: flex; flex-direction: column; gap: 16px; max-width: 420px; }
.caw-au-socials { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.caw-au-divider { display: flex; align-items: center; gap: 12px; color: var(--fg-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; margin: 4px 0; }
.caw-au-divider .l { flex: 1; height: 1px; background: var(--hair); }
.caw-au-foot { margin-top: 20px; font-size: 12px; color: var(--fg-soft); }
.caw-au-foot a { color: var(--fg); font-weight: var(--w-title); cursor: pointer; }

/* inline error / hint under inputs */
.caf-field-msg {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--fg-mute);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.caf-field-msg[data-state="error"] { color: var(--fg); }
.caf-field-msg[data-state="error"] .dot { width: 6px; height: 6px; border-radius: var(--r-full); background: var(--fg); }
.caf-field-msg[data-state="ok"]    .dot { width: 6px; height: 6px; border-radius: var(--r-full); background: var(--fg-soft); }
.wf-input[data-state="error"]   { border-color: var(--fg); box-shadow: inset 0 -1px 0 var(--fg); }
.wf-input[data-state="focus"]   { border-color: var(--hair-2); box-shadow: 0 0 0 2px var(--hair); }
.wf-input[data-state="loading"] { opacity: 0.55; }
.wf-input[data-state="disabled"] { opacity: 0.45; }
.wf-input .trail.spin { display: inline-flex; gap: 4px; align-items: center; color: var(--fg-mute); }
.wf-input .trail.spin .d { width: 4px; height: 4px; border-radius: var(--r-full); background: currentColor; opacity: 0.6; }

/* loading button content (inline dots) */
.caf-spin {
  display: inline-flex; gap: 4px; align-items: center;
}
.caf-spin .d {
  width: 4px; height: 4px; border-radius: var(--r-full);
  background: currentColor; opacity: 0.7;
}

/* ============================================================
   AUTH · mobile shell (cam-au)
   ============================================================ */
.cam-au {
  width: 390px;
  height: 844px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.cam-au-hero {
  height: 260px;
  flex: 0 0 260px;
  margin: -10px 0 0;
  position: relative;
  background: var(--placeholder);
  display: grid;
  place-items: center;
  color: var(--fg-mute);
  font-size: 10px;
  letter-spacing: 0.2em;
}
.cam-au-hero .wash {
  position: absolute; inset: 0;
  background: var(--wash);
}
.cam-au-body {
  flex: 1;
  padding: 20px 20px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow: hidden;
}
.cam-au-body .head { display: flex; flex-direction: column; gap: 6px; }
.cam-au-body h1 { font-size: 24px; font-weight: var(--w-title); letter-spacing: -0.03em; margin: 0; line-height: 1.05; text-wrap: balance; }
.cam-au-body .sub { font-size: 12px; color: var(--fg-soft); font-weight: 400; }
.cam-au-form { display: flex; flex-direction: column; gap: 10px; }
.cam-au-socials { display: grid; gap: 6px; }
.cam-au-divider { display: flex; align-items: center; gap: 10px; color: var(--fg-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; margin: 4px 0; }
.cam-au-divider .l { flex: 1; height: 1px; background: var(--hair); }
.cam-au-foot { margin-top: 8px; font-size: 11px; color: var(--fg-soft); text-align: center; }
.cam-au-foot a { color: var(--fg); font-weight: var(--w-title); cursor: pointer; }

/* ============================================================
   PROFILE · web shell (caw-pf)
   ============================================================ */
.caw-pf {
  width: 1440px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  min-height: 900px;
}
.caw-pf-cover {
  height: 220px;
  background: var(--placeholder);
  position: relative;
  display: grid;
  place-items: center;
  color: var(--fg-mute);
  font-size: 10px;
  letter-spacing: 0.2em;
}
.caw-pf-body {
  padding: 0 96px 64px;
  flex: 1;
}
.caw-pf-hero {
  display: grid;
  grid-template-columns: 132px 1fr auto;
  gap: 32px;
  align-items: end;
  padding: 0 0 28px;
  margin-top: -56px;
}
.caw-pf-avatar {
  width: 132px; height: 132px;
  border-radius: var(--r-full);
  background: var(--placeholder);
  border: 4px solid var(--bg);
  display: grid;
  place-items: center;
  font-size: 28px;
  font-weight: var(--w-title);
  letter-spacing: -0.02em;
  color: var(--fg-soft);
}
.caw-pf-id { padding-bottom: 6px; }
.caw-pf-id .kicker { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.08em; }
.caw-pf-id h1 { margin: 6px 0 4px; font-size: 36px; font-weight: var(--w-title); letter-spacing: -0.025em; }
.caw-pf-id .meta { font-size: 13px; color: var(--fg-soft); display: flex; gap: 8px; align-items: center; }
.caw-pf-acts { display: flex; gap: 8px; padding-bottom: 6px; }

.caw-pf-counters {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
  padding: 24px 0;
  border-top: 1px solid var(--hair);
  border-bottom: 1px solid var(--hair);
}
.caw-pf-counters .item .v { font-size: 26px; font-weight: var(--w-title); letter-spacing: -0.02em; font-family: var(--font-mono); }
.caw-pf-counters .item .k { font-size: 11px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

.caw-pf-tabs {
  display: flex;
  align-items: center;
  gap: 32px;
  padding: 20px 0 0;
  border-bottom: 1px solid var(--hair);
}
.caw-pf-tabs a {
  padding: 10px 0 14px;
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-soft);
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
}
.caw-pf-tabs a[aria-current="page"] {
  color: var(--fg);
  border-bottom-color: var(--fg);
}
.caw-pf-tabs .right { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); padding: 10px 0; }

.caw-pf-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 48px;
  padding: 28px 0 0;
}

/* About & links column */
.caw-pf-about h3,
.caw-pf-side  h3 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); margin: 0 0 10px; }
.caw-pf-about p { font-size: 14px; line-height: 1.55; color: var(--fg-soft); margin: 0 0 24px; max-width: 560px; }
.caw-pf-links { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
.caw-pf-links .l {
  display: grid;
  grid-template-columns: 16px 1fr auto;
  gap: 10px;
  align-items: center;
  font-size: 13px;
  padding: 10px 0;
  border-bottom: 1px solid var(--hair);
}
.caw-pf-links .l .ic { color: var(--fg-mute); display: inline-flex; }
.caw-pf-links .l .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); }

/* Past events list (right column) */
.caw-pf-list { display: flex; flex-direction: column; gap: 0; }
.caw-pf-row {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--hair);
}
.caw-pf-row .img {
  width: 56px; height: 56px;
  background: var(--placeholder);
  border-radius: var(--r-1);
  display: grid; place-items: center;
  color: var(--fg-mute);
  font-size: 9px;
  letter-spacing: 0.1em;
}
.caw-pf-row .t { font-size: 13px; color: var(--fg); letter-spacing: -0.005em; }
.caw-pf-row .s { font-size: 11px; color: var(--fg-mute); margin-top: 2px; font-family: var(--font-mono); }
.caw-pf-row .m { font-family: var(--font-mono); font-size: 11px; color: var(--fg-soft); }

/* Empty profile state — centered */
.caw-pf-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 64px 40px 24px;
  text-align: center;
  gap: 12px;
  max-width: 560px;
  margin: 32px auto 0;
}
.caw-pf-empty .glyph {
  width: 64px; height: 64px;
  display: grid; place-items: center;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  color: var(--fg-soft);
}
.caw-pf-empty h2 { font-size: 28px; font-weight: var(--w-ui); letter-spacing: -0.025em; margin: 4px 0 0; text-wrap: balance; }
.caw-pf-empty p { font-size: 13px; color: var(--fg-soft); line-height: 1.55; margin: 0; max-width: 440px; }
.caw-pf-empty .acts { display: flex; gap: 8px; margin-top: 8px; }

/* Skeleton (loading) profile */
.caf-skel { background: var(--placeholder); border-radius: var(--r-1); display: block; }
.caf-skel.line { height: 12px; }
.caf-skel.line-l { height: 16px; }
.caf-skel.circle { border-radius: var(--r-full); }
.caf-skel.box { border-radius: var(--r-1); }

/* ============================================================
   PROFILE · mobile shell (cam-pf)
   ============================================================ */
.cam-pf {
  width: 390px;
  height: 844px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.cam-pf-cover {
  height: 132px;
  margin: -10px 0 0;
  background: var(--placeholder);
  position: relative;
  display: grid; place-items: center;
  color: var(--fg-mute);
  font-size: 9px;
  letter-spacing: 0.2em;
}
.cam-pf-body {
  flex: 1;
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.cam-pf-hero {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 14px;
  align-items: end;
  padding: 0 0 14px;
  margin-top: -40px;
}
.cam-pf-avatar {
  width: 80px; height: 80px;

  border: 3px solid var(--bg);
  display: grid; place-items: center;
  font-size: 18px;
  font-weight: var(--w-title);

}
.cam-pf-id { padding-bottom: 4px; }
.cam-pf-id h1 { margin: 0; font-size: 20px; font-weight: var(--w-title); letter-spacing: -0.02em; }
.cam-pf-id .kicker { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.08em; }

.cam-pf-acts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }

.cam-pf-counters {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;

  border-top: 1px solid var(--hair);

}
.cam-pf-counters .item { text-align: center; }
.cam-pf-counters .item .v { font-size: 18px; font-weight: var(--w-title); letter-spacing: -0.01em; font-family: var(--font-mono); }
.cam-pf-counters .item .k { font-size: 9px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

.cam-pf-tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  padding: 12px 0 0;
  border-bottom: 1px solid var(--hair);
}
.cam-pf-tabs a {
  text-align: center;
  padding: 10px 0;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;

  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
}
.cam-pf-tabs a[aria-current="page"] { color: var(--fg); border-bottom-color: var(--fg); }

.cam-pf-list { flex: 1; padding: 8px 0 0; overflow: hidden; }
.cam-pf-row {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 10px 0;

}
.cam-pf-row .img { width: 44px; height: 44px; background: var(--placeholder); border-radius: var(--r-1); display: grid; place-items: center; color: var(--fg-mute); font-size: 8px; letter-spacing: 0.1em; }
.cam-pf-row .t { font-size: 12px; color: var(--fg); }
.cam-pf-row .s { font-size: 10px; color: var(--fg-mute); margin-top: 2px; font-family: var(--font-mono); }
.cam-pf-row .m { font-family: var(--font-mono); font-size: 10px; color: var(--fg-soft); }

.cam-pf-empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px;
  text-align: center;
  gap: 10px;
}
.cam-pf-empty .glyph {
  width: 52px; height: 52px;
  display: grid; place-items: center;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);

}
.cam-pf-empty h2 { font-size: 18px; font-weight: var(--w-ui); letter-spacing: -0.02em; margin: 0; }
.cam-pf-empty p { font-size: 11px; color: var(--fg-soft); line-height: 1.5; margin: 0; max-width: 240px; }
.cam-pf-empty .acts { display: flex; gap: 6px; margin-top: 6px; }

/* ============================================================
   PROFILE EDIT (caw-pe / cam-pe)
   ============================================================ */
.caw-pe {
  width: 1440px;
  background: var(--bg);
  color: var(--fg);
  min-height: 900px;
  display: flex; flex-direction: column;
}
.caw-pe-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 96px;
  border-bottom: 1px solid var(--hair);
}
.caw-pe-bar .t { font-size: 13px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.caw-pe-bar .s { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); }
.caw-pe-bar .sp { flex: 1; }
.caw-pe-body {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 64px;
  padding: 48px 96px 64px;
  flex: 1;
}
.caw-pe-aside { font-size: 12px; color: var(--fg-soft); display: flex; flex-direction: column; gap: 14px; }
.caw-pe-aside h2 { font-size: 22px; font-weight: var(--w-title); letter-spacing: -0.02em; margin: 0 0 4px; color: var(--fg); }
.caw-pe-aside .h { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.08em; }

.caw-pe-form { display: flex; flex-direction: column; gap: 24px; max-width: 600px; }
.caw-pe-row {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 20px;
  align-items: start;
  padding: 16px 0;
  border-bottom: 1px solid var(--hair);
}
.caw-pe-row .lbl { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-mute); padding-top: 10px; }
.caw-pe-row .field { display: flex; flex-direction: column; gap: 6px; }
.caw-pe-row textarea {
  width: 100%;
  min-height: 88px;
  padding: 10px 12px;
  background: var(--input);
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  color: var(--fg);
  font: inherit;
  resize: vertical;
}
.caw-pe-avatar-row {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 14px;
  align-items: center;
}
.caw-pe-avatar-row .av {
  width: 64px; height: 64px; border-radius: var(--r-full);
  background: var(--placeholder); display: grid; place-items: center;
  font-weight: var(--w-title); color: var(--fg-soft);
}
.caw-pe-avatar-row .info { font-size: 11px; color: var(--fg-mute); font-family: var(--font-mono); }

.cam-pe { width: 390px; height: 844px; background: var(--bg); color: var(--fg); display: flex; flex-direction: column; overflow: hidden; }
