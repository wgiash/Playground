.cam-pe-row { display: flex; flex-direction: column; gap: 6px; padding: 12px 0; border-bottom: 1px solid var(--hair); }
.cam-pe-row:last-child { border-bottom: 0; }
.cam-pe-row .lbl { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-mute); }
.cam-pe-avatar { display: grid; grid-template-columns: 56px 1fr auto; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--hair); }
.cam-pe-avatar .av { width: 56px; height: 56px; border-radius: var(--r-full); background: var(--placeholder); display: grid; place-items: center; font-weight: var(--w-title); color: var(--fg-soft); }

/* ============================================================
   TICKETS / RSVPS (caw-tk / cam-tk)
   ============================================================ */
.caw-tk { width: 1440px; background: var(--bg); color: var(--fg); min-height: 900px; display: flex; flex-direction: column; }
.caw-tk-head { padding: 32px 96px 0; }
.caw-tk-head h1 { font-size: 36px; font-weight: var(--w-title); letter-spacing: -0.025em; margin: 12px 0 4px; }
.caw-tk-head .sub { font-size: 13px; color: var(--fg-soft); margin-bottom: 18px; }
.caw-tk-tabs { display: flex; align-items: center; gap: 32px; border-bottom: 1px solid var(--hair); padding: 0 96px; }
.caw-tk-tabs a { padding: 14px 0; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-soft); border-bottom: 1px solid transparent; margin-bottom: -1px; cursor: pointer; }
.caw-tk-tabs a[aria-current="page"] { color: var(--fg); border-bottom-color: var(--fg); }
.caw-tk-tabs .count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); padding: 14px 0; }
.caw-tk-body { padding: 24px 96px 64px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.caw-tk-card {
  display: grid;
  grid-template-columns: 96px 1fr auto;
  gap: 18px;
  align-items: center;
  padding: 18px 20px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  background: var(--bg);
}
.caw-tk-card[data-state="past"] { opacity: 0.6; }
.caw-tk-card[data-state="cancelled"] { opacity: 0.45; }
.caw-tk-card .img { width: 96px; height: 96px; background: var(--placeholder); border-radius: var(--r-1); display: grid; place-items: center; color: var(--fg-mute); font-size: 9px; letter-spacing: 0.12em; }
.caw-tk-card .meta .k { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); letter-spacing: 0.08em; text-transform: uppercase; }
.caw-tk-card .meta h3 { margin: 4px 0 4px; font-size: 18px; font-weight: var(--w-title); letter-spacing: -0.015em; }
.caw-tk-card .meta .s { font-size: 12px; color: var(--fg-soft); }
.caw-tk-card .right { text-align: right; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.caw-tk-card .right .when { font-family: var(--font-mono); font-size: 11px; color: var(--fg-soft); }
.caw-tk-card .right .pill { font-size: 10px; }

/* mobile tickets */
.cam-tk { width: 390px; height: 844px; background: var(--bg); color: var(--fg); display: flex; flex-direction: column; overflow: hidden; }
.cam-tk-head { padding: 12px 16px 0; }
.cam-tk-head h1 { font-size: 22px; font-weight: var(--w-title); letter-spacing: -0.02em; margin: 8px 0 4px; }
.cam-tk-tabs { display: grid; grid-template-columns: 1fr 1fr; padding: 8px 16px 0; border-bottom: 1px solid var(--hair); }
.cam-tk-tabs a { text-align: center; padding: 10px 0; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-soft); border-bottom: 1px solid transparent; margin-bottom: -1px; }
.cam-tk-tabs a[aria-current="page"] { color: var(--fg); border-bottom-color: var(--fg); }
.cam-tk-list { flex: 1; padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
.cam-tk-card {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
}
.cam-tk-card[data-state="past"] { opacity: 0.55; }
.cam-tk-card .img { width: 64px; height: 64px; background: var(--placeholder); border-radius: var(--r-1); display: grid; place-items: center; color: var(--fg-mute); font-size: 8px; letter-spacing: 0.12em; }
.cam-tk-card .meta .k { font-family: var(--font-mono); font-size: 9px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.1em; }
.cam-tk-card .meta h3 { margin: 2px 0 2px; font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.01em; }
.cam-tk-card .meta .s { font-size: 11px; color: var(--fg-soft); }
.cam-tk-card .meta .when { font-family: var(--font-mono); font-size: 10px; color: var(--fg-soft); margin-top: 4px; }

/* ============================================================
   SAVED + FOLLOWING (caw-sf / cam-sf)
   ============================================================ */
.caw-sf { width: 1440px; background: var(--bg); color: var(--fg); min-height: 900px; display: flex; flex-direction: column; }
.caw-sf-body { padding: 24px 96px 64px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; }
.caw-sf-col h3 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); margin: 0 0 14px; display: flex; align-items: baseline; gap: 8px; }
.caw-sf-col h3 .c { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); }

.caw-sf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.caw-sf-card {
  display: grid;
  grid-template-columns: 72px 1fr auto;
  gap: 14px;
  padding: 14px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  align-items: center;
}
.caw-sf-card .img { width: 72px; height: 72px; background: var(--placeholder); border-radius: var(--r-1); display: grid; place-items: center; color: var(--fg-mute); font-size: 9px; letter-spacing: 0.1em; }
.caw-sf-card .t { font-size: 13px; color: var(--fg); }
.caw-sf-card .s { font-size: 11px; color: var(--fg-mute); font-family: var(--font-mono); margin-top: 2px; }

.caw-sf-row {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--hair);
  align-items: center;
}
.caw-sf-row .av { width: 44px; height: 44px; border-radius: var(--r-full); background: var(--placeholder); display: grid; place-items: center; color: var(--fg-soft); font-weight: var(--w-title); font-size: 14px; }
.caw-sf-row .t { font-size: 13px; }
.caw-sf-row .s { font-size: 11px; color: var(--fg-mute); font-family: var(--font-mono); margin-top: 2px; }

.cam-sf { width: 390px; height: 844px; background: var(--bg); color: var(--fg); display: flex; flex-direction: column; overflow: hidden; }
.cam-sf-tabs { display: grid; grid-template-columns: 1fr 1fr; padding: 8px 16px 0; border-bottom: 1px solid var(--hair); }
.cam-sf-tabs a { text-align: center; padding: 10px 0; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-soft); border-bottom: 1px solid transparent; margin-bottom: -1px; }
.cam-sf-tabs a[aria-current="page"] { color: var(--fg); border-bottom-color: var(--fg); }
.cam-sf-list { flex: 1; padding: 8px 16px 16px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
.cam-sf-card {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 12px;
  padding: 10px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  align-items: center;
}
.cam-sf-card .img { width: 56px; height: 56px; background: var(--placeholder); border-radius: var(--r-1); display: grid; place-items: center; color: var(--fg-mute); font-size: 8px; letter-spacing: 0.12em; }
.cam-sf-card .t { font-size: 12px; }
.cam-sf-card .s { font-size: 10px; color: var(--fg-mute); font-family: var(--font-mono); margin-top: 2px; }

/* ============================================================
   PAYMENT METHODS (caw-pm / cam-pm)
   ============================================================ */
.caw-pm-card,
.cam-pm-card {
  display: grid;
  grid-template-columns: 48px 1fr auto;
  gap: 14px;
  padding: 14px 16px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  align-items: center;
}
.caw-pm-card[data-state="default"] { border-color: var(--hair-2); }
.caw-pm-card .brand,
.cam-pm-card .brand {
  width: 48px; height: 32px;
  border-radius: var(--r-1);
  background: var(--placeholder);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--fg-mute);
}
.caw-pm-card .num,
.cam-pm-card .num { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.04em; }
.caw-pm-card .exp,
.cam-pm-card .exp { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); margin-top: 2px; }
.caw-pm-card .pill,
.cam-pm-card .pill { font-size: 10px; }

.caw-pm-empty, .cam-pm-empty {
  border: 1px dashed var(--hair-2);
  border-radius: var(--r-1);
  padding: 28px 24px;
  text-align: center;
  color: var(--fg-soft);
  font-size: 13px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}

/* ============================================================
   RE-AUTH MODAL · DELETE CONFIRM · GOODBYE (caf-modal / caf-bye)
   ============================================================ */
.caf-modal-shell {
  width: 1440px; height: 900px;
  background: var(--bg);
  color: var(--fg);
  position: relative;
  overflow: hidden;
}
.caf-modal-behind {
  position: absolute; inset: 0;
  padding: 32px 96px;
  display: grid; gap: 12px;
  pointer-events: none;
}
.caf-modal-behind .ln {
  height: 14px;
  background: var(--placeholder);
  border-radius: var(--r-1);
}
.caf-modal-scrim {
  position: absolute; inset: 0;
  background: var(--scrim);
}
.caf-modal-card {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 480px;
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  padding: 32px 32px 24px;
  display: flex; flex-direction: column; gap: 14px;
}
.caf-modal-card .k { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.1em; }
.caf-modal-card h2 { margin: 4px 0 0; font-size: 24px; font-weight: var(--w-title); letter-spacing: -0.02em; }
.caf-modal-card p  { margin: 0; font-size: 13px; color: var(--fg-soft); line-height: 1.55; }
.caf-modal-card .acts { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.caf-modal-card .warn {
  padding: 10px 12px;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg);
  display: flex; align-items: flex-start; gap: 8px;
  background: var(--panel);
}

/* mobile sheet variant of the modal */
.caf-modal-sheet-shell {
  width: 390px; height: 844px;
  background: var(--bg);
  color: var(--fg);
  position: relative;
  overflow: hidden;
}
.caf-modal-sheet {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  background: var(--bg);
  border-top: 1px solid var(--hair-2);
  border-top-left-radius: 12px;
  border-top-right-radius: 12px;
  padding: 14px 18px 24px;
  display: flex; flex-direction: column; gap: 12px;
  max-height: 80%;
}
.caf-modal-sheet .grab { width: 40px; height: 4px; background: var(--hair-2); border-radius: var(--r-full); margin: 0 auto 6px; }
.caf-modal-sheet h2 { margin: 4px 0 0; font-size: 18px; font-weight: var(--w-title); letter-spacing: -0.02em; }
.caf-modal-sheet p  { margin: 0; font-size: 12px; color: var(--fg-soft); line-height: 1.5; }
.caf-modal-sheet .acts { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }

/* signed-out / goodbye card */
.caw-bye, .cam-bye {
  background: var(--bg); color: var(--fg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  gap: 12px;
}
.caw-bye { width: 1440px; height: 900px; padding: 0 96px; }
.cam-bye { width: 390px; height: 844px; padding: 0 24px; }
.caw-bye .glyph, .cam-bye .glyph {
  width: 64px; height: 64px;
  display: grid; place-items: center;
  border: 1px solid var(--hair-2);
  border-radius: var(--r-full);
  color: var(--fg-soft);
  margin-bottom: 4px;
}
.caw-bye h1 { font-size: 40px; font-weight: var(--w-ui); letter-spacing: -0.03em; margin: 0; max-width: 540px; }
.cam-bye h1 { font-size: 22px; font-weight: var(--w-ui); letter-spacing: -0.02em; margin: 0; }
.caw-bye p, .cam-bye p { color: var(--fg-soft); margin: 0; max-width: 420px; line-height: 1.5; }
.caw-bye .acts, .cam-bye .acts { display: flex; gap: 8px; margin-top: 12px; }

/* ============================================================
   STATES PALETTE (cas) — interaction states grid
   ============================================================ */
.cas {
  width: 1840px;
  background: var(--bg);
  color: var(--fg);
  padding: 40px 48px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
}
.cas-head { display: flex; align-items: baseline; gap: 16px; }
.cas-head .k { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-mute); }
.cas-head h2 { margin: 0; font-size: 28px; font-weight: var(--w-ui); letter-spacing: -0.02em; }
.cas-head .s { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); margin-left: auto; }

.cas-cols {
  display: grid;
  grid-template-columns: 1.1fr 1.1fr 1fr 1fr 1fr;
  gap: 24px;
}
.cas-col {
  display: flex; flex-direction: column;
  gap: 10px;
  border: 1px solid var(--hair);
  border-radius: var(--r-1);
  padding: 16px;
}
.cas-col .col-t { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); }
.cas-col .col-s { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); margin-bottom: 4px; }
.cas-row {
  display: grid;
  grid-template-columns: 88px 1fr;
  gap: 12px;
  align-items: center;
  padding: 8px 0;
  border-top: 1px dashed var(--hair);
}
.cas-row:first-of-type { border-top: 0; }
.cas-row .state {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* toast (used inside the goodbye / network-error frame) */
.caf-toast {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--panel);
  border: 1px solid var(--hair-2);
  border-radius: var(--r-1);
  font-size: 12px;
  color: var(--fg);
}
.caf-toast .dot { width: 6px; height: 6px; border-radius: var(--r-full); background: var(--fg); }
.caf-toast[data-tone="error"] .dot { background: var(--fg); }

/* ---------- Topbar · Index button ---------- */
.topbar-index-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border: 1px solid rgba(234,228,226,0.2);
  border-radius: var(--r-full);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: rgba(234,228,226,0.75);
  background: transparent;
  cursor: pointer;
}
.topbar-index-btn:hover { color: var(--canvas-fg); border-color: rgba(234,228,226,0.45); }
.topbar-index-btn .kbd {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 5px;
  border: 1px solid rgba(234,228,226,0.2);
  border-radius: 2px;
  color: rgba(234,228,226,0.55);
}

/* ---------- Canvas Index panel ---------- */
.canvas-index-scrim {
  position: fixed;
  inset: 0;
  background: rgba(11,8,7,0.72);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 60;
  display: grid;
  place-items: start center;
  padding: 96px 24px 24px;
  pointer-events: auto;
}
.canvas-index-panel {
  width: min(560px, 100%);
  max-height: min(72vh, 720px);
  display: flex;
  flex-direction: column;
  background: var(--canvas-panel);
  border: 1px solid rgba(234,228,226,0.14);
  border-radius: var(--r-2);
  box-shadow: 0 40px 120px rgba(0,0,0,0.55);
  overflow: hidden;
}
.canvas-index-head {
  display: grid;
  grid-template-columns: 18px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 16px 18px;
  border-bottom: 1px solid rgba(234,228,226,0.1);
  color: rgba(234,228,226,0.55);
}
.canvas-index-head input {
  background: transparent;
  border: 0;
  outline: 0;
  color: var(--canvas-fg);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.01em;
  width: 100%;
}
.canvas-index-head input::placeholder { color: rgba(234,228,226,0.35); }
.canvas-index-head .esc {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  border: 1px solid rgba(234,228,226,0.2);
  border-radius: 2px;
  color: rgba(234,228,226,0.5);
}
.canvas-index-filters {
  position: relative;
  z-index: 2;
  flex: 0 0 auto;
  display: flex;
  gap: 6px;
  padding: 10px 18px;
  background: var(--canvas-panel);
  border-bottom: 1px solid rgba(234,228,226,0.08);
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
}
.canvas-index-filters::-webkit-scrollbar { display: none; }
.canvas-index-filter {
  flex: 0 0 auto;
  min-width: max-content;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 26px;
  padding: 0 12px;
  border: 1px solid rgba(234,228,226,0.18);
  border-radius: var(--r-full);
  background: transparent;
  color: rgba(234,228,226,0.72);
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: 0.01em;
  cursor: pointer;
  white-space: nowrap;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  transition: background-color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.canvas-index-filter:hover {
  border-color: rgba(234,228,226,0.38);
}
.canvas-index-filter[aria-pressed="true"] {
  background: var(--canvas-fg);
  border-color: var(--canvas-fg);
  color: var(--canvas-bg);
}
.canvas-index-filter .c {
  font-family: var(--font-mono);
  font-size: 10px;
  font-variant-numeric: tabular-nums;
  opacity: 0.55;
}
.canvas-index-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.canvas-index-group {
  padding: 8px 18px 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(234,228,226,0.35);
  display: flex;
  justify-content: space-between;
}
.canvas-index-item {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: baseline;
  gap: 14px;
  padding: 10px 18px;
  cursor: pointer;
  border-left: 2px solid transparent;
  color: var(--canvas-fg);
}
.canvas-index-item:hover,
.canvas-index-item[data-focus="true"] {
  background: rgba(234,228,226,0.04);
  border-left-color: var(--canvas-fg);
}
.canvas-index-item .n {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.canvas-index-item .t {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(234,228,226,0.4);
  letter-spacing: 0;
}
.canvas-index-item .coords {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(234,228,226,0.3);
}
.canvas-index-empty {
  padding: 32px 18px;
  text-align: center;
  color: rgba(234,228,226,0.4);
  font-size: 13px;
}
.canvas-index-foot {
  padding: 8px 18px;
  border-top: 1px solid rgba(234,228,226,0.1);
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(234,228,226,0.4);
  display: flex;
  gap: 14px;
}
.canvas-index-foot .kbd {
  padding: 1px 5px;
  border: 1px solid rgba(234,228,226,0.2);
  border-radius: 2px;
  color: rgba(234,228,226,0.6);
}


/* ========== flow-toasts.css ========== */
/* =========================================================
   Flow · Toasts — end-to-end
   Sits in the Flows zone at x=0, y=22000.
   tst-* = shared anatomy · tstw-* = web · tstm-* = mobile.
   No color for emphasis — variants differ by glyph + label.
   Uses only tokens + wf-* / ki-* / .flow-intro shared.
   ========================================================= */

/* ---- Dimmed product surface behind the stack so toast reads above it ---- */
.tstw-page, .tstm-page { position: relative; height: 100%; overflow: hidden; }
.tstw-stub, .tstm-stub { padding: 24px 32px; opacity: 0.32; }
.tstw-stub .line, .tstm-stub .line {
  height: 8px; background: var(--placeholder); border-radius: var(--r-1); margin: 10px 0;
}
.tstw-stub .line.w90 { width: 90%; }
.tstw-stub .line.w70 { width: 70%; }
.tstw-stub .line.w55 { width: 55%; }
.tstw-stub .line.w40 { width: 40%; }
.tstw-stub .card {
  height: 110px; background: var(--placeholder); border-radius: var(--r-1); margin: 14px 0;
}
.tstm-stub .line { margin: 8px 0; }
.tstm-stub .card { height: 80px; background: var(--placeholder); border-radius: var(--r-1); margin: 10px 0; }

/* ---- Stack / positioning ---- */
.tst-stack {
  position: absolute;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 5;
}
.tstw-stack { right: 24px; bottom: 24px; width: 380px; }
.tstm-stack {
  left: 16px; right: 16px;
  bottom: calc(64px + 16px);
}
.tstm-stack[data-no-nav="true"] { bottom: 16px; }

/* ---- Single toast anatomy ---- */
.tst-toast {
  display: grid;
  grid-template-columns: 32px 1fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 12px 12px 12px 12px;
  background: var(--wf-light-panel);
  color: var(--wf-light-fg);
  border: 1px solid var(--wf-light-hair-2);
  border-radius: var(--r-2);
  position: relative;
  overflow: hidden;
}
.tst-toast .ic {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border: 1px solid var(--wf-light-hair-2);
  border-radius: 50%;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: var(--w-ui);
  color: var(--wf-light-fg);
  background: transparent;
}
.tst-toast .tx { min-width: 0; }
.tst-toast .t {
  font-size: 13px; font-weight: var(--w-ui); line-height: 1.3;
  letter-spacing: -0.01em;
  color: var(--wf-light-fg);
}
.tst-toast .s {
  font-size: 11px; font-weight: var(--w-meta); line-height: 1.4;
  color: var(--dark-soft);
  margin-top: 2px;
}
.tst-toast .act {
  font-size: 10px; font-weight: var(--w-ui);
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 6px 10px;
  border: 1px solid var(--wf-light-hair-2);
  border-radius: var(--r-full);
  white-space: nowrap;
  background: transparent;
  color: var(--wf-light-fg);
  cursor: pointer;
}
.tst-toast .act[data-primary="true"] {
  background: var(--wf-light-fg); color: var(--wf-light-bg); border-color: var(--wf-light-fg);
}
.tst-toast .x {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  border: 0; background: transparent;
  font-size: 14px; line-height: 1;
  color: var(--dark-soft);
  cursor: pointer;
}
.tst-toast .progress {
  position: absolute;
  left: 0; bottom: 0;
  height: 2px;
  background: var(--wf-light-fg);
}
.tst-toast .progress[data-buffer="true"] {
  background: var(--dark-muted);
}

/* variant glyphs — emphasis is shape + label, not color */
.tst-toast[data-variant="info"] .ic::before    { content: "i"; font-style: italic; }
.tst-toast[data-variant="success"] .ic::before { content: "✓"; }
.tst-toast[data-variant="warning"] .ic::before { content: "!"; }
.tst-toast[data-variant="error"] .ic::before   { content: "×"; font-size: 16px; }
.tst-toast[data-variant="promo"] .ic::before   { content: "★"; }
.tst-toast[data-variant="loading"] .ic {
  border-color: var(--wf-light-hair);
  border-top-color: var(--wf-light-fg);
}
.tst-toast[data-variant="loading"] .ic::before { content: ""; }

/* multi-line · action below text */
.tst-toast[data-shape="block"] {
  grid-template-columns: 32px 1fr auto;
  grid-template-areas: "ic tx x" "ic acts acts";
  row-gap: 10px;
  padding: 14px 14px;
}
.tst-toast[data-shape="block"] .ic   { grid-area: ic; align-self: start; }
.tst-toast[data-shape="block"] .tx   { grid-area: tx; }
.tst-toast[data-shape="block"] .acts { grid-area: acts; display: flex; gap: 8px; }
.tst-toast[data-shape="block"] .x    { grid-area: x; align-self: start; }

/* avatar variant — square placeholder instead of glyph circle */
.tst-toast[data-glyph="avatar"] .ic {
  border-radius: var(--r-1);
  font-size: 9px; letter-spacing: 0.1em;
  background: var(--placeholder);
  border-color: transparent;
  color: var(--dark-muted);
}

/* swipe state — translated + RELEASE prompt visible behind */
.tst-toast[data-swipe="true"] {
  transform: translateX(54%);
  opacity: 0.65;
}
.tst-toast[data-swipe="true"]::after {
  content: "RELEASE TO DISMISS";
  position: absolute;
  left: 16px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.08em; color: var(--dark-soft);
  pointer-events: none;
}

/* stack offset — older toasts behind */
.tst-toast[data-stack-pos="1"] { transform: translateY(-2px) scale(0.985); opacity: 0.94; }
.tst-toast[data-stack-pos="2"] { transform: translateY(-4px) scale(0.97); opacity: 0.86; }

/* +N more chip */
.tst-more {
  align-self: center;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--bone-soft);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.tstw-stack .tst-more { color: var(--bone-soft); }
.tstm-stack .tst-more { color: var(--bone-soft); }

/* mobile sizing — tighter */
.tstm-stack .tst-toast {
  padding: 11px 12px;
  border-radius: var(--r-2);
}
.tstm-stack .tst-toast .t { font-size: 12px; }

/* hover/focus rings on interactive parts (specimen only) */
.tst-toast .act[data-state="hover"] { background: var(--wf-light-hair); }
.tst-toast .act[data-state="focus"] { box-shadow: 0 0 0 2px var(--wf-light-fg) inset; }
.tst-toast .x[data-state="hover"]   { color: var(--wf-light-fg); }

/* --- States specimen layout --- */
.tsts {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 28px;
  padding: 32px 36px;
  height: 100%;
  background: var(--canvas-panel);
  color: var(--canvas-fg);
  overflow: hidden;
}
.tsts .col { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
.tsts h3 {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--canvas-label);
  margin: 0 0 4px;
}
.tsts .demo {
  background: transparent;
  position: relative;
}
.tsts .demo .tst-toast { width: 100%; }
.tsts .meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--canvas-label);
  letter-spacing: 0.04em;
  margin-top: 2px;
}


/* ========== flow-saas-account.css ========== */
/* =========================================================
   Flow · SaaS Account — end-to-end
   Sits in the Flows zone at x=0, y=26000.
   Host-side organisation account: members, roles, billing,
   invoices, API keys, audit log, sign-in, password reset,
   two-step, danger-zone (delete org), error + empty states.
   saa-* = shared · saaw-* = web · saam-* = mobile.
   ========================================================= */

/* ---- Workspace shell (web · two-pane settings) ---- */
.saaw {
  background: var(--wf-light-bg);
  color: var(--wf-light-fg);
  height: 100%;
  display: flex;
  flex-direction: column;
}
.saaw-body {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: 240px 1fr;
}
.saaw-rail {
  border-right: 1px solid var(--wf-light-hair);
  padding: 28px 18px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  background: var(--wf-light-panel);
}
.saaw-rail .org {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 6px 14px;
  border-bottom: 1px solid var(--wf-light-hair);
}
.saaw-rail .org .av {
  width: 28px; height: 28px;
  border-radius: var(--r-2);
  background: var(--placeholder);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--fg-soft);
}
.saaw-rail .org .meta { display: flex; flex-direction: column; }
.saaw-rail .org .n { font-size: 12px; font-weight: var(--w-ui); }
.saaw-rail .org .s { font-size: 10px; color: var(--fg-soft); }
.saaw-rail .group { display: flex; flex-direction: column; }
.saaw-rail .group .h {
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  padding: 0 6px 8px;
}
.saaw-rail a {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 8px;
  font-size: 12px;
  color: var(--wf-light-fg);
  border-radius: var(--r-1);
}
.saaw-rail a[aria-current="page"] {
  background: var(--hair);
  font-weight: var(--w-ui);
}
.saaw-rail a .c {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
}
.saaw-main {
  padding: 32px 36px;
  overflow: auto;
}

/* page header */
.saaw-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  border-bottom: 1px solid var(--wf-light-hair);
  padding-bottom: 18px; margin-bottom: 24px;
  gap: 24px;
}
.saaw-head h1 {
  font-size: 22px; font-weight: var(--w-ui);
  letter-spacing: -0.02em; line-height: 1.1;
  margin: 6px 0 0;
}
.saaw-head .k {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--fg-mute);
}
.saaw-head .acts { display: flex; gap: 8px; }

/* tabs under head */
.saaw-tabs {
  display: flex; gap: 22px;
  border-bottom: 1px solid var(--wf-light-hair);
  margin-bottom: 24px;
}
.saaw-tabs a {
  font-size: 12px;
  padding: 0 0 12px;
  color: var(--fg-soft);
  position: relative;
}
.saaw-tabs a[aria-current="page"] {
  color: var(--wf-light-fg);
  font-weight: var(--w-ui);
}
.saaw-tabs a[aria-current="page"]::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
  height: 1px; background: var(--wf-light-fg);
}

/* generic settings card */
.saaw-card {
  border: 1px solid var(--wf-light-hair);
  border-radius: var(--r-1);
  padding: 22px 24px;
  margin-bottom: 18px;
  background: var(--wf-light-bg);
}
.saaw-card .k {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 6px;
}
.saaw-card h3 {
  font-size: 15px; font-weight: var(--w-ui);
  margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.saaw-card p {
  font-size: 12px;
  line-height: 1.5;
  color: var(--fg-soft);
  margin: 0 0 14px;
  max-width: 64ch;
}
.saaw-card .row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
  border-top: 1px solid var(--wf-light-hair);
  font-size: 12px;
}
.saaw-card .row:first-of-type { border-top: 0; padding-top: 4px; }

/* danger card variant — same chrome, sharper rule */
.saaw-card[data-danger="true"] {
  border-color: var(--fg-mute);
}
.saaw-card[data-danger="true"] h3 { font-weight: var(--w-title); }

/* members table */
.saaw-table {
  border: 1px solid var(--wf-light-hair);
  border-radius: var(--r-1);
  overflow: hidden;
  font-size: 12px;
}
.saaw-table .head, .saaw-table .row {
  display: grid;
  grid-template-columns: 1fr 140px 130px 110px 80px;
  align-items: center;
  padding: 12px 16px;
  gap: 12px;
}
.saaw-table .head {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  border-bottom: 1px solid var(--wf-light-hair);
  background: var(--wf-light-panel);
}
.saaw-table .row {
  border-bottom: 1px solid var(--wf-light-hair);
}
.saaw-table .row:last-child { border-bottom: 0; }
.saaw-table .who {
  display: flex; align-items: center; gap: 12px; min-width: 0;
}
.saaw-table .av {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--placeholder);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--fg-mute);
  flex: 0 0 auto;
}
.saaw-table .who .n { font-weight: var(--w-ui); }
.saaw-table .who .e { color: var(--fg-soft); font-size: 11px; }
.saaw-table .role,
.saaw-table .seat,
.saaw-table .last {
  font-family: var(--font-mono);
  color: var(--fg-soft);
  font-size: 11px;
}
.saaw-table .more {
  text-align: right;
  font-size: 14px; color: var(--fg-mute);
}

/* invoices */
.saaw-invoices .row {
  display: grid;
  grid-template-columns: 110px 1fr 90px 110px 70px;
  align-items: center;
  padding: 12px 16px; gap: 14px;
  border-bottom: 1px solid var(--wf-light-hair);
  font-size: 12px;
}
.saaw-invoices .row:last-child { border-bottom: 0; }
.saaw-invoices .head {
  display: grid;
  grid-template-columns: 110px 1fr 90px 110px 70px;
  padding: 12px 16px; gap: 14px;
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  border-bottom: 1px solid var(--wf-light-hair);
  background: var(--wf-light-panel);
}
.saaw-invoices .num,
.saaw-invoices .amt,
.saaw-invoices .when {
  font-family: var(--font-mono);
  color: var(--fg-soft);
}
.saaw-invoices .status {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase;
}
.saaw-invoices .status[data-state="paid"]  { color: var(--fg-soft); }
.saaw-invoices .status[data-state="due"]   { color: var(--wf-light-fg); font-weight: var(--w-ui); }
.saaw-invoices .status[data-state="failed"]{
  color: var(--wf-light-fg); font-weight: var(--w-title);
  text-decoration: underline; text-underline-offset: 2px;
}

/* API keys */
.saaw-keys .row {
  display: grid;
  grid-template-columns: 1fr 220px 110px 110px 80px;
  align-items: center;
  padding: 14px 16px; gap: 14px;
  border-bottom: 1px solid var(--wf-light-hair);
  font-size: 12px;
}
.saaw-keys .row:last-child { border-bottom: 0; }
.saaw-keys .key { font-family: var(--font-mono); font-size: 11px; color: var(--fg-soft); }
.saaw-keys .scope {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.06em; color: var(--fg-soft);
}
.saaw-keys .when, .saaw-keys .last {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--fg-soft);
}
.saaw-keys .head {
  display: grid;
  grid-template-columns: 1fr 220px 110px 110px 80px;
  padding: 12px 16px; gap: 14px;
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  border-bottom: 1px solid var(--wf-light-hair);
  background: var(--wf-light-panel);
}

/* audit log entry */
.saaw-audit {
  display: flex; flex-direction: column;
  font-size: 12px;
}
.saaw-audit .ev {
  display: grid;
  grid-template-columns: 90px 28px 1fr 130px;
  gap: 12px; align-items: baseline;
  padding: 12px 0;
  border-bottom: 1px solid var(--wf-light-hair);
}
.saaw-audit .ev:last-child { border-bottom: 0; }
.saaw-audit .when {
  font-family: var(--font-mono); font-size: 10px; color: var(--fg-soft);
  letter-spacing: 0.04em;
}
.saaw-audit .av {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--placeholder);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 9px;
  color: var(--fg-soft);
}
.saaw-audit .what b { font-weight: var(--w-ui); }
.saaw-audit .what .obj {
  font-family: var(--font-mono); color: var(--fg-soft);
  background: var(--hair);
  padding: 1px 5px; border-radius: var(--r-1); font-size: 11px;
}
.saaw-audit .ip {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--fg-mute); text-align: right;
}

/* billing summary */
.saaw-billing-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-bottom: 18px;
}
.saaw-billing-grid .saaw-card { margin: 0; }
.saaw-meter {
  height: 8px; border-radius: var(--r-full);
  background: var(--hair);
  overflow: hidden;
  margin: 12px 0 8px;
}
.saaw-meter span { display: block; height: 100%; background: var(--wf-light-fg); }
.saaw-meter[data-state="warn"] span { background: var(--fg-soft); }
.saaw-meter-meta {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--fg-soft);
  letter-spacing: 0.04em;
}

/* invite modal · auth gate · banner — share this card style */
.saaw-modal-back {
  position: absolute; inset: 0;
  background: var(--bone-soft);
  display: grid; place-items: center;
}
.saaw-modal {
  width: 460px; padding: 28px 30px;
  background: var(--wf-light-bg);
  border: 1px solid var(--wf-light-hair-2);
  border-radius: var(--r-2);
  position: relative;
}
.saaw-modal .k {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--fg-mute);
  margin-bottom: 8px;
}
.saaw-modal h3 { font-size: 18px; font-weight: var(--w-ui); margin: 0 0 8px; letter-spacing: -0.02em; }
.saaw-modal p {
  font-size: 12px; color: var(--fg-soft);
  line-height: 1.5; margin: 0 0 16px; max-width: 50ch;
}
.saaw-modal .field { margin-bottom: 14px; }
.saaw-modal .acts { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.saaw-modal .x {
  position: absolute; top: 14px; right: 14px;
  width: 24px; height: 24px; display: grid; place-items: center;
  border: 0; background: transparent;
  font-size: 16px; color: var(--fg-soft);
}

/* banner — used for plan-limit, payment-failed, error, success */
.saaw-banner {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 14px; align-items: center;
  padding: 14px 18px;
  border: 1px solid var(--wf-light-hair-2);
  border-radius: var(--r-1);
  margin-bottom: 18px;
}
.saaw-banner .ic {
  width: 28px; height: 28px;
  border: 1px solid var(--wf-light-hair-2);
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 11px;
  font-weight: var(--w-ui);
}
.saaw-banner .t { font-size: 13px; font-weight: var(--w-ui); }
.saaw-banner .s { font-size: 11px; color: var(--fg-soft); margin-top: 2px; }
.saaw-banner[data-tone="alert"] {
  border-color: var(--fg-mute);
}
.saaw-banner[data-tone="alert"] .ic { font-weight: var(--w-title); }

/* sign-in screen */
.saaw-auth {
  background: var(--wf-light-bg);
  height: 100%;
  display: grid;
  grid-template-columns: 1fr 460px;
}
.saaw-auth .aside {
  background: var(--wf-light-panel);
  padding: 56px 64px;
  display: flex; flex-direction: column; justify-content: space-between;
  border-right: 1px solid var(--wf-light-hair);
}
.saaw-auth .aside .mark {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase;
}
.saaw-auth .aside h1 {
  font-size: 36px; font-weight: var(--w-ui);
  letter-spacing: -0.03em; line-height: 1.05;
  max-width: 14ch; margin: 0;
}
.saaw-auth .aside .pull {
  font-size: 12px; color: var(--fg-soft);
  max-width: 36ch; line-height: 1.5;
}
.saaw-auth .form {
  padding: 56px 56px;
  display: flex; flex-direction: column; justify-content: center; gap: 18px;
}
.saaw-auth .form .k {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--fg-mute);
}
.saaw-auth .form h2 {
  font-size: 24px; font-weight: var(--w-ui);
  letter-spacing: -0.02em; margin: 0;
}
.saaw-auth .form .sso { display: flex; flex-direction: column; gap: 8px; }
.saaw-auth .form .divider {
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  gap: 12px;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--fg-mute); letter-spacing: 0.06em;
  text-transform: uppercase;
  margin: 6px 0;
}
.saaw-auth .form .divider .l { height: 1px; background: var(--wf-light-hair); }
.saaw-auth .form .field { display: flex; flex-direction: column; gap: 6px; }
.saaw-auth .form .field .help {
  font-family: var(--font-mono); font-size: 10px; color: var(--fg-soft);
}
.saaw-auth .form .field .help[data-state="error"] {
  color: var(--wf-light-fg); font-weight: var(--w-ui);
}
.saaw-auth .form .foot {
  font-size: 11px; color: var(--fg-soft); line-height: 1.5;
}

/* OTP inputs */
.saaw-otp {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
}
.saaw-otp .cell {
  height: 52px;
  border: 1px solid var(--wf-light-hair-2);
  border-radius: var(--r-1);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 18px;
  letter-spacing: 0.04em;
}
.saaw-otp .cell[data-state="filled"] { color: var(--wf-light-fg); }
.saaw-otp .cell[data-state="focus"]  {
  outline: 1px solid var(--wf-light-fg);
  outline-offset: 0;
}
.saaw-otp .cell[data-state="error"]  {
  border-color: var(--wf-light-fg); border-width: 2px;
}

/* mobile shell */
.saam {
  background: var(--wf-light-bg);
  color: var(--wf-light-fg);
  height: 100%;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.saam-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--wf-light-hair);
}
.saam-head .org {
  display: flex; align-items: center; gap: 10px;
}
.saam-head .av {
  width: 28px; height: 28px; border-radius: var(--r-2);
  background: var(--placeholder);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--fg-soft);
}
.saam-head .n { font-size: 13px; font-weight: var(--w-ui); }
.saam-head .s { font-size: 10px; color: var(--fg-soft); }
.saam-head .acts button {
  width: 28px; height: 28px;
  border: 0; background: transparent;
  display: grid; place-items: center;
  color: var(--fg-soft);
}
.saam-body { flex: 1; overflow: auto; padding: 16px 18px; }
.saam-section {
  margin-bottom: 24px;
}
.saam-section h3 {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--fg-mute);
  margin: 0 0 8px;
}
.saam-card {
  border: 1px solid var(--wf-light-hair);
  border-radius: var(--r-2);
  background: var(--wf-light-bg);
  overflow: hidden;
}
.saam-card .row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; gap: 12px;
  border-bottom: 1px solid var(--wf-light-hair);
}
.saam-card .row:last-child { border-bottom: 0; }
.saam-card .row .l {
  display: flex; flex-direction: column; min-width: 0;
}
.saam-card .row .l .t { font-size: 13px; font-weight: var(--w-ui); }
.saam-card .row .l .s { font-size: 11px; color: var(--fg-soft); margin-top: 2px; }
.saam-card .row .r {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--fg-soft);
  display: flex; align-items: center; gap: 6px;
}
.saam-card .row .r .chev { color: var(--fg-mute); }

/* mobile members chip rail */
.saam-members {
  display: flex; flex-direction: column;
  gap: 0;
}
.saam-members .m {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 12px; align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--wf-light-hair);
}
.saam-members .m:last-child { border-bottom: 0; }
.saam-members .av {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--placeholder);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--fg-mute);
}
.saam-members .n { font-size: 13px; font-weight: var(--w-ui); }
.saam-members .e { font-size: 11px; color: var(--fg-soft); }
.saam-members .role {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--fg-soft);
}

/* mobile billing meter */
.saam-meter {
  height: 8px; border-radius: var(--r-full);
  background: var(--hair);
  margin: 10px 0 6px;
  overflow: hidden;
}
.saam-meter span { display: block; height: 100%; background: var(--wf-light-fg); }
.saam-meter-meta {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--fg-soft);
}

/* mobile auth */
.saam-auth {
  background: var(--wf-light-bg);
  height: 100%;
  padding: 56px 24px 24px;
  display: flex; flex-direction: column; gap: 18px;
}
.saam-auth .mark {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase;
}
.saam-auth h1 {
  font-size: 28px; font-weight: var(--w-ui);
  letter-spacing: -0.02em; line-height: 1.1;
  margin: 8px 0 0; max-width: 14ch;
}
.saam-auth .sub { font-size: 12px; color: var(--fg-soft); line-height: 1.5; max-width: 30ch; }
.saam-auth .field { display: flex; flex-direction: column; gap: 6px; }
.saam-auth .field .help {
  font-family: var(--font-mono); font-size: 10px; color: var(--fg-soft);
}
.saam-auth .field .help[data-state="error"] {
  color: var(--wf-light-fg); font-weight: var(--w-ui);
}
.saam-auth .otp {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
}
.saam-auth .otp .cell {
  height: 48px; border: 1px solid var(--wf-light-hair-2);
  border-radius: var(--r-1);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 18px;
}
.saam-auth .otp .cell[data-state="filled"] { color: var(--wf-light-fg); }
.saam-auth .otp .cell[data-state="error"]  {
  border-color: var(--wf-light-fg); border-width: 2px;
}
.saam-auth .foot {
  font-size: 11px; color: var(--fg-soft); line-height: 1.5;
  margin-top: auto;
}

/* states specimen layout */
.saas {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 24px;
  padding: 32px 36px;
  height: 100%;
  background: var(--canvas-panel);
  color: var(--canvas-fg);
  overflow: hidden;
}
.saas .col { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
.saas h3 {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--canvas-label);
  margin: 0 0 4px;
}
.saas .demo {
  background: var(--wf-light-bg);
  border-radius: var(--r-1);
  padding: 14px 16px;
  border: 1px solid var(--canvas-hair);
}
.saas .meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--canvas-label);
}

</style>

function HorizontalNav({ current = "Events", search = "Search events, hosts, venues" }) {

function StatusBar({ time = "9:41" }) {

}

function MobileHeader({ title, action = "info" }) {

  return (

      <div className="title">{title}</div>
      <button className="action" aria-label="More"><Action size={20} /></button>

function BottomNav({ current = "Home" }) {

}

function HomeBar() { return <div className="ki-homebar" />; }

/* ============ DESKTOP · nav alternatives ============ */

// MinimalNav — logo · tabs · avatar. Authenticated in-app shell; no global search.
function MinimalNav({ current = "Events", initials = "SY", tabs = ["Home", "Events", "Hosts"] }) {
  return (
    <div className="ki-hnav-min">
      <div className="brand">Logo</div>
      <nav className="tabs">
        {tabs.map(t => <a key={t} aria-current={t === current ? "page" : undefined}>{t}</a>)}

      <div className="spacer" />
      <div className="avatar">{initials}</div>
    </div>
  );
}

// MarketingNav — logo · tabs · sign in · primary CTA. Pre-auth / public surfaces.
function MarketingNav({ current, cta = "Get access", tabs = ["Events", "Hosts", "About"] }) {
  return (
    <div className="ki-hnav-mkt">
      <div className="brand">Logo</div>
      <nav className="tabs">
        {tabs.map(t => <a key={t} aria-current={t === current ? "page" : undefined}>{t}</a>)}
      </nav>
      <div className="spacer" />
      <span className="signin">Sign in</span>
      <button className="wf-btn" data-primary="true">{cta}</button>
    </div>
  );
}

// WorkspaceNav — brand · breadcrumbs · status + action cluster + avatar.
// Deep editing context (the thing you see while building an event, draft, page).
function WorkspaceNav({
  crumbs = ["Sentropy Radio", "Events", "North Star Listening"],
  status = "Draft",
  initials = "SY",
}) {
  return (
    <div className="ki-hnav-ws">
      <div className="brand">Logo</div>
      <nav className="crumbs">
        {crumbs.map((c, i) => (
          <React.Fragment key={c + i}>
            {i > 0 && <span className="sep">/</span>}
            <span className={i === crumbs.length - 1 ? "current" : undefined}>{c}</span>
          </React.Fragment>
        ))}
      </nav>
      <div className="actions">
        <span className="status">{status}</span>
        <button className="wf-btn">Preview</button>

        <div className="avatar">{initials}</div>
      </div>
    </div>
  );
}

// StepperNav — logo · numbered steps · save & exit. Multi-step / onboarding shell.
function StepperNav({
  steps = ["Details", "Co-hosts", "Tickets", "Review"],
  current = 1,
  exit = "Save & exit",
}) {
  return (
    <div className="ki-hnav-step">
      <div className="brand">Logo</div>
      <nav className="steps">
        {steps.map((s, i) => {
          const state = i < current ? "done" : i === current ? "current" : "todo";
          return (
            <React.Fragment key={s}>
              {i > 0 && <span className="step-sep" />}
              <span className="step" data-state={state}>
                <span className="num">{i < current ? "✓" : i + 1}</span>
                {s}
              </span>
            </React.Fragment>
          );
        })}
      </nav>
      <span className="exit">{exit}</span>
    </div>
  );
}

// SideNav — 240-wide vertical rail pinned left.

// wayfinding (hosts panel, admin, anything with a workspace sidebar).
function SideNav({
  current = "Events",
  initials = "SY",
  name = "Sasha Yanai",
  role = "Host · Sentropy",
}) {
  const items = [
    { name: "Home",     icon: Icons.Pin },
    { name: "Events",   icon: Icons.Calendar },
    { name: "Hosts",    icon: Icons.User },
    { name: "Messages", icon: Icons.MoreH },
    { name: "Saved",    icon: Icons.Bookmark },

  return (
    <div className="ki-snav">
      <div className="brand">Logo</div>
      {items.map(({ name: n, icon: I }) => (

function BottomNavFab({ current = "Home" }) {

function Field({ label, value, placeholder, trailing, multiline }) {
  return (
    <label className="mfw-field">
      <span className="wf-label">{label}</span>
      <div className="wf-input">
        {multiline
          ? <textarea rows={3} defaultValue={value} placeholder={placeholder} />
          : <input type="text" defaultValue={value} placeholder={placeholder} />}
        {trailing && <span className="trail">{trailing}</span>}
      </div>
    </label>
  );
}

function RadioRow({ options, active }) {
  return (
    <div className="mfw-radiorow">
      {options.map(o => (
        <label className="mfw-radio" data-active={o.k === active || undefined} key={o.k}>
          <span className="ring">{o.k === active && <span className="dot" />}</span>
          <span className="t">
            <span className="t1">{o.t}</span>
            <span className="t2">{o.s}</span>
          </span>
        </label>
      ))}
    </div>
  );
}

function Checkbox({ checked }) {
  return (
    <span className="mfw-check" data-checked={checked || undefined}>
      {checked && <Icons.Check size={11} stroke={2} />}
    </span>
  );
}

      <div className="wf-input">
        <input type="text" defaultValue={value} placeholder={placeholder} />
        {T && <T size={14} />}

    </label>
  );
}

function CalendarWeb() {
  // Feb 2026 — Feb 1 is a Sunday.
  const days = [];
  for (let i = 0; i < 28; i++) days.push({ n: i + 1, muted: false });
  // pad leading (Jan) + trailing (Mar) to fill 5 weeks = 35 cells
  const leading = [];
  const trailing = [];
  for (let i = 29; i <= 31; i++) leading.push({ n: i, muted: true }); // Jan 29-31 before Feb 1 — but Feb 1 is Sunday so no leading needed
  // Feb 2026: Feb 1 = Sunday, Feb 28 = Saturday → exactly 4 weeks
  // We'll do a 5-week grid: add Mar 1-7 as trailing
  const cells = [...days];
  for (let i = 1; i <= 7; i++) cells.push({ n: i, muted: true });

  const events = {
    8:  [{ tm: "8p", t: "Midnight at Mercury", dim: true }],

  const today = 15;

  return (

          <div className="cal-head-left">
            <h1>February 2026</h1>

        <div className="cal-grid">
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => (
            <div key={d} className="cal-dayname">{d}</div>
          ))}
          {cells.map((c, i) => {
            const isToday = !c.muted && c.n === today;
            const evts = !c.muted ? (events[c.n] || []) : [];
            return (
              <div key={i} className={"cal-cell" + (c.muted ? " muted" : "") + (isToday ? " today" : "")}>

      <p className="body">
        Every primitive the templates and flows lean on, sorted by the
        atomic layer it belongs to. Search, Chatbot, Filter, Onboarding,

        the inventory, the names, and the rules for adding more.
      </p>
      <dl className="rules">
        <dt>Order</dt><dd>Foundations → Atoms → Molecules → Organisms → Patterns · top to bottom</dd>
        <dt>Grows</dt><dd>Down for more items within a layer. Right is reserved for Templates · Flows.</dd>

function DsGroup({ title, tag, children }) {

function DsTile({ title, tag, foot, stack, center, children }) {
  const bodyCls = "ds-tile-body" + (stack ? " stack" : "") + (center ? " center" : "");
  // Each tile is its own .wf light scope so .wf-* primitives inside render
  // in light mode against the bone tile, while the dark .ds-frame canvas
  // shows between tiles and groups.
  return (
    <div className="wf ds-tile" data-mode="light">
      {(title || tag) && (
        <div className="ds-tile-head">
          {title && <span className="t">{title}</span>}
          {tag && <span className="tag">{tag}</span>}
        </div>
      )}
      <div className={bodyCls}>{children}</div>
      {foot && <div className="ds-tile-foot">{foot}</div>}
    </div>
  );
}

// Stacks subsections top-to-bottom at x = DS_ZONE_X.
// Each subsection is a <Section> with a letter-coded label that reuses the
// existing .wf-section-header pattern, so the taxonomy reads cleanly at any zoom.
function DsZone() {
  const x = DS_ZONE_X;
  return (
    <>
      <DsIntro x={x} y={-1400} />

      {/* Row 1 — substrate → composed (F · A · M) */}
      <Section x={x}                                     y={0}           w={DS_FRAME_W}      h={2120}  num="F" name="Foundations" tag="Tokens · invisible substrate">
        <DsFoundations/>
      </Section>

      <Section x={x + DS_FRAME_W + DS_COL_GAP}           y={0}           w={DS_FRAME_W}      h={4400}  num="A" name="Atoms"       tag="Irreducible units">
        <DsAtoms/>
      </Section>

      <Section x={x + (DS_FRAME_W + DS_COL_GAP) * 2}     y={0}           w={DS_FRAME_W}      h={6300}  num="M" name="Molecules"   tag="Atoms composed · one job">
        <DsMolecules/>
      </Section>

      {/* Row 2 — whole things & their arrangements (O · P) */}
      <Section x={x}                                     y={DS_ROW_2_Y}  w={DS_FRAME_W_WIDE} h={15600} num="O" name="Organisms"   tag="Chrome · self-contained things">
        <DsOrganisms/>
      </Section>

      <Section x={x + DS_FRAME_W_WIDE + DS_COL_GAP}      y={DS_ROW_2_Y}  w={DS_FRAME_W}      h={6800}  num="P" name="Patterns"    tag="Recurring arrangements">

      </Section>
    </>
  );
}

// Main app — infinite pan/zoom canvas with all frames.

const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ========== Canvas component (pan/zoom) ========== */
function Canvas({ children, scaleState, panState }) {
  const viewportRef = useRef(null);
  const surfaceRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef(null);
  const [scale, setScale] = scaleState;
  const [pan, setPan] = panState;

  const onMouseDown = (e) => {
    if (e.button !== 0) return;
    // don't start pan if clicking inside an interactive control in the topbar
    const t = e.target;
    if (t.closest && t.closest('.topbar')) return;
    if (t.closest && t.closest('.cm-toolbar, .cm-pin, .cm-thread')) return;
    e.preventDefault(); // stop text-selection drag over slides/frames
    dragStart.current = { x: e.clientX - pan.x, y: e.clientY - pan.y };
    setDragging(true);
  };
  const onMouseMove = (e) => {
    if (!dragging || !dragStart.current) return;
    setPan({ x: e.clientX - dragStart.current.x, y: e.clientY - dragStart.current.y });
  };
  const onMouseUp = () => { setDragging(false); dragStart.current = null; };

  const onWheel = useCallback((e) => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      // Zoom around cursor — continuous, keyed to wheel/pinch intensity.
      const rect = viewportRef.current.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const dy = e.deltaMode === 1 ? e.deltaY * 16 : e.deltaY;
      // Wider clamp (~35%/event max) and higher sensitivity so mouse wheel
      // feels snappy while trackpad pinch remains smooth.
      const exp = Math.max(-0.30, Math.min(0.30, -dy * 0.025));
      const factor = Math.exp(exp);
      setScale(prev => {
        const next = Math.max(0.02, Math.min(4, prev * factor));
        setPan(p => ({
          x: cx - ((cx - p.x) * next / prev),
          y: cy - ((cy - p.y) * next / prev),
        }));
        return next;
      });
    } else {
      // Pan — slight multiplier so mouse-wheel and trackpad feel quick
      // without making pan feel runaway.
      setPan(p => ({ x: p.x - e.deltaX * 1.4, y: p.y - e.deltaY * 1.4 }));
    }
  }, [setScale, setPan]);

  useEffect(() => {
    const el = viewportRef.current;
    if (!el) return;
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, [onWheel]);

  useEffect(() => {
    if (!dragging) return;
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
  }, [dragging]);

  return (
    <div
      ref={viewportRef}
      className={"canvas-viewport" + (dragging ? " dragging" : "")}
      onMouseDown={onMouseDown}
    >
      <div
        ref={surfaceRef}
        className="canvas-surface"
        style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})` }}
      >
        {children}
      </div>
    </div>
  );
}

/* ========== Canvas Index · jump-to-section overlay ========== */
function CanvasIndex({ open, onClose, onJump, entries }) {
  const [q, setQ] = useState("");
  const [activeCat, setActiveCat] = useState("All");
  const [focused, setFocused] = useState(0);
  const inputRef = useRef(null);
  const listRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    setQ("");
    setActiveCat("All");
    setFocused(0);
    const t = setTimeout(() => inputRef.current && inputRef.current.focus(), 20);
    return () => clearTimeout(t);
  }, [open]);

  const norm = s => (s || "").toString().toLowerCase();

  // Derive filter pills from entry categories (first-appearance order).
  const categories = useMemo(() => {
    const order = [];
    const counts = {};
    entries.forEach(e => {
      if (counts[e.cat] === undefined) { counts[e.cat] = 0; order.push(e.cat); }
      counts[e.cat] += 1;
    });
    return [{ name: "All", count: entries.length }, ...order.map(c => ({ name: c, count: counts[c] }))];
  }, [entries]);

  const filtered = entries.filter(e => {
    if (activeCat !== "All" && e.cat !== activeCat) return false;
    if (!q.trim()) return true;
    const hay = norm(e.name) + " " + norm(e.tag) + " " + norm(e.cat);
    return hay.includes(norm(q));
  });

  useEffect(() => {
    setFocused(0);
    if (listRef.current) listRef.current.scrollTop = 0;
  }, [q, activeCat]);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === "Escape") { e.preventDefault(); onClose(); }
      else if (e.key === "ArrowDown") { e.preventDefault(); setFocused(i => Math.min(filtered.length - 1, i + 1)); }
      else if (e.key === "ArrowUp")   { e.preventDefault(); setFocused(i => Math.max(0, i - 1)); }
      else if (e.key === "Enter" && filtered[focused]) {
        e.preventDefault();
        onJump(filtered[focused]);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, filtered, focused, onClose, onJump]);

  if (!open) return null;

  // Group by category preserving entry order.
  const byCat = [];
  filtered.forEach(e => {
    let g = byCat.find(b => b.cat === e.cat);
    if (!g) { g = { cat: e.cat, items: [] }; byCat.push(g); }
    g.items.push(e);
  });
  // When a single filter is active, the active pill already labels the list.
  const showGroupHeaders = activeCat === "All";

  let globalIdx = -1;
  return (
    <div className="canvas-index-scrim" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="canvas-index-panel" role="dialog" aria-label="Jump to section">
        <div className="canvas-index-head">
          <Icons.Search size={14} />
          <input
            ref={inputRef}
            value={q}
            onChange={(e) => setQ(e.target.value)}
            placeholder="Search sections — templates, flows, design-system layers…"
          />
          <span className="esc">esc</span>
        </div>
        <div className="canvas-index-filters" role="tablist" aria-label="Filter by category">
          {categories.map(c => (
            <button
              key={c.name}
              className="canvas-index-filter"
              role="tab"
              aria-pressed={activeCat === c.name}
              onClick={() => setActiveCat(c.name)}
            >
              {c.name}
              <span className="c">{c.count}</span>
            </button>
          ))}
        </div>
        <div className="canvas-index-list" ref={listRef}>
          {filtered.length === 0 ? (
            <div className="canvas-index-empty">Nothing matches "{q}".</div>
          ) : (
            byCat.map(g => (
              <React.Fragment key={g.cat}>
                {showGroupHeaders && (
                  <div className="canvas-index-group">
                    <span>{g.cat}</span>
                    <span>{g.items.length}</span>
                  </div>
                )}
                {g.items.map((e) => {
                  globalIdx += 1;
                  const idx = globalIdx;
                  return (
                    <div
                      key={e.cat + "-" + e.name}
                      className="canvas-index-item"
                      data-focus={idx === focused ? "true" : undefined}
                      onMouseEnter={() => setFocused(idx)}
                      onClick={() => onJump(e)}
                    >
                      <div>
                        <div className="n">{e.name}</div>
                        <div className="t">{e.tag}</div>
                      </div>
                      <div className="coords">{e.x}, {e.y}</div>
                    </div>
                  );
                })}
              </React.Fragment>
            ))
          )}
        </div>
        <div className="canvas-index-foot">
          <span><span className="kbd">↑↓</span> navigate</span>
          <span><span className="kbd">↵</span> jump</span>
          <span><span className="kbd">esc</span> close</span>
        </div>
      </div>
    </div>
  );
}

function SfField({ state = "resting", value, placeholder = "Search events, hosts, venues…", trail = "kbd" }) {
  const isPlaceholder = !value;
  return (
    <div className="sf-field" data-state={state}>
      <span className="glyph"><Icons.Search size={14} /></span>
      <span className={"q " + (isPlaceholder ? "placeholder" : "")}>

  );
}

// ---------- Flow Section · registers every frame in the band ----------
function SearchFlowSection() {
  const MOBILE_W = 390, MOBILE_H = 844;
  const WEB_W = 1440;
  const INTRO_W = 560, GUTTER = 80;

  // Two long horizontal rows: mobile on top, desktop below. No per-column
  // pairing — each row lists its own frames at its own natural stride.
  const MOBILE_STRIDE = 480;                             // 390 + 90 gutter
  const DESKTOP_STRIDE = 1600;                           // 1440 + 160 gutter
  const MOBILE_Y = 0;
  const DESKTOP_Y = 1000;                                // mobile bottom + label + breathing

  const mobiles = [
    { C: SfmResting, t: "Mobile · Search · resting",   s: "pre-query · trending · recent · categories" },
    { C: SfmActive,  t: "Mobile · Search · active",    s: "focused · typed · autocomplete + suggestions" },
    { C: SfmResults, t: "Mobile · Results",            s: "grouped · 9 matches · scope chips" },
    { C: SfmSheet,   t: "Mobile · Filter sheet",       s: "scrim + bottom sheet · 4 groups · apply" },
    { C: SfmEmpty,   t: "Mobile · No results · error", s: "typo · did-you-mean · offline recovery" },
    { C: SfmGate,    t: "Mobile · Auth gate",          s: "save blocked · inline socials + email" },
  ];
  const desktops = [
    { C: SfwLanding, h: 1600, t: "Web · Search · landing",    s: "resting · trending + recent + categories" },
    { C: SfwOverlay, h: 900,  t: "Web · ⌘K overlay",          s: "dimmed page · 720-wide command menu · kbd legend" },
    { C: SfwResults, h: 1400, t: "Web · Results",             s: "subnav + filter bar · grouped · pagination meta" },
    { C: SfwEmpty,   h: 1000, t: "Web · No results · error",  s: "centered recovery · did-you-mean · rate-limited" },
    { C: SfwGate,    h: 1000, t: "Web · Auth gate",           s: "save blocked · socials + magic-link email" },
  ];

  const mobileRowRight  = mobiles.length * MOBILE_STRIDE;
  const desktopRowRight = desktops.length * DESKTOP_STRIDE;
  const maxDesktopH     = Math.max(...desktops.map(d => d.h));

  // States specimen sits at the end of the desktop row (desktop-sized).
  const STATES_W = 1800, STATES_H = 900;
  const STATES_X = desktopRowRight;
  const STATES_Y = DESKTOP_Y;

  const SECTION_W = Math.max(mobileRowRight, STATES_X + STATES_W) + 120;
  const SECTION_H = DESKTOP_Y + maxDesktopH + 120;

  return (
    <Section
      x={0} y={0} w={SECTION_W} h={SECTION_H}
      num="F·1" name="Search"
      tag={`${mobiles.length} mobile · ${desktops.length} desktop`}
    >
      <SfFlowIntro x={-(INTRO_W + GUTTER)} y={0} />

      {mobiles.map((f, i) => {
        const C = f.C;
        return (
          <Frame key={`m${i}`}
            x={i * MOBILE_STRIDE} y={MOBILE_Y}
            w={MOBILE_W} h={MOBILE_H}
            title={f.t} subtitle={f.s}>
            <C />
          </Frame>
        );
      })}

      {desktops.map((f, i) => {
        const C = f.C;
        return (
          <Frame key={`d${i}`}
            x={i * DESKTOP_STRIDE} y={DESKTOP_Y}
            w={WEB_W} h={f.h}
            title={f.t} subtitle={f.s}>
            <C />
          </Frame>
        );
      })}

      <Frame
        x={STATES_X} y={STATES_Y}
        w={STATES_W} h={STATES_H}
        title="States · specimen"
        subtitle="field · row · suggest · pill · page — every state the flow uses">
        <SfsSpecimen />
      </Frame>
    </Section>
  );
}

/* ============ ONBOARDING FLOW (F · Onb) ============
   Column-0 placement: x = 0, y = 18000 — directly below
   Filter (x=0, y=14000, h≈2020). Matches the column-0 flush
   convention established by Search / Chatbot / Filter.
   Mobile journey (12) · mobile auth states (6) · mobile error states (7)
   · web journey (6) · web auth/errors (5) · interaction-states specimen.
   Uses onb-* namespace + shared .flow-intro, .wf-*, .ki-*, chrome, tokens.
   ================================================= */

function OnbDots({ step, total = 8 }) {
  return (
    <div className="onb-dots">
      {Array.from({ length: total }).map((_, i) => (
        <span key={i} className="onb-dot"
          data-state={i < step ? "done" : i === step ? "current" : undefined} />
      ))}
    </div>
  );
}
function OnbHead({ step, total = 8, skip = "Skip" }) {
  const hasStep = typeof step === 'number';
  return (
    <div className="onb-head">
      <button className="onb-back" aria-label="Back"><Icons.Back size={16}/></button>
      {hasStep ? <OnbDots step={step} total={total}/> : <span style={{flex:1}}/>}
      {skip ? <button className="onb-skip">{skip}</button> : <span className="onb-head-sp"/>}
    </div>
  );
}

   tst-* shared anatomy · tstw- web · tstm- mobile.

/* ---- Flow intro card ---- */
function TstFlowIntro({ x = 0, y = 0 }) {
  return (
    <div className="flow-intro" style={{ left: x, top: y }}>
      <div className="num">F·5 · Toasts · end-to-end</div>
      <h1>Confirmations<br/>that don't interrupt.</h1>
      <p className="body">
        Ephemeral feedback that appears, dwells, and dismisses without
        blocking the page. Bottom-right on web, bottom-center above the
        nav on mobile. Variants differ by glyph and label, never by colour.
        Stacks queue to a max (3 web · 2 mobile) with a +N indicator;
        action toasts hold longer and offer Undo; loading toasts show
        determinate progress; errors include a retry; and any toast
        whose action requires auth opens the sign-in sheet inline.
      </p>
      <dl className="rules">
        <dt>Variants</dt><dd>Info · success · warning · error · loading · promo · action</dd>
        <dt>Position</dt><dd>Web ↘ bottom-right · mobile ↓ bottom-center, above nav</dd>
        <dt>Dwell</dt><dd>4s default · 8s with action · sticky on hover · sticky for error/loading</dd>
        <dt>Auth</dt><dd>"Sign in to save" gate toast → opens auth sheet</dd>
        <dt>Errors</dt><dd>Offline · rate-limited · upload failed · all carry Retry</dd>
        <dt>Scope</dt><dd>9 mobile · 7 web · 1 states specimen</dd>
      </dl>
    </div>
  );
}

/* ---- The single reusable Toast component ---- */
function TstToast({
  variant = "info",
  glyph,
  shape = "row",
  title,
  sub,
  action,
  actions,
  close = true,
  progress,
  buffer = false,
  stackPos,
  swipe = false,
  initials,
  state = {},
}) {
  return (
    <div
      className="tst-toast"
      data-variant={variant}
      data-shape={shape}
      data-glyph={glyph}
      data-stack-pos={stackPos}
      data-swipe={swipe ? "true" : undefined}
    >
      <div className="ic">{glyph === "avatar" ? initials : null}</div>
      <div className="tx">
        <div className="t">{title}</div>
        {sub && <div className="s">{sub}</div>}
      </div>
      {shape === "block" ? (
        <>
          {close && <button className="x" data-state={state.x} aria-label="Dismiss">×</button>}
          <div className="acts">
            {(actions || []).map((a, i) => (
              <button key={i} className="act" data-primary={a.primary || undefined} data-state={a.state}>
                {a.label}
              </button>
            ))}
          </div>
        </>
      ) : (
        <>
          {action && (
            <button className="act" data-primary={action.primary || undefined} data-state={action.state || state.act}>
              {action.label}
            </button>
          )}
          {close && <button className="x" data-state={state.x} aria-label="Dismiss">×</button>}
        </>
      )}
      {typeof progress === "number" && (
        <div className="progress" data-buffer={buffer ? "true" : undefined} style={{ width: `${progress}%` }} />
      )}
    </div>
  );
}

  const MOBILE_STRIDE = 480;
  const DESKTOP_STRIDE = 1600;
  const MOBILE_Y = 0;
  const DESKTOP_Y = 1000;

  const mobiles = [
    { C: SaamHome,          t: "Mobile · Account home",     s: "section list · workspace · billing · security" },
    { C: SaamMembers,       t: "Mobile · Members",          s: "6 active · 1 pending · invite CTA" },

    { C: SaamOtp,           t: "Mobile · OTP · invalid",    s: "two-step · 3 attempts left · recovery" },
    { C: SaamPlanLimit,     t: "Mobile · Seat limit",       s: "25/25 · upgrade · add seats · remove inactive" },
    { C: SaamDanger,        t: "Mobile · Danger zone",      s: "delete workspace · type-to-confirm" },
  ];
  const desktops = [
    { C: SaawMembers,  t: "Web · Members · active",    s: "two-pane · table · 4 tabs · invite CTA" },
    { C: SaawInvite,   t: "Web · Invite modal",        s: "domain rule · default role · seat math" },
    { C: SaawRoles,    t: "Web · Roles & permissions", s: "matrix · 9 perms × 4 roles · custom CTA" },
    { C: SaawBilling,  t: "Web · Billing · plan",      s: "4 quota cards · payment method · annual nudge" },
    { C: SaawInvoices, t: "Web · Invoices · failed",   s: "alert banner · 7 invoices · status states" },
    { C: SaawApiKeys,  t: "Web · API keys",            s: "3 live · masked · rotate · scope hint" },
    { C: SaawAudit,    t: "Web · Audit log",           s: "8 events · who · what · IP · 30d export" },
    { C: SaawSignIn,   t: "Web · Sign-in",             s: "SSO + SAML + email/password + magic link" },
    { C: SaawTwoStep,  t: "Web · Two-step · invalid",  s: "OTP error state · recovery fallback" },
    { C: SaawDanger,   t: "Web · Danger zone",         s: "transfer · export · soft-delete confirm" },
  ];

  const mobileRowRight  = mobiles.length * MOBILE_STRIDE;
  const desktopRowRight = desktops.length * DESKTOP_STRIDE;

  const STATES_W = 2200, STATES_H = 1400;
  const STATES_X = desktopRowRight;
  const STATES_Y = DESKTOP_Y;

  const SECTION_W = Math.max(mobileRowRight, STATES_X + STATES_W) + 120;
  const SECTION_H = DESKTOP_Y + Math.max(WEB_H, STATES_H) + 120;

  return (
    <Section
      x={0} y={20000} w={SECTION_W} h={SECTION_H}
      num="F·6" name="SaaS Account"
      tag={`${mobiles.length} mobile · ${desktops.length} desktop`}
    >
      <SaaFlowIntro x={-(INTRO_W + GUTTER)} y={0} />

      {mobiles.map((f, i) => {
        const C = f.C;
        return (
          <Frame key={`m${i}`}
            x={i * MOBILE_STRIDE} y={MOBILE_Y}
            w={MOBILE_W} h={MOBILE_H}
            title={f.t} subtitle={f.s}>
            <C />
          </Frame>
        );
      })}

      {desktops.map((f, i) => {
        const C = f.C;
        return (

function NfRow({ row, state, swipe, selected, compact, dotInk = true }) {

    <div className="nf-row" data-read={row.read ? "true" : undefined} data-state={dataState} data-swipe={swipe ? "true" : undefined}>

  const MOBILE_Y = 0;

    { C: CamBye,         t: "Mobile · Goodbye",       s: "soft-delete · 14d restore · email toast" },

  const desktops = [

    { C: CawAuCreate,      t: "Web · Create",            s: "email taken error · handle ok · pwd hint" },

    { C: CawProfileEmpty,  t: "Web · Profile · empty",   s: "no events · centered card · 2 CTAs" },

    { C: CawBye,           t: "Web · Goodbye",           s: "signed-out · 14d restore · email toast" },
  ];

  const mobileRowRight  = mobiles.length * MOBILE_STRIDE;
  const desktopRowRight = desktops.length * DESKTOP_STRIDE;

  const STATES_W = 1840, STATES_H = 1400;
  const STATES_X = desktopRowRight;
  const STATES_Y = DESKTOP_Y;

  const SECTION_W = Math.max(mobileRowRight, STATES_X + STATES_W) + 120;
  const SECTION_H = DESKTOP_Y + Math.max(WEB_H, STATES_H) + 120;

  return (
    <Section
      x={0} y={28000} w={SECTION_W} h={SECTION_H}
      num="F·8" name="Consumer Account"
      tag={`${mobiles.length} mobile · ${desktops.length} desktop`}
    >
      <CaFlowIntro x={-(INTRO_W + GUTTER)} y={0} />

      {mobiles.map((f, i) => {
        const C = f.C;
        return (
          <Frame key={`m${i}`}
            x={i * MOBILE_STRIDE} y={MOBILE_Y}
            w={MOBILE_W} h={MOBILE_H}
            title={f.t} subtitle={f.s}>

          <Frame key={`d${i}`}
            x={i * DESKTOP_STRIDE} y={DESKTOP_Y}

            title={f.t} subtitle={f.s}>

          </Frame>

        w={STATES_W} h={STATES_H}
        title="States · palette"
        subtitle="inputs · buttons · ticket cards · payment cards · skeleton · toast · interaction states">

// Stop the browser from native-zooming on Ctrl+wheel / pinch anywhere on
// the page — canvas has its own zoom logic on the viewport element, but if
// the pointer is momentarily over a child that doesn't hit the viewport
// listener (e.g. during layout), the native browser zoom would kick in.
window.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) e.preventDefault();
}, { passive: false, capture: true });
