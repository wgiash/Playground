  Covers the core library loop from Jazz's §5.7 / §5.8:
    · browse masonry · tag nav · source filter · search · include-personal toggle
    · click a save → source detail right panel · edit tags inline · write a note
  Single file; React via CDN; tokens.css for palette. No external state.
-->
<html lang="en">

<title>Aither · Sunpull prototype</title>

<link rel="stylesheet" href="../system/tokens.css">

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--wf-light-bg);
    color: var(--wf-light-fg);
    font-family: var(--font-ui);
    font-weight: 300;
    letter-spacing: -0.01em;
    min-height: 100vh;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; letter-spacing: -0.005em; }

  /* ---------- Shell: rail + main column ---------- */

    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }

  /* ---------- Rail ---------- */
  .rail {
    background: var(--wf-light-panel);
    border-right: 1px solid rgba(18,13,11,0.12);

    gap: 22px;

    top: 0;
    height: 100vh;
    overflow-y: auto;

    left: 12px;

    align-items: center;

    padding: 6px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(234,228,226,0.75);

    border: 1px solid rgba(234,228,226,0.18);

    font-weight: 600;

  }
  .rail h4 {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(18,13,11,0.48);
    margin: 0 0 6px 8px;

  .rail .group { display: flex; flex-direction: column; gap: 2px; }

    font-size: 9px;
    color: rgba(18,13,11,0.4);
    letter-spacing: 0;

    border-radius: 999px;

    font-weight: 500;

    letter-spacing: -0.005em;

  .pill-btn:hover { border-color: rgba(18,13,11,0.28); color: var(--wf-light-fg); }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;

    border: 1px solid rgba(18,13,11,0.14);

    font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;

  /* Archetype banner that shows briefly at top of main */
  .archetype {
    padding: 14px 32px;

    gap: 16px;
    align-items: flex-start;
    background: var(--wf-light-panel);
    border-bottom: 1px solid rgba(18,13,11,0.08);
    font-size: 13px;
    line-height: 1.5;
    color: rgba(18,13,11,0.78);
    letter-spacing: -0.005em;

    font-family: var(--font-mono);
    font-size: 10px;

    letter-spacing: -0.02em;

    font-size: 10px;

    letter-spacing: 0;

  .grid {
    padding: 20px 32px 80px;
    column-count: 4;
    column-gap: 16px;
  }
  @media (max-width: 1400px) { .grid { column-count: 3; } }
  @media (max-width: 1000px) { .grid { column-count: 2; } }

  .card {
    break-inside: avoid;
    margin-bottom: 16px;
    background: var(--wf-light-bg);
    border: 1px solid rgba(18,13,11,0.1);
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    border-color: rgba(18,13,11,0.26);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(18,13,11,0.06);

  .card.selected {
    border-color: var(--wf-light-fg);
    box-shadow: 0 0 0 1px var(--wf-light-fg);

  .card .thumb {
    background: rgba(18,13,11,0.08);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(18,13,11,0.32);
    display: grid; place-items: center;
  }

  .card[data-src="instagram"] .thumb { background: rgba(18,13,11,0.13); }
  .card[data-src="web"]       .thumb { background: rgba(18,13,11,0.06); }
  .card[data-src="text"]      .thumb { background: rgba(18,13,11,0.04); }
  .card .body {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .card .src {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(18,13,11,0.4);
  }
  .card .title {
    font-size: 12.5px;
    line-height: 1.4;
    color: var(--wf-light-fg);
    font-weight: 400;
    letter-spacing: -0.005em;
  }
  .card .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .card .tg {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    background: rgba(18,13,11,0.06);
    color: rgba(18,13,11,0.65);
    letter-spacing: -0.005em;
  }
  .card .tg.personal {
    background: rgba(18,13,11,0.14);
    color: rgba(18,13,11,0.82);
  }
  .card .untagged {
    font-size: 9px;
    padding: 2px 7px;
    border: 1px dashed rgba(18,13,11,0.22);
    border-radius: 999px;
    color: rgba(18,13,11,0.45);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    width: fit-content;

  /* ---------- Detail panel (right slide-in) ---------- */
  .detail {
    position: fixed;
    top: 0; right: 0;
    width: 480px;
    height: 100vh;
    background: var(--wf-light-bg);
    border-left: 1px solid rgba(18,13,11,0.14);
    box-shadow: -20px 0 40px rgba(18,13,11,0.08);
    display: flex;
    flex-direction: column;
    z-index: 30;
    animation: slidein 0.28s cubic-bezier(0.32, 0.72, 0, 1) both;
  }
  @keyframes slidein {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  .detail .head {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(18,13,11,0.1);

    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;

    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .detail h2 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.015em;
    line-height: 1.3;
    color: var(--wf-light-fg);
    margin: 0;
  }
  .detail .meta {
    display: grid;

    gap: 6px 16px;

  }
  .detail .meta dt {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(18,13,11,0.45);
    padding-top: 3px;
  }
  .detail .meta dd {
    margin: 0;
    font-size: 13px;
    color: rgba(18,13,11,0.8);
  }
  .detail .meta dd a {
    color: var(--wf-light-fg);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .detail .section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .detail .section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(18,13,11,0.5);
  }
  .detail .tag-picker { display: flex; flex-wrap: wrap; gap: 6px; }
  .detail .tg {
    padding: 4px 11px;
    border-radius: 999px;
    border: 1px solid rgba(18,13,11,0.16);
    font-size: 12px;
    letter-spacing: -0.005em;
    background: transparent;
    color: rgba(18,13,11,0.7);
  }
  .detail .tg:hover { border-color: rgba(18,13,11,0.32); color: var(--wf-light-fg); }
  .detail .tg.on {
    background: var(--wf-light-fg);
    color: var(--wf-light-bg);
    border-color: var(--wf-light-fg);
  }
  .detail .tg .wk {
    margin-left: 6px;
    font-family: var(--font-mono);
    font-size: 9px;
    opacity: 0.65;
    letter-spacing: 0;
  }

  .detail textarea {
    background: var(--wf-light-input);
    border: 1px solid rgba(18,13,11,0.1);
    border-radius: 3px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--wf-light-fg);
    min-height: 64px;
    outline: 0;
    resize: vertical;
  }
  .detail textarea:focus { border-color: rgba(18,13,11,0.3); }

  .detail .used-by {
    font-size: 12px;
    color: rgba(18,13,11,0.5);
    font-style: italic;
  }

  .detail .actions {
    padding: 14px 22px;
    border-top: 1px solid rgba(18,13,11,0.1);
    display: flex;
    gap: 10px;
    background: var(--wf-light-bg);
  }
  .detail .btn {
    flex: 1;
    padding: 9px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.005em;
    border: 1px solid rgba(18,13,11,0.16);
    color: var(--wf-light-fg);
  }
  .detail .btn:hover { border-color: rgba(18,13,11,0.3); }
  .detail .btn.primary {
    background: var(--wf-light-fg);
    color: var(--wf-light-bg);
    border-color: var(--wf-light-fg);
  }

  /* ---------- Empty state ---------- */
  .empty {
    padding: 80px 32px;
    text-align: center;
    color: rgba(18,13,11,0.4);
    font-size: 13px;
    letter-spacing: -0.005em;
  }
  .empty strong {
    display: block;
    color: var(--wf-light-fg);
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  /* Hidden when not active */
  [hidden] { display: none !important; }
</style>
</head>

}

function tagById(id) { return TAGS.find(t => t.id === id); }
function sourceById(id) { return SOURCES.find(s => s.id === id); }

/* ============================================================
   Rail
   ============================================================ */

function Rail({ saves, tagFilter, setTagFilter, sourceFilter, setSourceFilter, includePersonal, setIncludePersonal }) {
  // Counts respect the include-personal toggle.
  const visibleSaves = saves.filter(s => includePersonal ? true : !s.tags.includes("personal"));
  const countFor = (pred) => visibleSaves.filter(pred).length;

  return (
    <aside className="rail">
      <div>
        <div className="brand">Sunpull</div>
      </div>

      <div>
        <h4>Views</h4>
        <div className="group">
          <div
            className={"link" + (tagFilter === null ? " active" : "")}
            onClick={() => setTagFilter(null)}
          ><span>All saves</span><span className="count">{visibleSaves.length}</span></div>
          <div
            className={"link" + (tagFilter === "__untagged" ? " active" : "")}
            onClick={() => setTagFilter("__untagged")}
          ><span>Untagged</span><span className="count">{countFor(s => s.tags.length === 0)}</span></div>
          <div className="link" style={{ opacity: 0.5, cursor: "not-allowed" }}>
            <span>Clusters</span><span className="count">—</span>
          </div>
        </div>
      </div>

      <div>
        <h4>Tags</h4>
        <div className="group">
          {TAGS.filter(t => !t.isPersonal).map(t => (
            <div
              key={t.id}
              className={"link" + (tagFilter === t.id ? " active" : "")}
              onClick={() => setTagFilter(tagFilter === t.id ? null : t.id)}
            >
              <span>{t.name}{t.workflow ? <span className="wk">→ {t.workflow}</span> : null}</span>
              <span className="count">{countFor(s => s.tags.includes(t.id))}</span>
            </div>
          ))}
        </div>
      </div>

      <div>
        <h4>Sources</h4>
        <div className="group">
          {SOURCES.map(src => (
            <div
              key={src.id}
              className={"link" + (sourceFilter === src.id ? " active" : "")}
              onClick={() => setSourceFilter(sourceFilter === src.id ? null : src.id)}
            >
              <span>{src.name}</span>
              <span className="count">{countFor(s => s.src === src.id)}</span>
            </div>
          ))}
        </div>
      </div>

      <div>
        <h4>Privacy</h4>
        <button
          className={"toggle" + (includePersonal ? " on" : "")}
          onClick={() => setIncludePersonal(v => !v)}
          aria-pressed={includePersonal}
        >
          <span className="box">{includePersonal ? "✓" : ""}</span>
          <span>Include personal saves</span>
        </button>
        <div style={{ padding: "0 10px", fontSize: 11, color: "rgba(18,13,11,0.45)", lineHeight: 1.4, letterSpacing: "-0.005em" }}>
          Personal saves stay private and never surface to Sunrun or Sundial queries.
        </div>
      </div>
    </aside>
  );
}

/* ============================================================
   Card (library tile) — a real click target
   ============================================================ */

function Card({ save, selected, onClick }) {
  const s = save;
  return (
    <div
      className={"card" + (selected ? " selected" : "")}
      data-src={s.src}
      onClick={onClick}
    >
      <div className="thumb" style={{ minHeight: s.h }}>preview</div>
      <div className="body">
        <span className="src">{sourceById(s.src).name} · {s.author}</span>
        <span className="title">{s.title}</span>
        <div className="tags">
          {s.tags.length === 0 ? (
            <span className="untagged">Untagged</span>
          ) : s.tags.map(id => {
            const t = tagById(id);
            return <span key={id} className={"tg" + (t.isPersonal ? " personal" : "")}>{t.name}</span>;
          })}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   Detail panel (right slide-in)
   ============================================================ */

function DetailPanel({ save, onClose, onToggleTag, onNote }) {
  const s = save;
  const source = sourceById(s.src);
  return (
    <div className="detail" role="dialog" aria-label={`Save: ${s.title}`}>
      <div className="head">
        <span className="src">{source.name}</span>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 0, color: "rgba(18,13,11,0.4)" }}>{s.id}</span>
        <button className="close" onClick={onClose} aria-label="Close">✕</button>
      </div>
      <div className="body">
        <div className="hero">{source.name.toLowerCase()} preview</div>
        <h2>{s.title}</h2>
        <dl className="meta">
          <dt>Source</dt><dd>{source.name}</dd>
          <dt>Author</dt><dd>{s.author}</dd>
          <dt>URL</dt><dd><a href="#" onClick={(e) => e.preventDefault()}>{s.domain}</a></dd>
          <dt>Saved</dt><dd>Apr 22, 2026</dd>
        </dl>

        <div className="section">
          <div className="section-label">Tags</div>
          <div className="tag-picker">
            {TAGS.map(t => {
              const on = s.tags.includes(t.id);
              return (
                <button
                  key={t.id}
                  className={"tg" + (on ? " on" : "")}
                  onClick={() => onToggleTag(t.id)}
                >
                  {on ? "" : "+ "}{t.name}
                  {t.workflow ? <span className="wk">→ {t.workflow}</span> : null}
                </button>
              );
            })}
          </div>
        </div>

        <div className="section">
          <div className="section-label">Note</div>
          <textarea
            value={s.note}
            onChange={(e) => onNote(e.target.value)}
            placeholder="Why did you save this?"
          />
        </div>

        <div className="section">
          <div className="section-label">Used by Sunrun</div>
          {s.tags.some(id => tagById(id)?.workflow) ? (
            <div style={{ fontSize: 13, color: "rgba(18,13,11,0.78)" }}>
              Feeds <strong>{[...new Set(s.tags.map(id => tagById(id)?.workflow).filter(Boolean))].join(", ")}</strong> workflow Runs when queued.
            </div>
          ) : (
            <div className="used-by">Not mapped to any workflow yet — add a Run-mapped tag to feed Sunrun.</div>
          )}
        </div>
      </div>
      <div className="actions">
        <button className="btn">Archive</button>
        <button className="btn">Delete</button>
        <button className="btn primary">Open original</button>
      </div>
    </div>
  );
}

/* ============================================================
   App
   ============================================================ */

function App() {
  const [saves, setSaves] = useState(INITIAL_SAVES);
  const [tagFilter, setTagFilter] = useState(null);      // null | tagId | "__untagged"
  const [sourceFilter, setSourceFilter] = useState(null); // null | sourceId
  const [search, setSearch] = useState("");
  const [includePersonal, setIncludePersonal] = useState(false);
  const [selectedId, setSelectedId] = useState(null);
  const [archetypeVisible, setArchetypeVisible] = useState(true);

  const selected = selectedId ? saves.find(s => s.id === selectedId) : null;

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape" && selectedId) setSelectedId(null);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [selectedId]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return saves.filter(s => {
      // Personal privacy enforcement
      if (!includePersonal && s.tags.includes("personal")) return false;
      // Tag filter
      if (tagFilter === "__untagged" && s.tags.length > 0) return false;
      if (tagFilter && tagFilter !== "__untagged" && !s.tags.includes(tagFilter)) return false;
      // Source filter
      if (sourceFilter && s.src !== sourceFilter) return false;
      // Search
      if (q && !(
        s.title.toLowerCase().includes(q) ||
        s.author.toLowerCase().includes(q) ||
        s.domain.toLowerCase().includes(q) ||
        s.note.toLowerCase().includes(q) ||
        s.tags.some(id => tagById(id)?.name.toLowerCase().includes(q))
      )) return false;
      return true;
    });
  }, [saves, tagFilter, sourceFilter, search, includePersonal]);

  const bannerTitle = useMemo(() => {
    if (tagFilter === "__untagged") return "Untagged";
    if (tagFilter) return tagById(tagFilter)?.name || "Library";
    if (sourceFilter) return sourceById(sourceFilter)?.name;
    if (search) return `Search · "${search}"`;
    return "Library";
  }, [tagFilter, sourceFilter, search]);

  const hasFilters = tagFilter !== null || sourceFilter !== null || search !== "";

  const toggleTag = (saveId, tagId) => {
    setSaves(prev => prev.map(s => {
      if (s.id !== saveId) return s;
      const has = s.tags.includes(tagId);
      return { ...s, tags: has ? s.tags.filter(t => t !== tagId) : [...s.tags, tagId] };
    }));
  };

  const setNote = (saveId, note) => {
    setSaves(prev => prev.map(s => s.id === saveId ? { ...s, note } : s));
  };

  return (
    <div className="app">
      <Rail
        saves={saves}
        tagFilter={tagFilter}
        setTagFilter={setTagFilter}
        sourceFilter={sourceFilter}
        setSourceFilter={setSourceFilter}
        includePersonal={includePersonal}
        setIncludePersonal={setIncludePersonal}
      />

      <div className="main">
        <div className="topbar">
          <label className="search">
            <SearchIcon size={13} />
            <input
              type="search"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="Search your library — title, author, tag, note…"
            />
          </label>
          <div className="spacer" />
          <button className="pill-btn" onClick={() => setArchetypeVisible(v => !v)}>
            {archetypeVisible ? "Hide archetype" : "Show archetype"}
          </button>
          <div className="avatar" title="Jazz · aither.co">JE</div>
        </div>

        {archetypeVisible && (
          <div className="archetype">
            <span className="kicker">Your archetype</span>
            <span className="txt">"A sharp curator of operator-toned systems thinking with a soft edge for design-led typography."</span>
            <button className="dismiss" onClick={() => setArchetypeVisible(false)}>dismiss</button>
          </div>
        )}

        <div className="banner">
          <h1>{bannerTitle}</h1>
          <span className="meta">{filtered.length} {filtered.length === 1 ? "save" : "saves"}</span>
          {hasFilters && (
            <button className="clear" onClick={() => { setTagFilter(null); setSourceFilter(null); setSearch(""); }}>clear filters</button>
          )}
        </div>

        <div className="filters">
          <button
            className={"chip" + (tagFilter === null && sourceFilter === null && !search ? " active" : "")}
            onClick={() => { setTagFilter(null); setSourceFilter(null); setSearch(""); }}
          >All<span className="c">{saves.filter(s => includePersonal || !s.tags.includes("personal")).length}</span></button>
          <button
            className={"chip" + (tagFilter === "__untagged" ? " active" : "")}
            onClick={() => setTagFilter("__untagged")}
          >Untagged<span className="c">{saves.filter(s => (includePersonal || !s.tags.includes("personal")) && s.tags.length === 0).length}</span></button>
          {TAGS.filter(t => !t.isPersonal).map(t => {
            const n = saves.filter(s => (includePersonal || !s.tags.includes("personal")) && s.tags.includes(t.id)).length;
            if (n === 0) return null;
            return (
              <button
                key={t.id}
                className={"chip" + (tagFilter === t.id ? " active" : "")}
                onClick={() => setTagFilter(tagFilter === t.id ? null : t.id)}
              >{t.name}<span className="c">{n}</span></button>
            );
          })}
        </div>

        {filtered.length === 0 ? (
          <div className="empty">
            <strong>Nothing matches these filters.</strong>
            {hasFilters
              ? "Try clearing a filter or broadening the search."
              : "Your library is empty — connect a source to start pulling saves."}
          </div>
        ) : (
          <div className="grid">
            {filtered.map(s => (
              <Card
                key={s.id}
                save={s}
                selected={s.id === selectedId}
                onClick={() => setSelectedId(s.id)}
              />
            ))}
          </div>
        )}
      </div>

      {selected && (
        <DetailPanel
          save={selected}
          onClose={() => setSelectedId(null)}
          onToggleTag={(tagId) => toggleTag(selected.id, tagId)}
          onNote={(n) => setNote(selected.id, n)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script src="../shared/comments.js" defer></script>
<link rel="stylesheet" href="../shared/comments-brand.css">
</body>
</html>
