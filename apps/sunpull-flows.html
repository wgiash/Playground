<!doctype html>
<!--
  Sunpull flows — empty canvas, fork of the wireframe-library pattern.
  Reuses tokens.css + canvas.css + comments.js unchanged. Add flow sections
  to the `sections` array in the App component below — the Canvas infra
  handles pan/zoom/frames; do not modify the infra beyond registering sections.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aither · Sunpull flows</title>

<script src="../shared/firebase-config.js"></script>
<script src="../shared/auth-gate.js"></script>

<link rel="stylesheet" href="../system/tokens.css">
<link rel="stylesheet" href="../system/canvas.css">
<link rel="stylesheet" href="../system/chrome.css">

<style>
  /* ============================================================
     Sunpull flow · scoped styles (.spf-*)
     Every rule uses tokens from tokens.css — no new tokens.
     Styles apply inside .wf frames where variables like --bg/--fg
     are already set by data-mode.
     ============================================================ */

  /* Sunpull web chrome — slim top strip, brand + user avatar */
  .spf-chrome {
    display: flex;
    align-items: center;
    gap: var(--s-4);
    padding: 16px 32px;
    border-bottom: 1px solid var(--hair);
    background: var(--bg);
  }
  .spf-chrome .spf-brand {
    font-size: 15px;
    font-weight: var(--w-title);
    letter-spacing: -0.01em;
  }
  .spf-chrome .spf-spacer { flex: 1; }
  .spf-chrome .spf-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--hair);
    display: grid; place-items: center;
    font-size: 10px; font-weight: var(--w-title);
    color: var(--fg);
  }
  .spf-chrome .spf-user {
    font-size: 12px;
    color: var(--fg-soft);
    letter-spacing: -0.01em;
  }

  /* Full-frame canvas for a screen */
  .spf-screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--fg);
  }

  /* Centered auth/reveal panel */
  .spf-stage {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 64px;
  }
  .spf-card {
    width: 480px;
    max-width: 100%;
    padding: 48px;
    background: var(--panel);
    border: 1px solid var(--hair);
    border-radius: var(--r-2);
    display: flex;
    flex-direction: column;
    gap: var(--s-5);
  }
  .spf-card-wide { width: 720px; }
  .spf-card h1 {
    font-size: 32px;
    font-weight: var(--w-title);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0;
    text-wrap: balance;
  }
  .spf-card p {
    font-size: 14px;
    line-height: 1.55;
    color: var(--fg-soft);
    margin: 0;
    letter-spacing: -0.005em;
  }
  .spf-card .spf-row { display: flex; gap: var(--s-3); }
  .spf-card .spf-sep {
    text-align: center;
    font-size: 11px;
    color: var(--fg-mute);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    position: relative;
  }
  .spf-card .spf-sep::before,
  .spf-card .spf-sep::after {
    content: "";
    position: absolute;
    top: 50%;
    width: calc(50% - 20px);
    height: 1px;
    background: var(--hair);
  }
  .spf-card .spf-sep::before { left: 0; }
  .spf-card .spf-sep::after  { right: 0; }

  /* Source picker row — three equal cards */
  .spf-source-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--s-5);
    width: 100%;
    max-width: 1120px;
  }
  .spf-source-card {
    background: var(--panel);
    border: 1px solid var(--hair);
    border-radius: var(--r-2);
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: var(--s-3);
    min-height: 240px;
  }
  .spf-source-card .ic {
    width: 40px; height: 40px;
    border-radius: var(--r-1);
    background: var(--input);
    border: 1px solid var(--hair);
    display: grid; place-items: center;
    font-size: 11px;
    font-weight: var(--w-title);
    letter-spacing: 0.08em;
    color: var(--fg-mute);
  }
  .spf-source-card h2 {
    font-size: 16px;
    font-weight: var(--w-title);
    letter-spacing: -0.01em;
    margin: 0;
  }
  .spf-source-card p {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
    color: var(--fg-soft);
    margin: 0;
  }
  .spf-source-card[data-state="error"] {
    border-color: var(--fg-mute);
    background: var(--input);
  }

  /* Progress bar */
  .spf-progress {
    width: 100%;
    height: 4px;
    background: var(--hair);
    border-radius: var(--r-full);
    overflow: hidden;
  }
  .spf-progress > span {
    display: block;
    height: 100%;
    background: var(--fg);
    transition: width var(--dur) var(--ease);
  }
  .spf-progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-soft);
    letter-spacing: 0;
  }

  /* Archetype display */
  .spf-archetype {
    font-size: 28px;
    font-weight: var(--w-ui);
    letter-spacing: -0.015em;
    line-height: 1.25;
    color: var(--fg);
    text-wrap: balance;
    font-style: italic;
  }

  /* Library shell — left rail + main */
  .spf-lib {
    display: grid;
    grid-template-columns: 220px 1fr;
    flex: 1;
    min-height: 0;
  }
  .spf-lib .rail {
    border-right: 1px solid var(--hair);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: var(--s-2);
  }
  .spf-lib .rail h4 {
    font-size: 10px;
    font-weight: var(--w-ui);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-mute);
    margin: 12px 0 6px;
  }
  .spf-lib .rail h4:first-child { margin-top: 0; }
  .spf-lib .rail a {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--fg-soft);
    padding: 6px 8px;
    border-radius: var(--r-1);
    letter-spacing: -0.005em;
  }
  .spf-lib .rail a .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg-mute); }
  .spf-lib .rail a[aria-current="true"] {
    background: var(--panel);
    color: var(--fg);
    font-weight: var(--w-ui);
  }
  .spf-lib .rail a[aria-current="true"] .n { color: var(--fg); }
  .spf-lib .main { padding: 20px 28px; display: flex; flex-direction: column; gap: var(--s-4); min-height: 0; }

  .spf-searchbar {
    display: flex;
    align-items: center;
    gap: var(--s-3);
  }
  .spf-search {
    flex: 1;
    background: var(--input);
    border: 1px solid var(--hair);
    border-radius: var(--r-full);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--fg-mute);
  }

  .spf-filters {
    display: flex;
    gap: var(--s-2);
    flex-wrap: wrap;
  }

  .spf-banner {
    display: flex;
    align-items: center;
    gap: var(--s-3);
    padding: 14px 18px;
    background: var(--input);
    border: 1px solid var(--hair);
    border-radius: var(--r-2);
    font-size: 13px;
    color: var(--fg-soft);
    letter-spacing: -0.005em;
  }
  .spf-banner strong { color: var(--fg); font-weight: var(--w-ui); }
  .spf-banner .spf-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--fg-soft);
    flex: none;
  }

  /* Masonry grid — purely visual (CSS columns, not real masonry) */
  .spf-masonry {
    column-count: 4;
    column-gap: 16px;
    flex: 1;
    min-height: 0;
  }
  .spf-masonry .card {
    break-inside: avoid;
    background: var(--panel);
    border: 1px solid var(--hair);
    border-radius: var(--r-2);
    margin-bottom: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .spf-masonry .card .thumb {
    background: var(--placeholder);
    color: var(--fg-mute);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    display: grid; place-items: center;
    padding: 28px 8px;
  }
  .spf-masonry .card .meta {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .spf-masonry .card .meta .src {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-mute);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .spf-masonry .card .meta .t {
    font-size: 12px;
    line-height: 1.4;
    color: var(--fg);
    font-weight: var(--w-ui);
    letter-spacing: -0.005em;
  }
  .spf-masonry .card .meta .badge {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: var(--w-ui);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--hair-2);
    border-radius: var(--r-full);
    color: var(--fg-mute);
  }

  /* Coach-mark bubble (just the pointer, no overlay) */
  .spf-coach {
    position: absolute;
    padding: 10px 14px;
    background: var(--fg);
    color: var(--bg);
    border-radius: var(--r-1);
    font-size: 11px;
    letter-spacing: -0.005em;
    max-width: 200px;
    line-height: 1.4;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .spf-coach::before {
    content: "";
    position: absolute;
    top: -5px;
    left: 20px;
    width: 10px; height: 10px;
    background: var(--fg);
    transform: rotate(45deg);
  }

  /* Error microcopy (from §11 / Brand-microcopy-TBD — lifted from Jazz's spec) */
  .spf-err-note {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    color: var(--fg-mute);
    text-transform: uppercase;
  }

  /* ============================================================
     Sunpull mobile flow · scoped styles (.spfm-*)
     390×844 phone frames. Messaging thread uses conversational bubbles.
     ============================================================ */

  .spfm-screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-ui);
  }

  .spfm-statusbar {
    height: 44px;
    padding: 14px 24px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    font-size: 14px;
    font-weight: var(--w-title);
    letter-spacing: -0.02em;
    flex: 0 0 44px;
  }
  .spfm-statusbar .icons { font-size: 12px; letter-spacing: 0.06em; color: var(--fg-soft); }

  .spfm-msghead {
    padding: 8px 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--hair);
  }
  .spfm-msghead .back { font-size: 18px; color: var(--fg); }
  .spfm-msghead .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--hair);
    display: grid; place-items: center;
    font-size: 10px; font-weight: var(--w-title);
    color: var(--fg);
    flex-shrink: 0;
  }
  .spfm-msghead .who { display: flex; flex-direction: column; }
  .spfm-msghead .name { font-size: 14px; font-weight: var(--w-title); letter-spacing: -0.01em; }
  .spfm-msghead .sub { font-size: 10px; color: var(--fg-soft); letter-spacing: -0.005em; }
  .spfm-msghead .info { margin-left: auto; color: var(--fg-mute); font-size: 18px; }

  .spfm-thread {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }
  .spfm-day {
    text-align: center;
    font-size: 10px;
    color: var(--fg-mute);
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 0 4px;
  }

  .spfm-bubble {
    max-width: 78%;
    padding: 9px 13px;
    font-size: 13.5px;
    line-height: 1.4;
    letter-spacing: -0.005em;
    border-radius: 18px;
    border: 1px solid transparent;
  }
  .spfm-bubble.them {
    align-self: flex-start;
    background: var(--panel);
    color: var(--fg);
    border-color: var(--hair);
    border-bottom-left-radius: 4px;
  }
  .spfm-bubble.me {
    align-self: flex-end;
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
    border-bottom-right-radius: 4px;
  }
  .spfm-bubble + .spfm-bubble.same { margin-top: -4px; }

  .spfm-bubble .link {
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* URL preview card embedded in a bot bubble */
  .spfm-preview {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--hair);
    border-radius: var(--r-2);
    overflow: hidden;
    margin-top: 8px;
    max-width: 100%;
  }
  .spfm-preview .ph {
    background: var(--placeholder);
    height: 100px;
    color: var(--fg-mute);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: grid; place-items: center;
  }
  .spfm-preview .meta {
    padding: 8px 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .spfm-preview .dom {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--fg-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .spfm-preview .t {
    font-size: 12px;
    font-weight: var(--w-ui);
    line-height: 1.3;
    color: var(--fg);
  }

  .spfm-input {
    padding: 8px 12px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid var(--hair);
  }
  .spfm-input .field {
    flex: 1;
    background: var(--input);
    border: 1px solid var(--hair);
    border-radius: 18px;
    padding: 9px 14px;
    font-size: 13px;
    color: var(--fg-mute);
  }
  .spfm-input .send {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--fg);
    color: var(--bg);
    display: grid; place-items: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .spfm-homebar {
    position: absolute;
    left: 50%;
    bottom: 6px;
    transform: translateX(-50%);
    width: 130px;
    height: 4px;
    border-radius: var(--r-full);
    background: var(--fg);
    opacity: 0.55;
  }

  /* Pair-phone instructional screen (different shape — settings-style) */
  .spfm-pair {
    flex: 1;
    padding: 32px 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .spfm-pair .kicker {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-mute);
    font-weight: var(--w-ui);
  }
  .spfm-pair h1 {
    font-size: 26px;
    font-weight: var(--w-title);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0;
    text-wrap: balance;
  }
  .spfm-pair p {
    font-size: 13px;
    color: var(--fg-soft);
    line-height: 1.5;
    margin: 0;
  }
  .spfm-code {
    padding: 20px 22px;
    background: var(--panel);
    border: 1px solid var(--hair);
    border-radius: var(--r-2);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .spfm-code .n {
    font-family: var(--font-mono);
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--fg);
  }
  .spfm-code .sub {
    font-size: 10px;
    color: var(--fg-mute);
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .spfm-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--fg-soft);
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
  }
  .spfm-status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--fg-mute);
  }

  /* ============================================================
     Sunpull browser-extension flow · scoped styles (.spfx-*)
     Full 1440×900 frame showing a faux browser page with a 360-wide
     popover overlay. Popover is pinned top-right.
     ============================================================ */

  .spfx-screen {
    width: 100%;
    height: 100%;
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  /* Faux browser chrome + page — purely visual backdrop context */
  .spfx-backdrop {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .spfx-chrome {
    height: 48px;
    padding: 0 20px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--hair);
    background: var(--panel);
    flex-shrink: 0;
  }
  .spfx-chrome .dots { display: flex; gap: 6px; }
  .spfx-chrome .dots span {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--hair-2);
  }
  .spfx-chrome .urlbar {
    flex: 1;
    max-width: 560px;
    background: var(--bg);
    border: 1px solid var(--hair);
    border-radius: var(--r-full);
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-mute);
    letter-spacing: 0;
  }
  .spfx-page {
    flex: 1;
    padding: 56px 120px;
    display: flex; flex-direction: column;
    gap: 14px;
    overflow: hidden;
  }
  .spfx-page .h {
    height: 28px;
    width: 60%;
    background: var(--placeholder);
    border-radius: 3px;
  }
  .spfx-page .p {
    height: 10px;
    background: var(--hair);
    border-radius: 3px;
  }
  .spfx-page .p.short { width: 70%; }
  .spfx-page .img {
    height: 280px;
    background: var(--placeholder);
    border-radius: var(--r-2);
    margin-top: 10px;
  }

  /* Optional dim overlay when a popover is active */
  .spfx-dim {
    position: absolute;
    inset: 0;
    background: rgba(18, 13, 11, 0.18);
    pointer-events: none;
  }
  .wf[data-mode="dark"] .spfx-dim { background: rgba(0, 0, 0, 0.32); }

  /* The extension popover */
  .spfx-pop {
    position: absolute;
    top: 72px;
    right: 56px;
    width: 360px;
    background: var(--bg);
    border: 1px solid var(--hair-2);
    border-radius: var(--r-2);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .spfx-pop .h {
    padding: 12px 14px;
    display: flex; align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--hair);
    font-size: 10px;
    color: var(--fg-soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: var(--w-ui);
  }
  .spfx-pop .h .kbd {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-mute);
    letter-spacing: 0;
    text-transform: none;
  }
  .spfx-pop .preview {
    padding: 14px;
    display: flex; gap: 12px;
    align-items: flex-start;
    border-bottom: 1px solid var(--hair);
  }
  .spfx-pop .preview .thumb {
    width: 56px; height: 56px;
    background: var(--placeholder);
    border-radius: var(--r-2);
    flex-shrink: 0;
  }
  .spfx-pop .preview .meta {
    display: flex; flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .spfx-pop .preview .src {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-mute);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .spfx-pop .preview .t {
    font-size: 13px;
    font-weight: var(--w-ui);
    line-height: 1.35;
    color: var(--fg);
    letter-spacing: -0.005em;
  }
  .spfx-pop .body {
    padding: 14px;
    display: flex; flex-direction: column;
    gap: 10px;
  }
  .spfx-pop .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--fg-mute);
    font-weight: var(--w-ui);
  }
  .spfx-pop .tags {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .spfx-pop .note {
    background: var(--input);
    border: 1px solid var(--hair);
    border-radius: var(--r-1);
    padding: 8px 10px;
    font-size: 12px;
    color: var(--fg-mute);
    min-height: 52px;
    letter-spacing: -0.005em;
    line-height: 1.4;
  }
  .spfx-pop .actions {
    padding: 10px 14px;
    display: flex; gap: 8px;
    border-top: 1px solid var(--hair);
    background: var(--panel);
  }

  /* Saved-state toast (replaces popover briefly) */
  .spfx-toast {
    position: absolute;
    top: 72px;

const { useState, useEffect, useRef, useCallback, useMemo } = React;

const SearchIcon = ({ size = 14 }) => (

/* ========== Canvas (pan/zoom) — mirrored from system/app.jsx ========== */
function Canvas({ children, scaleState, panState }) {
  const viewportRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef(null);
  const [scale, setScale] = scaleState;
  const [pan, setPan] = panState;

  const onMouseDown = (e) => {
    if (e.button !== 0) return;
    const t = e.target;
    if (t.closest && t.closest('.topbar')) return;
    dragStart.current = { x: e.clientX - pan.x, y: e.clientY - pan.y };
    setDragging(true);
  };
  const onMouseMove = (e) => {
    if (!dragging || !dragStart.current) return;
    setPan({ x: e.clientX - dragStart.current.x, y: e.clientY - dragStart.current.y });
  };
  const onMouseUp = () => { setDragging(false); dragStart.current = null; };

  const onWheel = useCallback((e) => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      const rect = viewportRef.current.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      setScale(prev => {
        const next = Math.max(0.08, Math.min(2.5, prev * factor));
        setPan(p => ({
          x: cx - ((cx - p.x) * next / prev),
          y: cy - ((cy - p.y) * next / prev),
        }));
        return next;
      });
    } else {
      setPan(p => ({ x: p.x - e.deltaX, y: p.y - e.deltaY }));
    }
  }, [setScale, setPan]);

  useEffect(() => {
    const el = viewportRef.current;
    if (!el) return;
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, [onWheel]);

  useEffect(() => {
    if (!dragging) return;
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
  }, [dragging]);

  return (
    <div
      ref={viewportRef}
      className={"canvas-viewport" + (dragging ? " dragging" : "")}
      onMouseDown={onMouseDown}
    >
      <div
        className="canvas-surface"
        style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})` }}
      >
        {children}
      </div>
    </div>
  );
}

/* ========== Canvas Index · jump-to-section overlay
   (mirrored from wireframe-library with the same DOM + keyboard behavior) ========== */
function CanvasIndex({ open, onClose, onJump, entries }) {
  const [q, setQ] = useState("");
  const [activeCat, setActiveCat] = useState("All");
  const [focused, setFocused] = useState(0);
  const inputRef = useRef(null);
  const listRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    setQ("");
    setActiveCat("All");
    setFocused(0);
    const t = setTimeout(() => inputRef.current && inputRef.current.focus(), 20);
    return () => clearTimeout(t);
  }, [open]);

  const norm = s => (s || "").toString().toLowerCase();

  const categories = useMemo(() => {
    const order = [];
    const counts = {};
    entries.forEach(e => {
      if (counts[e.cat] === undefined) { counts[e.cat] = 0; order.push(e.cat); }
      counts[e.cat] += 1;
    });
    return [{ name: "All", count: entries.length }, ...order.map(c => ({ name: c, count: counts[c] }))];
  }, [entries]);

  const filtered = entries.filter(e => {
    if (activeCat !== "All" && e.cat !== activeCat) return false;
    if (!q.trim()) return true;
    const hay = norm(e.name) + " " + norm(e.tag) + " " + norm(e.cat);
    return hay.includes(norm(q));
  });

  useEffect(() => {
    setFocused(0);
    if (listRef.current) listRef.current.scrollTop = 0;
  }, [q, activeCat]);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === "Escape") { e.preventDefault(); onClose(); }
      else if (e.key === "ArrowDown") { e.preventDefault(); setFocused(i => Math.min(filtered.length - 1, i + 1)); }
      else if (e.key === "ArrowUp")   { e.preventDefault(); setFocused(i => Math.max(0, i - 1)); }
      else if (e.key === "Enter" && filtered[focused]) {
        e.preventDefault();
        onJump(filtered[focused]);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, filtered, focused, onClose, onJump]);

  if (!open) return null;

  const byCat = [];
  filtered.forEach(e => {
    let g = byCat.find(b => b.cat === e.cat);
    if (!g) { g = { cat: e.cat, items: [] }; byCat.push(g); }
    g.items.push(e);
  });
  const showGroupHeaders = activeCat === "All";

  let globalIdx = -1;
  return (
    <div className="canvas-index-scrim" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="canvas-index-panel" role="dialog" aria-label="Jump to section">
        <div className="canvas-index-head">
          <SearchIcon size={14} />
          <input
            ref={inputRef}
            value={q}
            onChange={(e) => setQ(e.target.value)}
            placeholder="Search flows and screens…"
          />
          <span className="esc">esc</span>
        </div>
        <div className="canvas-index-filters" role="tablist" aria-label="Filter by category">
          {categories.map(c => (
            <button
              key={c.name}
              className="canvas-index-filter"
              role="tab"
              aria-pressed={activeCat === c.name}
              onClick={() => setActiveCat(c.name)}
            >
              {c.name}
              <span className="c">{c.count}</span>
            </button>
          ))}
        </div>
        <div className="canvas-index-list" ref={listRef}>
          {filtered.length === 0 ? (
            <div className="canvas-index-empty">Nothing matches "{q}".</div>
          ) : (
            byCat.map(g => (
              <React.Fragment key={g.cat}>
                {showGroupHeaders && (
                  <div className="canvas-index-group">
                    <span>{g.cat}</span>
                    <span>{g.items.length}</span>
                  </div>
                )}
                {g.items.map((e) => {
                  globalIdx += 1;
                  const idx = globalIdx;
                  return (
                    <div
                      key={e.cat + "-" + e.name}
                      className="canvas-index-item"
                      data-focus={idx === focused ? "true" : undefined}
                      onMouseEnter={() => setFocused(idx)}
                      onClick={() => onJump(e)}
                    >
                      <div>
                        <div className="n">{e.name}</div>
                        <div className="t">{e.tag}</div>
                      </div>
                      <div className="coords">{e.x}, {e.y}</div>
                    </div>
                  );
                })}
              </React.Fragment>
            ))
          )}
        </div>
        <div className="canvas-index-foot">
          <span><span className="kbd">↑↓</span> navigate</span>
          <span><span className="kbd">↵</span> jump</span>
          <span><span className="kbd">esc</span> close</span>
        </div>
      </div>
    </div>
  );
}

/* ========== Main app ========== */
function App() {
  const [scale, setScale] = useState(0.28);
  const [pan, setPan] = useState({ x: 120, y: 140 });
  const [indexOpen, setIndexOpen] = useState(false);

  const resetView = () => { setScale(0.28); setPan({ x: 120, y: 140 }); };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "0" && document.activeElement && document.activeElement.tagName !== "INPUT") {
        resetView();
      }
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setIndexOpen(o => !o);
      }
      if (e.key === "/" && !indexOpen && document.activeElement && document.activeElement.tagName !== "INPUT") {
        e.preventDefault();
        setIndexOpen(true);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [indexOpen]);

  const jumpTo = (entry) => {
    const s = 0.25;
    setScale(s);
    setPan({ x: 140 - entry.x * s, y: 200 - entry.y * s });
    setIndexOpen(false);
  };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "0") resetView();
      if (e.key === "1") { setScale(0.28); setPan({ x: 120, y: 140 }); }
      if (e.key === "2") { setScale(0.5);  setPan({ x: 100, y: 100 }); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  /* ====== Sections ======
     Each entry = one flow. Screens stack horizontally within a section.
     Per-flow frameW/frameH/gap lets mobile + desktop flows coexist cleanly.
     Light-mode only. Standing rule: every flow must include auth + error states.
  */
  /* All flows stack vertically at x=0. Screens inside each flow still
     run horizontally. y values computed from running height + gap. */
  const STACK_GAP = 280; // vertical breathing room between flows (fits the section header + frame label)

  const rawSections = [
    {
      num: "01",
      name: "First-time user flow",
      tag: "Onboarding ritual · §5.10 FR-O1 → O6 · auth + EC1 error",
      frameW: 1440, frameH: 900, gap: 100,
      screens: [
        { C: FTUSignIn,    label: "Sign in",       sub: "Auth · invite-only" },
        { C: FTUConnect,   label: "Connect",       sub: "FR-O1 · source picker" },
        { C: FTUUploading, label: "Importing",     sub: "FR-O2 · progress" },
        { C: FTUArchetype, label: "Archetype",     sub: "FR-O3 · reveal" },
        { C: FTULibrary,   label: "Library",       sub: "FR-O4 · untagged landing" },
        { C: FTUError,     label: "Error · EC1",   sub: "LinkedIn format drift" },
      ],
    },
    {
      num: "02",
      name: "Add from phone",
      tag: "Text forwarding · §5.6 FR-X1 → X5 · auth pairing + EC5 error",
      frameW: 390, frameH: 844, gap: 60,
      screens: [
        { C: APPair,           label: "Pair phone",     sub: "Auth · first run" },
        { C: APConvSend,       label: "Send link",      sub: "FR-X1 · link + context" },
        { C: APConvSuggestion, label: "Tag suggestion", sub: "FR-X3 · preview + tag" },
        { C: APConvConfirm,    label: "Retag",          sub: "FR-X4 · adjust" },
        { C: APConvError,      label: "Error · EC5",    sub: "No URL detected" },
      ],
    },
    {
      num: "03",
      name: "Browser extension",
      tag: "Quick capture · §5.5 FR-B1 → B6 · auth + EC4 error",
      frameW: 1440, frameH: 900, gap: 100,
      screens: [
        { C: XTExtAuth,      label: "First run",     sub: "Auth · sign in" },
        { C: XTExtTrigger,   label: "Triggered",     sub: "FR-B2 · ⌘⇧S on page" },
        { C: XTExtSuggested, label: "Suggested",     sub: "FR-B3 · tag + note" },
        { C: XTExtSaved,     label: "Saved",         sub: "FR-B4 · auto-dismiss" },
        { C: XTExtError,     label: "Error · EC4",   sub: "Page blocks scripts" },
      ],
    },
  ];

  let runningY = 0;
  const sections = rawSections.map((s) => {
    const y = runningY;
    runningY += s.frameH + STACK_GAP;
    return { ...s, x: 0, y };
  });

  // Index entries — one per flow (section) plus one per screen for finer search.
  const indexEntries = [];
  sections.forEach(s => {
    indexEntries.push({
      cat: "Flow",
      name: `${s.num} · ${s.name}`,
      tag: s.tag,
      x: s.x,
      y: s.y,
    });
    const step = s.frameW + s.gap;
    s.screens.forEach((scr, i) => {
      indexEntries.push({
        cat: "Screen",
        name: `${s.num}.${i + 1} · ${scr.label}`,
        tag: `${s.name} · ${scr.sub || ""}`.replace(/ · $/, ""),
        x: s.x + i * step,
        y: s.y,
      });
    });
  });

  return (
    <>
      <Topbar scale={scale} setScale={setScale} resetView={resetView} openIndex={() => setIndexOpen(true)} />
      <Canvas scaleState={[scale, setScale]} panState={[pan, setPan]}>
        <IntroCard x={-100} y={-1400} />

        {sections.map((s) => {
          const step = s.frameW + s.gap;
          const items = s.screens.map((scr, i) => ({
            x: i * step, y: 0, w: s.frameW, h: s.frameH,
            C: scr.C, title: `${i + 1} · ${scr.label}`, sub: scr.sub,
          }));
          const maxX = Math.max(...items.map(it => it.x + it.w), 0);
          const maxY = Math.max(...items.map(it => it.y + it.h), 0);
          return (
            <Section key={s.num} x={s.x} y={s.y} w={maxX} h={maxY} num={s.num} name={s.name} tag={s.tag}>
              {items.map((it, j) => {
                const Comp = it.C;
                return (
                  <Frame key={j} x={it.x} y={it.y} w={it.w} h={it.h} mode="light" title={it.title} subtitle={it.sub}>
                    <Comp />
                  </Frame>
                );
              })}
            </Section>
          );
        })}
      </Canvas>

      <CanvasIndex open={indexOpen} onClose={() => setIndexOpen(false)} onJump={jumpTo} entries={indexEntries} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Stop native Ctrl+wheel zoom from fighting the canvas zoom.
window.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) e.preventDefault();
}, { passive: false, capture: true });
</script>
