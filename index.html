<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aither · Home</title>
<link rel="stylesheet" href="./system/tokens.css">
<script src="./shared/firebase-config.js"></script>
<script src="./shared/auth-gate.js"></script>
<style>
  /* Apercu Pro — display use on the home page only (per DS: "No Apercu in wireframes") */
  @font-face {
    font-family: "Apercu Pro";
    src: url("./fonts/apercupro-regular.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Apercu Pro";
    src: url("./fonts/apercupro-bold.ttf") format("truetype");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Apercu Pro";
    src: url("./fonts/apercupro-bolditalic.ttf") format("truetype");
    font-weight: 700;
    font-style: italic;
    font-display: swap;
  }

  html, body {
    background: var(--canvas-bg);
    color: var(--canvas-fg);
    min-height: 100vh;
    margin: 0;
    font-family: var(--font-ui);
    letter-spacing: -0.01em;
  }

  .os {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Status bar (OS-top strip) ---------- */
  .bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--canvas-hair);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--canvas-label);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    gap: 24px;
  }
  .bar .brand {
    font-family: "Apercu Pro", var(--font-ui);
    font-size: 20px;
    font-weight: 700;
    font-style: italic;
    line-height: 1;
    letter-spacing: -0.015em;
    text-transform: none;
    color: var(--canvas-fg);
  }
  .bar .right { display: flex; align-items: center; gap: 18px; }
  .bar .search {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border: 1px solid var(--canvas-hair);
    border-radius: var(--r-full);
    min-width: 220px;
    color: var(--canvas-label);
    font-size: 13px;
    transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease);
  }
  .bar .search:focus-within {
    border-color: var(--canvas-label);
    color: var(--canvas-fg);
  }
  .bar .search svg {
    width: 14px;
    height: 14px;
    flex: none;
  }
  .bar .search input {
    background: transparent;
    border: 0;
    outline: 0;
    padding: 0;
    margin: 0;
    font-family: var(--font-ui);
    font-size: 13px;
    letter-spacing: -0.01em;
    text-transform: none;
    color: var(--canvas-fg);
    width: 100%;
    flex: 1;
  }
  .bar .search input::placeholder {
    color: var(--canvas-label);
    text-transform: none;
    letter-spacing: -0.01em;
  }
  .bar .sys { display: flex; gap: 18px; align-items: center; }
  .bar .sys span::before { content: "· "; color: var(--canvas-hair); margin-right: 6px; }
  .bar .sys span:first-child::before { content: ""; margin: 0; }
  .bar .sys .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--canvas-fg); opacity: 0.55;
    display: inline-block; margin-right: 8px; vertical-align: middle;
  }
  .bar .sys .dot::before { content: none; }

  /* ---------- Desktop (icons float, no frame) ---------- */
  .desktop {
    flex: 1;
    padding: 72px 64px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
    column-gap: 24px;
    row-gap: 40px;
    align-content: start;
  }

  /* ---------- Tile (app icon + label beneath) ---------- */
  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: inherit;
    text-decoration: none;
  }
  .tile .icon {
    aspect-ratio: 1 / 1;
    width: 100%;
    background: var(--canvas-panel);
    border: 1px solid var(--canvas-hair);
    border-radius: var(--r-2);
    display: grid;
    place-items: center;
    transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease), transform var(--dur) var(--ease);
  }
  .tile:hover .icon {
    background: var(--dark-2);
    border-color: var(--canvas-label);
    transform: translateY(-2px);
  }
  .tile:focus-visible .icon { outline: 1px solid var(--canvas-fg); outline-offset: 2px; }

  .tile .mark {
    font-family: "Apercu Pro", var(--font-ui);
    font-size: 48px;
    font-weight: 700;
    font-style: italic;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--canvas-fg);
  }

  .tile .name {
    font-size: 12px;
    font-weight: var(--w-ui);
    letter-spacing: -0.005em;
    color: var(--canvas-fg);
    line-height: 1.25;
    text-align: center;
    max-width: 140px;
    min-height: 2.5em;
  }

  .tile[hidden] { display: none; }

  /* ---------- Folder tile (iOS-style) ---------- */
  .tile.is-folder {
    background: none;
    border: 0;
    padding: 0;
    margin: 0;
    font: inherit;
    color: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tile.is-folder .icon {
    padding: 12px;
    background: var(--canvas-bg);
  }
  .tile.is-folder:hover .icon {
    background: var(--dark-2);
  }
  .folder-grid {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
  }
  .folder-grid .mini {
    background: var(--canvas-panel);
    border: 1px solid var(--canvas-hair);
    border-radius: var(--r-2);
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  .folder-grid .mini-mark {
    font-family: "Apercu Pro", var(--font-ui);
    font-size: 22px;
    font-weight: 700;
    font-style: italic;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--canvas-fg);
  }

  /* Folder children are hidden in the desktop view by default;
     they only show inside the folder overlay or when searching. */
  .tile[data-in-folder] { display: none; }
  .os[data-mode="search"] .tile.is-folder { display: none; }
  .os[data-mode="search"] .tile[data-in-folder] { display: flex; }

  /* ---------- Folder overlay ---------- */
  .folder-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: grid;
    place-items: center;
    padding: 64px 32px;
    background: var(--dark-soft);
    backdrop-filter: blur(24px) saturate(120%);
    -webkit-backdrop-filter: blur(24px) saturate(120%);
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--dur) var(--ease);
  }
  .folder-overlay[data-open="true"] {
    opacity: 1;
    pointer-events: auto;
  }
  .folder-panel {
    width: min(640px, 100%);
    transform: scale(0.94);
    opacity: 0;
    transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
  }
  .folder-overlay[data-open="true"] .folder-panel {
    transform: scale(1);
    opacity: 1;
  }
  .folder-panel-title {
    font-family: "Apercu Pro", var(--font-ui);
    font-size: 32px;
    font-weight: 700;
    font-style: italic;
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--canvas-fg);
    text-align: center;
    margin: 0 0 36px;
  }
  .folder-panel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
    column-gap: 24px;
    row-gap: 36px;
  }
  /* Inside the overlay, folder children behave like normal tiles again. */
  .folder-panel-grid .tile { display: flex; }

  .empty {
    grid-column: 1 / -1;
    color: var(--canvas-label);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ---------- Profile avatar + dropdown ---------- */
  .profile {
    position: relative;
  }
  .profile-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--canvas-panel);
    border: 1px solid var(--canvas-hair);
    display: grid;
    place-items: center;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: var(--w-ui);
    color: var(--canvas-fg);
    text-transform: none;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: border-color var(--dur) var(--ease);
    flex-shrink: 0;
    overflow: hidden;
  }
  .profile-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }
  .profile-avatar:hover {
    border-color: var(--canvas-label);
  }
  .profile-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 160px;
    background: var(--canvas-panel);
    border: 1px solid var(--canvas-hair);
    border-radius: var(--r-2);
    padding: 6px 0;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .profile-dropdown.open {
    display: block;
  }
  .profile-dropdown .profile-email {
    padding: 10px 16px 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--canvas-label);
    border-bottom: 1px solid var(--canvas-hair);
    margin-bottom: 6px;
    word-break: break-all;
    text-transform: none;
  }
  .profile-dropdown button {
    display: block;
    width: 100%;
    padding: 10px 16px;
    background: none;
    border: 0;
    text-align: left;
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--canvas-fg);
    letter-spacing: -0.01em;
    text-transform: none;
    cursor: pointer;
    transition: background var(--dur) var(--ease);
  }
  .profile-dropdown button:hover {
    background: rgba(234,228,226,0.06);
  }

  @media (max-width: 640px) {
    .desktop {
      padding: 32px 24px;
      column-gap: 16px;
      row-gap: 28px;
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
    }
    .bar { padding: 14px 16px; gap: 12px; }
    .bar .brand { font-size: 16px; }
    .bar .right { gap: 10px; }
    .bar .search { min-width: 0; flex: 1; padding: 6px 12px; }
    .bar .sys { display: none; }
    .tile .mark { font-size: 38px; }
    .tile.is-folder .icon { padding: 8px; }
    .folder-grid { gap: 5px; }
    .folder-grid .mini-mark { font-size: 16px; }
    .folder-overlay { padding: 32px 16px; }
    .folder-panel-title { font-size: 24px; margin-bottom: 24px; }
    .folder-panel-grid {
      grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
      column-gap: 16px;
      row-gap: 24px;
    }
  }
</style>
</head>
<body>

<div class="os">

  <header class="bar">
    <span class="brand">Aither Generative Playground</span>
    <div class="right">
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-3.5-3.5"></path>
        </svg>
        <input id="search" type="search" placeholder="Search" aria-label="Search" autocomplete="off">
      </label>
      <div class="profile">
        <div class="profile-avatar" id="profileBtn" role="button" tabindex="0" aria-label="Profile menu">·</div>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="profile-email" id="profileEmail"></div>
          <button id="logoutBtn" type="button">Log out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="desktop">
    <a class="tile" href="./apps/sunspell-prd-template.html">
      <span class="icon"><span class="mark">A</span></span>
      <span class="name">Aither MVP PRD Template</span>
    </a>

    <button class="tile is-folder" type="button" data-folder="sunpull" aria-haspopup="dialog">
      <span class="icon">
        <span class="folder-grid">
          <span class="mini"><span class="mini-mark">S</span></span>
          <span class="mini"><span class="mini-mark">S</span></span>
          <span class="mini"><span class="mini-mark">S</span></span>
          <span class="mini" aria-hidden="true"></span>
        </span>
      </span>
      <span class="name">Sunpull</span>
    </button>

    <button class="tile is-folder" type="button" data-folder="design" aria-haspopup="dialog">
      <span class="icon">
        <span class="folder-grid">
          <span class="mini"><span class="mini-mark">D</span></span>
          <span class="mini"><span class="mini-mark">R</span></span>
          <span class="mini" aria-hidden="true"></span>
          <span class="mini" aria-hidden="true"></span>
        </span>
      </span>
      <span class="name">Agent Handbooks</span>
    </button>

    <a class="tile" hidden href="./apps/prd-template.html">
      <span class="icon"><span class="mark">P</span></span>
      <span class="name">Prd Template</span>
    </a>

    <a class="tile" data-in-folder="sunpull" href="./apps/sunpull-prd.html">
      <span class="icon"><span class="mark">S</span></span>
      <span class="name">Sunpull PRD</span>
    </a>

    <a class="tile" data-in-folder="sunpull" href="./apps/sunpull-flows.html">
      <span class="icon"><span class="mark">S</span></span>
      <span class="name">Sunpull flows</span>
    </a>

    <a class="tile" data-in-folder="sunpull" href="./apps/sunpull-prototype.html">
      <span class="icon"><span class="mark">S</span></span>
      <span class="name">Sunpull prototype</span>
    </a>

    <a class="tile" data-in-folder="design" href="./apps/rendered-design-system.html">
      <span class="icon"><span class="mark">D</span></span>
      <span class="name">Rendered Design System</span>
    </a>

    <a class="tile" data-in-folder="design" href="./apps/agent-design-guide.html">
      <span class="icon"><span class="mark">A</span></span>
      <span class="name">Agent Design Guide</span>
    </a>

    <p class="empty" id="empty" hidden>No matches</p>
  </main>

  <div class="folder-overlay" id="folderOverlay" data-open="false" aria-hidden="true">
    <div class="folder-panel" role="dialog" aria-modal="true" aria-labelledby="folderPanelTitle">
      <h2 class="folder-panel-title" id="folderPanelTitle"></h2>
      <div class="folder-panel-grid" id="folderPanelGrid"></div>
    </div>
  </div>

</div>

<script>
  (function(){
    var el = document.getElementById('clock');
    if (!el) return;
    function tick(){
      var d = new Date();
      var h = d.getHours();
      var m = d.getMinutes();
      var am = h < 12 ? 'AM' : 'PM';
      h = h % 12; if (h === 0) h = 12;
      el.textContent = h + ':' + (m < 10 ? '0' + m : m) + ' ' + am;
    }
    tick();
    setInterval(tick, 30000);
  })();

  (function(){
    var os = document.querySelector('.os');
    var input = document.getElementById('search');
    var empty = document.getElementById('empty');
    var tiles = Array.prototype.slice.call(document.querySelectorAll('.tile'));

    function isFolder(t) { return t.classList.contains('is-folder'); }
    function inFolder(t) { return t.hasAttribute('data-in-folder'); }

    function activeMatchTiles() {
      // Tiles eligible for Enter-to-navigate: not hidden, not a folder, has href.
      return tiles.filter(function(t){
        return !t.hidden && !isFolder(t) && t.href;
      });
    }

    function apply(){
      var q = input.value.trim().toLowerCase();
      var searching = q !== '';
      if (searching) os.setAttribute('data-mode', 'search');
      else os.removeAttribute('data-mode');

      if (!searching) {
        tiles.forEach(function(t){ t.hidden = false; });
        // Re-hide PRD Template (the only tile with a hardcoded `hidden` attribute).
        var prd = document.querySelector('a.tile[href="./apps/prd-template.html"]');
        if (prd) prd.hidden = true;
        empty.hidden = true;
        return;
      }

      var anyMatch = false;
      tiles.forEach(function(t){
        if (isFolder(t)) { t.hidden = false; return; }
        var name = t.querySelector('.name').textContent.toLowerCase();
        var match = name.indexOf(q) !== -1;
        t.hidden = !match;
        if (match) anyMatch = true;
      });
      empty.hidden = anyMatch;
    }

    input.addEventListener('input', apply);
    input.addEventListener('keydown', function(e){
      if (e.key === 'Enter') {
        var v = activeMatchTiles();
        if (v.length === 1) { window.location.href = v[0].href; }
      } else if (e.key === 'Escape') {
        input.value = '';
        apply();
      }
    });
  })();

  (function(){
    var overlay = document.getElementById('folderOverlay');
    var titleEl = document.getElementById('folderPanelTitle');
    var grid = document.getElementById('folderPanelGrid');
    var lastTrigger = null;

    function openFolder(folderId, trigger) {
      var folderTile = document.querySelector('.tile.is-folder[data-folder="' + folderId + '"]');
      if (!folderTile) return;
      titleEl.textContent = folderTile.querySelector('.name').textContent;

      grid.innerHTML = '';
      var children = document.querySelectorAll('.tile[data-in-folder="' + folderId + '"]');
      children.forEach(function(t){
        var clone = t.cloneNode(true);
        clone.removeAttribute('data-in-folder');
        clone.removeAttribute('hidden');
        grid.appendChild(clone);
      });

      lastTrigger = trigger || folderTile;
      overlay.setAttribute('data-open', 'true');
      overlay.removeAttribute('aria-hidden');
      // Move focus to the first item for keyboard users.
      var first = grid.querySelector('.tile');
      if (first) first.focus();
    }

    function closeFolder() {
      if (overlay.getAttribute('data-open') !== 'true') return;
      overlay.setAttribute('data-open', 'false');
      overlay.setAttribute('aria-hidden', 'true');
      if (lastTrigger && typeof lastTrigger.focus === 'function') lastTrigger.focus();
    }

    document.querySelectorAll('.tile.is-folder').forEach(function(btn){
      btn.addEventListener('click', function(){
        openFolder(btn.getAttribute('data-folder'), btn);
      });
    });

    overlay.addEventListener('click', function(e){
      // Click on the backdrop (overlay itself), not on the panel, closes.
      if (e.target === overlay) closeFolder();
    });

    document.addEventListener('keydown', function(e){
      if (e.key === 'Escape' && overlay.getAttribute('data-open') === 'true') {
        closeFolder();
      }
    });
  })();

  (function(){
    var btn = document.getElementById('profileBtn');
    var dropdown = document.getElementById('profileDropdown');
    var emailEl = document.getElementById('profileEmail');
    var logoutBtn = document.getElementById('logoutBtn');

    function initials(user) {
      var name = (user.displayName || '').trim();
      if (name) {
        var parts = name.split(/\s+/);
        var first = parts[0] ? parts[0][0] : '';
        var last = parts.length > 1 ? parts[parts.length - 1][0] : '';
        return (first + last).toUpperCase() || name[0].toUpperCase();
      }
      return (user.email || '?')[0].toUpperCase();
    }

    function renderAvatar(user) {
      var label = initials(user);
      btn.textContent = label;
      if (user.photoURL) {
        var img = new Image();
        img.referrerPolicy = 'no-referrer';
        img.alt = '';
        img.onload = function () {
          btn.textContent = '';
          btn.appendChild(img);
        };
        img.onerror = function () { /* keep initials */ };
        img.src = user.photoURL;
      }
    }

    if (window.aitherOnReady) {
      window.aitherOnReady(function (user) {
        renderAvatar(user);
        btn.setAttribute('aria-label', 'Profile menu — ' + user.email);
        emailEl.textContent = user.email;
      });
    }

    btn.addEventListener('click', function(e){
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });

    document.addEventListener('click', function(){
      dropdown.classList.remove('open');
    });

    logoutBtn.addEventListener('click', function(){
      dropdown.classList.remove('open');
      if (window.aitherLogout) { window.aitherLogout(); return; }
      window.location.href = './login.html';
    });
  })();
</script>

</body>
</html>
